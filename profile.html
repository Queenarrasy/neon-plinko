<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil VIP - AR.GAMING</title>
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --bg-dark: #0a0b1e;
            --bronze: #cd7f32;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER NAV */
        .header-nav { width: 100%; margin-bottom: 20px; }
        .btn-back { color: var(--neon-blue); text-decoration: none; font-weight: bold; cursor: pointer; border:none; background:none; font-size: 14px; }

        /* PROFILE CARD */
        .profile-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--neon-pink);
            border-radius: 35px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
        }

        /* TIER ICON */
        .tier-display {
            width: 80px; height: 80px; margin: 0 auto 15px;
            border-radius: 50%; border: 3px solid var(--bronze);
            display: flex; align-items: center; justify-content: center;
            background: rgba(205, 127, 50, 0.1);
            box-shadow: 0 0 15px var(--bronze);
        }

        .username { font-size: 24px; font-weight: 800; color: white; margin: 5px 0; }
        .user-id { font-size: 12px; color: #666; font-family: monospace; margin-bottom: 15px; }

        /* DATA REKENING TERKUNCI */
        .locked-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid rgba(0, 212, 255, 0.3);
            text-align: left;
        }

        .locked-title { 
            font-size: 10px; color: var(--neon-blue); 
            font-weight: bold; text-transform: uppercase; 
            margin-bottom: 10px; display: block;
        }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .info-label { color: #888; }
        .info-value { color: #fff; font-weight: bold; }

        /* TIER PROGRESS */
        .tier-label { color: var(--bronze); font-weight: 900; font-size: 12px; margin-bottom: 15px; display: block; }
        .progress-container { text-align: left; margin-top: 10px; }
        .bar-bg { width: 100%; height: 8px; background: #15162c; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--bronze); }

        /* STATS BOXES */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .stat-box { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-box.active { border-color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0,212,255,0.1); }
        .stat-label { font-size: 9px; color: #666; display: block; margin-bottom: 5px; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--gold); }

        .btn-logout { margin-top: 30px; color: #ff4444; background: none; border: none; font-weight: bold; cursor: pointer; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header-nav">
        <button class="btn-back" onclick="window.location.href='game.html'">⬅ KEMBALI KE GAME</button>
    </div>

    <div class="profile-card">
        <div class="tier-display">
            <span style="font-size: 40px;">🥉</span>
        </div>

        <div class="username" id="displayUser">ABCD</div>
        <div class="user-id" id="displayID">ID: #VIP681355</div>
        
        <span class="tier-label">BRONZE MEMBER</span>

        <div class="locked-section">
            <span class="locked-title">🔒 Data Rekening Terkunci</span>
            <div class="info-row">
                <span class="info-label">Nama Lengkap:</span>
                <span class="info-value" id="realName">MEMUAT...</span>
            </div>
            <div class="info-row">
                <span class="info-label">No. Rekening:</span>
                <span class="info-value" id="bankAcc">MEMUAT...</span>
            </div>
            <div class="info-row" style="margin-top: 5px; font-size: 10px; color: var(--neon-pink);">
                <span>*Hubungi Admin untuk ubah data</span>
            </div>
        </div>

        <div class="progress-container">
            <div style="display:flex; justify-content:space-between; font-size:10px; color:#888; margin-bottom:5px;">
                <span>KE SILVER</span>
                <span>0%</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" id="barFill"></div>
            </div>
            <p style="font-size: 10px; color: #555; margin-top: 8px;">BUTUH IDR 50.000 LAGI</p>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-label">AKUMULASI DEPO</span>
                <span class="stat-val" style="color: #fbff00;">IDR 0</span>
            </div>
            <div class="stat-box active">
                <span class="stat-label">SALDO SAAT INI</span>
                <span class="stat-val" style="color: #fff;">IDR 27.480</span>
            </div>
        </div>

        <button class="btn-logout" onclick="logout()">LOGOUT SESSION</button>
    </div>

    <script>
        function loadData() {
            // Ambil data dari registrasi awal
            const userData = JSON.parse(localStorage.getItem('plinko_user')) || { 
                username: "ABCD", 
                fullName: "BELUM DIISI", 
                accountNumber: "0000000000" 
            };

            document.getElementById('displayUser').innerText = userData.username;
            document.getElementById('realName').innerText = userData.fullName.toUpperCase();
            document.getElementById('bankAcc').innerText = userData.accountNumber;
            
            // Inisialisasi ID jika belum ada
            if(!localStorage.getItem('permanent_id')) {
                localStorage.setItem('permanent_id', "#VIP" + Math.floor(100000 + Math.random() * 899999));
            }
            document.getElementById('displayID').innerText = "ID: " + localStorage.getItem('permanent_id');
        }

        function logout() {
            if(confirm("Logout hanya akan mengakhiri sesi. Data Anda tetap terkunci aman.")) {
                localStorage.removeItem('is_logged_in');
                window.location.href = 'index.html';
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
