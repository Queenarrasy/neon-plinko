<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFILE VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* TOMBOL KEMBALI */
        .btn-back { align-self: flex-start; color: var(--neon-blue); text-decoration: none; font-weight: 900; font-size: 12px; margin-bottom: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }

        /* AVATAR & IDENTITAS */
        .profile-card { width: 100%; background: linear-gradient(145deg, #0a0c1f, #151833); border: 2px solid var(--neon-pink); border-radius: 25px; padding: 25px 15px; box-shadow: 0 0 20px rgba(255, 0, 119, 0.3); position: relative; box-sizing: border-box; text-align: center; }
        
        .avatar-wrapper { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; border: 3px solid var(--neon-gold); padding: 5px; box-shadow: 0 0 15px var(--neon-gold); overflow: hidden; background: #111; }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .username { font-size: 24px; font-weight: 900; margin: 5px 0; letter-spacing: 1px; }
        .user-id { font-size: 12px; color: #888; margin-bottom: 5px; }
        .tier-badge { color: var(--neon-gold); font-size: 14px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-gold); }

        /* DATA REKENING */
        .info-box { width: 100%; background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 15px; margin-top: 20px; padding: 15px; box-sizing: border-box; }
        .info-header { font-size: 10px; color: var(--neon-blue); font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        .info-label { color: #aaa; }
        .info-value { font-weight: bold; color: white; }

        /* TIER PROGRESS */
        .progress-section { width: 100%; margin-top: 25px; text-align: left; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 10px; font-weight: 900; margin-bottom: 8px; color: var(--neon-blue); }
        .progress-bar-bg { width: 100%; height: 12px; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); width: 0%; transition: 1s ease-in-out; box-shadow: 0 0 10px var(--neon-blue); }
        .progress-target { font-size: 10px; color: #777; margin-top: 8px; display: block; }

        /* SALDO & DEPO STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; }
        .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px 10px; text-align: center; }
        .stat-label { font-size: 8px; color: #888; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 14px; font-weight: 900; color: white; }
        .stat-saldo { border-color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1); }
        .stat-saldo .stat-value { color: var(--neon-blue); }

        .logout-btn { margin-top: 30px; color: #ff4444; font-size: 12px; font-weight: 900; text-decoration: none; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> KEMBALI KE GAME</a>

        <div class="profile-card">
            <div class="avatar-wrapper">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar">
            </div>
            <div class="username" id="display-name">ABCD</div>
            <div class="user-id">ID: #VIP846598</div>
            <div class="tier-badge" id="tier-name">BRONZE MEMBER</div>

            <div class="info-box">
                <div class="info-header"><i class="fa-solid fa-lock"></i> DATA REKENING TERKUNCI</div>
                <div class="info-row">
                    <span class="info-label">Nama Lengkap:</span>
                    <span class="info-value" id="full-name">SAPI</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Bank/Wallet:</span>
                    <span class="info-value" id="bank-name">DANA</span>
                </div>
                <div class="info-row">
                    <span class="info-label">No. Rekening:</span>
                    <span class="info-value" id="acc-number">123456789</span>
                </div>
                <div style="font-size: 9px; color: var(--neon-pink); margin-top: 10px; font-style: italic;">*Hubungi Admin untuk ubah data</div>
            </div>

            <div class="progress-section">
                <div class="progress-labels">
                    <span id="current-tier">BRONZE</span>
                    <span id="next-tier" style="color: var(--neon-pink);">SILVER</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="tier-progress"></div>
                </div>
                <span class="progress-target" id="progress-text">BUTUH IDR 50.000 LAGI</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">AKUMULASI DEPO</span>
                    <span class="stat-value" id="total-depo">IDR 0</span>
                </div>
                <div class="stat-card stat-saldo">
                    <span class="stat-label">SALDO SAAT INI</span>
                    <span class="stat-value" id="current-balance">IDR 91.200</span>
                </div>
            </div>

            <div class="logout-btn" onclick="logout()">LOGOUT SESSION</div>
        </div>
    </div>

    <script>
        // Simulasi Data (Ganti dengan localStorage jika sudah terhubung ke login)
        const userData = {
            username: "Abcd",
            fullName: "SAPI",
            bank: "DANA",
            accNumber: "123456789",
            balance: 91200, // Sinkronkan dengan saldo game
            totalDeposit: 25000 // Contoh total deposit terkumpul
        };

        function updateProfileUI() {
            // Tampilkan data dasar
            document.getElementById('display-name').innerText = userData.username;
            document.getElementById('full-name').innerText = userData.fullName;
            document.getElementById('bank-name').innerText = userData.bank;
            document.getElementById('acc-number').innerText = userData.accNumber;
            document.getElementById('current-balance').innerText = "IDR " + userData.balance.toLocaleString();
            document.getElementById('total-depo').innerText = "IDR " + userData.totalDeposit.toLocaleString();

            // Logika Tier Otomatis
            const silverTarget = 50000;
            const goldTarget = 200000;
            
            let progressPercent = 0;
            let needed = 0;

            if (userData.totalDeposit < silverTarget) {
                // Tier Bronze ke Silver
                progressPercent = (userData.totalDeposit / silverTarget) * 100;
                needed = silverTarget - userData.totalDeposit;
                document.getElementById('tier-name').innerText = "BRONZE MEMBER";
                document.getElementById('progress-text').innerText = "BUTUH IDR " + needed.toLocaleString() + " LAGI KE SILVER";
            } else {
                // Tier Silver ke Gold
                document.getElementById('current-tier').innerText = "SILVER";
                document.getElementById('next-tier').innerText = "GOLD";
                document.getElementById('tier-name').innerText = "SILVER MEMBER";
                progressPercent = (userData.totalDeposit / goldTarget) * 100;
                needed = goldTarget - userData.totalDeposit;
                document.getElementById('progress-text').innerText = "BUTUH IDR " + needed.toLocaleString() + " LAGI KE GOLD";
            }

            document.getElementById('tier-progress').style.width = progressPercent + "%";
        }

        function logout() {
            if(confirm("Yakin ingin logout?")) {
                location.href = "index.html";
            }
        }

        // Jalankan saat halaman dibuka
        updateProfileUI();
    </script>
</body>
</html>
