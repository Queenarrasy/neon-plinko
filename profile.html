<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFILE VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }

        .container { padding: 20px; display: flex; flex-direction: column; align-items: center; max-width: 500px; margin: auto; }
        
        /* TOMBOL KEMBALI */
        .btn-back { align-self: flex-start; color: var(--neon-blue); text-decoration: none; font-weight: 900; font-size: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; text-shadow: 0 0 5px var(--neon-blue); }

        /* PROFILE CARD */
        .profile-card { 
            width: 100%; background: linear-gradient(145deg, #0a0c1f, #151833); 
            border: 2px solid var(--neon-pink); border-radius: 25px; padding: 30px 20px; 
            box-shadow: 0 0 25px rgba(255, 0, 119, 0.3); text-align: center; box-sizing: border-box; 
        }
        
        .avatar-wrapper { 
            width: 110px; height: 110px; margin: 0 auto 15px; border-radius: 50%; 
            border: 3px solid var(--neon-gold); padding: 5px; box-shadow: 0 0 20px var(--neon-gold); 
            background: #111; overflow: hidden;
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .username { font-size: 26px; font-weight: 900; margin: 5px 0; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .user-id { font-size: 11px; color: #666; margin-bottom: 15px; font-family: monospace; letter-spacing: 1px; }
        
        .tier-badge { 
            display: inline-block; padding: 6px 18px; border-radius: 20px; 
            background: rgba(251, 255, 0, 0.1); border: 1px solid var(--neon-gold);
            color: var(--neon-gold); font-size: 12px; font-weight: 900; 
            text-transform: uppercase; text-shadow: 0 0 10px var(--neon-gold);
        }

        /* DATA REKENING */
        .info-box { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; margin-top: 25px; padding: 20px; box-sizing: border-box; }
        .info-header { font-size: 10px; color: var(--neon-blue); font-weight: 900; margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .info-label { color: #777; font-weight: 600; }
        .info-value { font-weight: 700; color: #eee; }

        /* TIER PROGRESS */
        .progress-section { width: 100%; margin-top: 30px; text-align: left; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 900; margin-bottom: 10px; }
        .progress-bar-bg { width: 100%; height: 14px; background: #000; border-radius: 20px; border: 1px solid #222; overflow: hidden; position: relative; }
        .progress-bar-fill { 
            height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); 
            width: 0%; transition: 2s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 15px var(--neon-blue);
        }
        .progress-info { font-size: 10px; color: #666; margin-top: 10px; display: block; font-weight: bold; text-align: center; }

        .logout-btn { margin-top: 40px; color: #ff4444; font-size: 11px; font-weight: 900; letter-spacing: 2px; text-decoration: none; text-transform: uppercase; cursor: pointer; opacity: 0.7; transition: 0.3s; display: block; }
        .logout-btn:hover { opacity: 1; text-shadow: 0 0 8px #ff4444; }
    </style>
</head>
<body>

    <div class="container">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE GAME</a>

        <div class="profile-card">
            <div class="avatar-wrapper">
                <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Guest" alt="User Avatar">
            </div>
            
            <div class="username" id="display-name">MEMUAT...</div>
            <div class="user-id" id="display-id">ID: #VIP000000</div>
            <div class="tier-badge" id="tier-name">BRONZE MEMBER</div>

            <div class="info-box">
                <div class="info-header"><i class="fa-solid fa-shield-halved"></i> DATA VALIDASI AKUN</div>
                <div class="info-row">
                    <span class="info-label">Nama Lengkap:</span>
                    <span class="info-value" id="full-name">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Bank/Wallet:</span>
                    <span class="info-value" id="bank-name">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">No. Rekening:</span>
                    <span class="info-value" id="acc-number">-</span>
                </div>
                <div style="font-size: 9px; color: var(--neon-pink); margin-top: 10px; font-style: italic;">*Hubungi Admin untuk perubahan data rekening</div>
            </div>

            <div class="progress-section">
                <div class="progress-labels">
                    <span id="current-tier-label" style="color: var(--neon-blue);">BRONZE</span>
                    <span id="next-tier-label" style="color: var(--neon-pink);">SILVER</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="tier-progress"></div>
                </div>
                <span class="progress-info" id="progress-text">SINKRONISASI DATA DEPOSIT...</span>
            </div>

            <div class="logout-btn" onclick="handleLogout()">Keluar Sesi Aman</div>
        </div>
    </div>

    <script>
        function loadProfileData() {
            // Ambil data dari localStorage (Data yang disimpan saat daftar di index.html)
            const username = localStorage.getItem('user_vip') || "Guest";
            const fullName = localStorage.getItem('full_name') || "User VIP";
            const bankName = localStorage.getItem('bank_name') || "DANA";
            const accNumber = localStorage.getItem('acc_number') || "000000000";
            const totalDeposit = parseInt(localStorage.getItem('total_deposit')) || 0; // Diperoleh dari akumulasi depo

            // Tampilkan Data ke Layar
            document.getElementById('display-name').innerText = username.toUpperCase();
            document.getElementById('full-name').innerText = fullName.toUpperCase();
            document.getElementById('bank-name').innerText = bankName.toUpperCase();
            document.getElementById('acc-number').innerText = accNumber;
            document.getElementById('display-id').innerText = "ID: #VIP" + Math.floor(100000 + Math.random() * 900000);
            
            // Update Avatar Berdasarkan Nama
            document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${username}`;

            // Logika Tiering Otomatis
            const silverMin = 50000;
            const goldMin = 250000;
            let percent = 0;

            if (totalDeposit < silverMin) {
                // Tier Bronze
                percent = (totalDeposit / silverMin) * 100;
                document.getElementById('tier-name').innerText = "BRONZE MEMBER";
                document.getElementById('progress-text').innerText = `BUTUH IDR ${(silverMin - totalDeposit).toLocaleString()} LAGI UNTUK SILVER`;
            } else if (totalDeposit < goldMin) {
                // Tier Silver
                percent = (totalDeposit / goldMin) * 100;
                document.getElementById('current-tier-label').innerText = "SILVER";
                document.getElementById('next-tier-label').innerText = "GOLD";
                document.getElementById('tier-name').innerText = "SILVER MEMBER";
                document.getElementById('progress-text').innerText = `BUTUH IDR ${(goldMin - totalDeposit).toLocaleString()} LAGI UNTUK GOLD`;
            } else {
                // Tier Gold (Sultan)
                percent = 100;
                document.getElementById('current-tier-label').innerText = "GOLD";
                document.getElementById('next-tier-label').innerText = "PLATINUM";
                document.getElementById('tier-name').innerText = "GOLD MEMBER";
                document.getElementById('progress-text').innerText = "LEVEL MAKSIMAL TERCAPAI!";
            }

            // Jalankan Animasi Progress Bar
            setTimeout(() => {
                document.getElementById('tier-progress').style.width = percent + "%";
            }, 300);
        }

        function handleLogout() {
            if(confirm("Apakah anda yakin ingin mengakhiri sesi ini?")) {
                window.location.href = "index.html";
            }
        }

        // Inisialisasi saat halaman dibuka
        window.onload = loadProfileData;
    </script>
</body>
</html>
