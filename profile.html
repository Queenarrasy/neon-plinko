<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profile VIP - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --bg-dark: #0a0b1e;
            --bronze: #cd7f32;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-nav { width: 100%; margin-bottom: 20px; }
        .btn-back { 
            color: var(--neon-blue); text-decoration: none; 
            font-weight: bold; cursor: pointer; border:none; 
            background:none; font-size: 13px; text-transform: uppercase;
        }

        /* CARD PROFILE UTAMA */
        .profile-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--neon-pink);
            border-radius: 35px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
            position: relative;
        }

        .tier-badge {
            width: 85px; height: 85px; margin: 0 auto 15px;
            border-radius: 50%; border: 3px solid var(--bronze);
            display: flex; align-items: center; justify-content: center;
            background: rgba(205, 127, 50, 0.1);
            box-shadow: 0 0 20px var(--bronze);
        }

        .user-name { font-size: 26px; font-weight: 900; color: white; margin: 5px 0; letter-spacing: 1px; }
        .user-id { font-size: 12px; color: #555; font-family: monospace; margin-bottom: 5px; }
        .tier-name { color: var(--bronze); font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 20px; display: block; }

        /* DATA REKENING TERKUNCI */
        .locked-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid rgba(0, 212, 255, 0.3);
            text-align: left;
            position: relative;
        }

        .locked-tag { 
            font-size: 10px; color: var(--neon-blue); 
            font-weight: bold; text-transform: uppercase; 
            display: flex; align-items: center; gap: 5px; margin-bottom: 12px;
        }

        .info-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 5px; }
        .info-label { color: #888; }
        .info-value { color: #fff; font-weight: bold; text-transform: uppercase; }

        /* PROGRESS BAR */
        .progress-area { margin: 25px 0; text-align: left; }
        .progress-info { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 6px; font-weight: bold; }
        .bar-outer { width: 100%; height: 8px; background: #15162c; border-radius: 10px; overflow: hidden; }
        .bar-inner { height: 100%; width: 0%; background: var(--bronze); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* STATS BOX */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .stat-card { 
            background: rgba(255,255,255,0.04); 
            padding: 15px; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card.active { border-color: var(--neon-blue); box-shadow: inset 0 0 10px rgba(0,212,255,0.1); }
        .stat-label { font-size: 9px; color: #666; display: block; margin-bottom: 5px; font-weight: bold; }
        .stat-val { font-size: 14px; font-weight: 900; color: #fff; }

        .btn-logout { margin-top: 30px; color: #ff4444; background: none; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

        /* NEON POPUP SYSTEM */
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }
        .neon-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 320px; background: #0f112a;
            border: 2px solid var(--neon-pink); border-radius: 25px;
            padding: 30px 20px; text-align: center; z-index: 1000;
            box-shadow: 0 0 40px rgba(255, 0, 119, 0.3);
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <button class="btn-back" onclick="window.location.href='game.html'">⬅ KEMBALI KE GAME</button>
    </div>

    <div class="profile-card">
        <div class="tier-badge" id="tierIcon">
            <span style="font-size: 40px;">🥉</span>
        </div>

        <div class="user-name" id="userName">PLAYER</div>
        <div class="user-id" id="userID">ID: #VIP000000</div>
        <span class="tier-name" id="tierName">BRONZE MEMBER</span>

        <div class="locked-box">
            <span class="locked-tag">
                <i class="fa-solid fa-lock"></i> DATA REKENING TERKUNCI
            </span>
            <div class="info-item">
                <span class="info-label">Nama Lengkap:</span>
                <span class="info-value" id="realName">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Bank/Wallet:</span>
                <span class="info-value" id="bankName">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">No. Rekening:</span>
                <span class="info-value" id="bankAcc">-</span>
            </div>
            <p style="font-size: 9px; color: var(--neon-pink); margin-top: 10px; font-weight: bold; text-align: center;">
                *Hubungi Admin untuk ubah data
            </p>
        </div>

        <div class="progress-area">
            <div class="progress-info">
                <span id="nextTierText">KE SILVER</span>
                <span id="percentText">0%</span>
            </div>
            <div class="bar-outer">
                <div class="bar-inner" id="barFill"></div>
            </div>
            <p id="targetMsg" style="font-size: 10px; color: #555; margin-top: 8px; font-weight: bold;"></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">AKUMULASI DEPO</span>
                <span class="stat-val" id="totalDepo" style="color: var(--gold);">IDR 0</span>
            </div>
            <div class="stat-card active">
                <span class="stat-label">SALDO SAAT INI</span>
                <span class="stat-val" id="currentBalance">IDR 0</span>
            </div>
        </div>

        <button class="btn-logout" onclick="askLogout()">LOGOUT SESSION</button>
    </div>

    <div class="popup-overlay" id="overlay"></div>
    <div class="neon-popup" id="popup">
        <i class="fa-solid fa-right-from-bracket" style="font-size: 50px; color: var(--neon-pink); margin-bottom: 15px;"></i>
        <h3 style="margin: 0; letter-spacing: 1px;">KELUAR SESI?</h3>
        <p style="font-size: 12px; color: #bbb; margin: 15px 0 25px;">Data Akun & Saldo Anda akan tetap tersimpan aman.</p>
        <div style="display: flex; gap: 10px;">
            <button onclick="closePopup()" style="flex:1; padding: 12px; border-radius: 12px; border: 1px solid #444; background: none; color: white; cursor: pointer;">BATAL</button>
            <button onclick="confirmLogout()" style="flex:1; padding: 12px; border-radius: 12px; border: none; background: var(--neon-pink); color: white; font-weight: bold; cursor: pointer;">YA, KELUAR</button>
        </div>
    </div>

    <script>
        function initProfile() {
            // Ambil data akun aktif
            const activeUser = JSON.parse(localStorage.getItem('plinko_user'));
            if (!activeUser) return window.location.href = 'index.html';

            const totalDepo = parseInt(localStorage.getItem('total_deposit_accumulated') || 0);
            const balance = parseInt(localStorage.getItem('user_balance') || 0);

            // Update Data Terkunci
            document.getElementById('userName').innerText = activeUser.username;
            document.getElementById('userID').innerText = "ID: " + (activeUser.id || "#VIP681355");
            document.getElementById('realName').innerText = activeUser.fullName;
            document.getElementById('bankName').innerText = activeUser.bankName;
            document.getElementById('bankAcc').innerText = activeUser.accountNumber;
            
            document.getElementById('totalDepo').innerText = "IDR " + totalDepo.toLocaleString();
            document.getElementById('currentBalance').innerText = "IDR " + balance.toLocaleString();

            updateTierVisual(totalDepo);
        }

        function updateTierVisual(depo) {
            const tiers = [
                { name: "BRONZE", min: 0, next: 50000, color: "#cd7f32", sym: "🥉" },
                { name: "SILVER", min: 50000, next: 250000, color: "#c0c0c0", sym: "🥈" },
                { name: "GOLD", min: 250000, next: 1000000, color: "#ffcc00", sym: "🥇" }
            ];

            let cur = tiers[0];
            for (let i = tiers.length-1; i >= 0; i--) {
                if (depo >= tiers[i].min) { cur = tiers[i]; break; }
            }

            const bar = document.getElementById('barFill');
            const percent = Math.min(100, Math.floor(((depo - cur.min) / (cur.next - cur.min)) * 100));
            
            bar.style.width = percent + "%";
            bar.style.background = cur.color;
            document.getElementById('percentText').innerText = percent + "%";
            document.getElementById('targetMsg').innerText = `BUTUH IDR ${(cur.next - depo).toLocaleString()} LAGI`;
        }

        function askLogout() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('popup').style.display = 'none';
        }

        function confirmLogout() {
            localStorage.removeItem('is_logged_in');
            window.location.href = 'index.html';
        }

        window.onload = initProfile;
    </script>
</body>
</html>
