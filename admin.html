<!DOCTYPE html>
<html>
<head>
    <title>MASTER CONTROL - NEON PLINKO</title>
    <style>
        body { background: #0a0b1e; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #161b33; border: 1px solid #00d4ff; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
        .status-online { color: #00ff00; font-weight: bold; }
        .status-offline { color: #ff0077; }
        input, button { padding: 8px; border-radius: 5px; border: none; }
        button { cursor: pointer; background: #00d4ff; color: black; font-weight: bold; }
        .btn-win { background: #fbff00; }
        .btn-msg { background: #ff0077; color: white; }
    </style>
</head>
<body>
    <h1>NEON PLINKO MASTER CONTROL</h1>
    <div id="user-list">Loading Users...</div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqQWXIJuVnkIxLvdu3kYiiRDVh7eyrsy-KU6rG1qtQClgfAzmMoclv2ULFZ_hRdE_qUg/exec",

        async function loadUsers() {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getAllUsers" })
            });
            const users = await res.json();
            const container = document.getElementById('user-list');
            container.innerHTML = "";

            users.forEach(u => {
                container.innerHTML += `
                    <div class="card">
                        <div class="flex">
                            <div>
                                <b>${u.username}</b> (${u.fullname}) <br>
                                <small>Saldo: IDR ${parseInt(u.saldo).toLocaleString()}</small> | 
                                <span class="${u.status === 'Online' ? 'status-online' : 'status-offline'}">${u.status}</span>
                            </div>
                            <div>
                                Winrate: <input type="number" step="0.1" id="wr-${u.username}" value="${u.winrate}" style="width:50px">
                                <button class="btn-win" onclick="setWinrate('${u.username}')">SET</button>
                            </div>
                        </div>
                        <hr style="border:0.1px solid #333">
                        <div class="flex">
                            <button onclick="approveTopup('${u.username}')">+ SALDO (TOPUP)</button>
                            <button class="btn-msg" onclick="sendGift('${u.username}')">KIRIM PESAN/HADIAH</button>
                        </div>
                    </div>
                `;
            });
        }

        async function setWinrate(user) {
            const val = document.getElementById('wr-'+user).value;
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "setWinrate", username: user, winrate: val }) });
            alert("Winrate " + user + " diatur ke " + val);
        }

        async function approveTopup(user) {
            const jml = prompt("Masukkan jumlah Saldo yang akan dikirim ke " + user);
            if(jml) {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "approveTopup", username: user, jumlah: jml }) });
                alert("Saldo Terkirim!");
                loadUsers();
            }
        }

        async function sendGift(user) {
            const msg = prompt("Pesan untuk user:");
            const gift = prompt("Jumlah Saldo Hadiah (Isi 0 jika hanya pesan):");
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "sendInbox", username: user, pesan: msg, hadiah: gift }) });
            alert("Pesan Terkirim!");
        }

        setInterval(loadUsers, 5000); // Auto Refresh tiap 5 detik untuk cek User Online
        loadUsers();
    </script>
</body>
</html>
