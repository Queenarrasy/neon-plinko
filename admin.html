<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL CONTROL - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #050612; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h1 { color: var(--blue); text-shadow: 0 0 10px var(--blue); text-align: center; font-size: 28px; }
        
        .container { max-width: 1200px; margin: auto; }
        
        /* Stats Card */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid var(--pink); padding: 20px; border-radius: 15px; text-align: center; }
        .card h3 { margin: 0; font-size: 14px; color: #888; }
        .card p { margin: 10px 0 0; font-size: 22px; font-weight: bold; color: var(--yellow); }

        /* Table Style */
        .table-container { background: rgba(255,255,255,0.02); border: 1px solid var(--blue); border-radius: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: rgba(0, 212, 255, 0.1); color: var(--blue); padding: 15px; text-align: left; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 13px; }
        
        /* Controls */
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .btn-win { background: #00ff88; color: #000; }
        .btn-lose { background: #ff3333; color: #fff; }
        .btn-gift { background: var(--yellow); color: #000; }
        .btn-approve { background: var(--blue); color: #000; }

        .status-active { color: #00ff88; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Modal Input */
        .input-box { background: #000; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; width: 80px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-user-shield"></i> HQ - NEON CONTROL PANEL</h1>
    
    <div class="stats-grid">
        <div class="card"><h3>TOTAL PEMAIN</h3><p id="stat-users">0</p></div>
        <div class="card"><h3>SALDO BEREDAR</h3><p id="stat-saldo">IDR 0</p></div>
        <div class="card"><h3>PEMAIN AKTIF</h3><p id="stat-active" class="status-active">0</p></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>USER / HP</th>
                    <th>NAMA / BANK / REK</th>
                    <th>SALDO</th>
                    <th>WIN RATE</th>
                    <th>STATUS</th>
                    <th>AKSI KONTROL</th>
                </tr>
            </thead>
            <tbody id="user-table">
                </tbody>
        </table>
    </div>
</div>

<script src="global.js"></script>
<script>
    // Hanya simulasi: Jika ingin benar-benar jarak jauh, data harus ditarik dari server.
    // Kode ini bekerja dengan membaca localStorage yang dibagikan.

    function loadData() {
        const users = JSON.parse(localStorage.getItem('database_users')) || [];
        const tableBody = document.getElementById('user-table');
        let totalSaldo = 0;
        let activeCount = 0;

        tableBody.innerHTML = '';

        users.forEach((user, index) => {
            // Simulasi status aktif (acak untuk demo, di real system ini dicek dari timestamp)
            const isActive = Math.random() > 0.5; 
            if(isActive) activeCount++;

            const userWinRate = localStorage.getItem(`winrate_${user.username}`) || "NORMAL";
            totalSaldo += parseInt(user.saldo || 0);

            tableBody.innerHTML += `
                <tr>
                    <td><b>${user.username}</b><br><small>${user.phone}</small><br><small>Pass: ${user.password}</small></td>
                    <td>${user.fullname}<br>${user.bank} - ${user.rekening}</td>
                    <td>
                        <input type="number" class="input-box" id="amt-${index}" value="${user.saldo || 0}">
                        <button class="btn btn-approve" onclick="adjustSaldo('${user.username}', ${index})">SET</button>
                    </td>
                    <td>
                        <span style="color:${userWinRate === 'WIN' ? '#00ff88' : (userWinRate === 'LOSE' ? '#ff3333' : '#fff')}">
                            ${userWinRate}
                        </span>
                    </td>
                    <td><span class="${isActive ? 'status-active' : ''}">${isActive ? 'ONLINE' : 'OFFLINE'}</span></td>
                    <td>
                        <button class="btn btn-win" onclick="setBehavior('${user.username}', 'WIN')">SET MENANG</button>
                        <button class="btn btn-lose" onclick="setBehavior('${user.username}', 'LOSE')">SET KALAH</button>
                        <button class="btn btn-gift" onclick="sendGift('${user.username}')">KIRIM HADIAH</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('stat-users').innerText = users.length;
        document.getElementById('stat-saldo').innerText = "IDR " + totalSaldo.toLocaleString();
        document.getElementById('stat-active').innerText = activeCount;
    }

    function adjustSaldo(username, idx) {
        const newAmt = document.getElementById(`amt-${idx}`).value;
        let users = JSON.parse(localStorage.getItem('database_users'));
        const userIdx = users.findIndex(u => u.username === username);
        
        users[userIdx].saldo = parseInt(newAmt);
        localStorage.setItem('database_users', JSON.stringify(users));
        
        // Sinkronkan ke saldo permainan pemain tersebut
        localStorage.setItem(`saldo_permainan_${username}`, newAmt);
        
        showNeonAlert(`Saldo ${username} berhasil diubah ke IDR ${newAmt}`, "UPDATE SUKSES");
        loadData();
    }

    function setBehavior(username, type) {
        localStorage.setItem(`winrate_${username}`, type);
        showNeonAlert(`Pemain ${username} telah diatur ke mode: ${type}`, "KONTROL AKUN");
        loadData();
    }

    function sendGift(username) {
        const amount = prompt("Masukkan jumlah saldo hadiah:");
        if (amount) {
            let inbox = JSON.parse(localStorage.getItem(`inbox_${username}`)) || [];
            inbox.push({
                id: Date.now(),
                msg: "Anda menerima hadiah saldo dari Admin!",
                amount: parseInt(amount),
                claimed: false
            });
            localStorage.setItem(`inbox_${username}`, JSON.stringify(inbox));
            showNeonAlert(`Hadiah IDR ${amount} dikirim ke pesan ${username}`, "GIFT SENT");
        }
    }

    setInterval(loadData, 3000); // Refresh data tiap 3 detik
    loadData();
</script>
</body>
</html>
