<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON REWARD VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        
        .btn-back { color: var(--neon-blue); text-decoration: none; font-weight: 900; font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 25px; text-transform: uppercase; }

        /* REWARD CARDS */
        .card { 
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--neon-gold); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }

        /* DAILY REWARD */
        .daily-flex { display: flex; justify-content: space-between; align-items: center; }
        .reward-val { font-size: 22px; font-weight: 900; color: white; }
        .reward-val span { font-size: 12px; color: var(--neon-pink); }
        .btn-claim { background: var(--neon-pink); border: none; padding: 12px 25px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px var(--neon-pink); transition: 0.3s; }
        .btn-claim:disabled { background: #222; box-shadow: none; color: #555; cursor: not-allowed; }

        /* INBOX STYLE */
        .inbox-box { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; text-align: center; border: 1px dashed #333; }
        .msg-text { font-size: 13px; color: #777; font-style: italic; }
        .msg-active { border: 1px solid var(--neon-blue); background: rgba(0, 212, 255, 0.05); text-align: left; }
        .msg-active b { color: var(--neon-blue); display: block; margin-bottom: 5px; }

        /* REFERRAL BOX */
        .ref-display { background: #000; border: 1px solid var(--neon-blue); padding: 20px; border-radius: 15px; text-align: center; margin-top: 10px; box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.2); }
        .ref-code { font-size: 28px; font-weight: 900; color: var(--neon-blue); letter-spacing: 5px; margin: 10px 0; display: block; }
        .copy-info { font-size: 10px; color: var(--neon-gold); text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> KEMBALI KE GAME</a>

        <div class="card" style="border-color: var(--neon-pink);">
            <h3><i class="fa-solid fa-gift"></i> HADIAH HARIAN</h3>
            <div class="daily-flex">
                <div class="reward-val">1.000 <span>IDR</span></div>
                <button class="btn-claim" id="btnClaim" onclick="claimDaily()">KLAIM</button>
            </div>
            <p style="font-size: 10px; color: #666; margin-top: 10px;">*Klaim tersedia setiap 24 jam. Jika terlewat maka hangus.</p>
        </div>

        <div class="card" style="border-color: var(--neon-blue);">
            <h3><i class="fa-solid fa-bell"></i> PESAN MASUK</h3>
            <div id="inbox-area" class="inbox-box">
                <span class="msg-text">Pesan kosong, cek lain hari untuk reward lain nya.</span>
            </div>
        </div>

        <div class="card" style="border-color: var(--neon-gold);">
            <h3><i class="fa-solid fa-share-nodes"></i> REFERRAL PROGRAM</h3>
            <div class="ref-display">
                <small style="color: #555;">KODE REFERRAL ANDA</small>
                <span class="ref-code" id="refCodeDisplay">---</span>
                <div class="copy-info" onclick="copyRef()">KLIK UNTUK SALIN KODE</div>
            </div>
            <div style="margin-top: 15px; font-size: 11px; color: #aaa; line-height: 1.5;">
                <i class="fa-solid fa-circle-check" style="color: var(--neon-blue);"></i> 
                Undang teman & dapatkan <b>IDR 5.000</b> jika teman deposit min. <b>IDR 20.000</b>.
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Data
        let currentBalance = parseInt(localStorage.getItem('saldo_vip')) || 0;
        let lastClaimDate = localStorage.getItem('last_claim_date');
        let userRefCode = localStorage.getItem('my_ref_code');

        // Buat Kode Referral Unik Otomatis
        if (!userRefCode) {
            userRefCode = "VIP" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('my_ref_code', userRefCode);
        }
        document.getElementById('refCodeDisplay').innerText = userRefCode;

        // Cek Status Klaim Hari Ini
        function checkDaily() {
            const today = new Date().toDateString();
            if (lastClaimDate === today) {
                const btn = document.getElementById('btnClaim');
                btn.disabled = true;
                btn.innerText = "SUDAH KLAIM";
            }
        }

        function claimDaily() {
            const today = new Date().toDateString();
            currentBalance += 1000;
            localStorage.setItem('saldo_vip', currentBalance);
            localStorage.setItem('last_claim_date', today);
            
            alert("Selamat! Anda mendapatkan IDR 1.000 harian.");
            location.reload();
        }

        // Cek Pesan dari Admin
        function loadInbox() {
            const adminMsg = localStorage.getItem('inbox_admin'); 
            if (adminMsg) {
                const area = document.getElementById('inbox-area');
                area.classList.add('msg-active');
                area.innerHTML = `<b>Pesan Reward:</b> ${adminMsg}`;
            }
        }

        function copyRef() {
            const code = document.getElementById('refCodeDisplay').innerText;
            navigator.clipboard.writeText(code);
            alert("Kode Referral disalin: " + code);
        }

        window.onload = () => {
            checkDaily();
            loadInbox();
        };
    </script>
</body>
</html>
