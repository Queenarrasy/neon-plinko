<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Rewards - Referral System</title>
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --gold: #fbff00; --bg-dark: #0a0b1e; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255, 0, 119, 0.3); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: 1px solid var(--neon-pink); background: none; color: white; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        .btn-claim { background: linear-gradient(45deg, var(--neon-blue), #0055ff); border: none; color: white; padding: 12px; border-radius: 25px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-claim:disabled { background: #333; color: #666; cursor: not-allowed; }
        .ref-box { background: #000; border: 1px dashed var(--gold); padding: 10px; margin: 15px 0; color: var(--gold); font-family: monospace; }
        .status-msg { font-size: 11px; margin-top: 5px; color: #ff4444; }
    </style>
</head>
<body>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <button onclick="window.location.href='game.html'" style="background:none; border:none; color:var(--neon-blue); font-weight:bold;">⬅ KEMBALI</button>
        <h3 style="color:var(--neon-pink); margin:0;">VIP REWARDS</h3>
        <div style="width:50px;"></div>
    </div>

    <div class="tab-menu">
        <button id="tab-reward" class="tab-btn active" onclick="switchTab('reward')">HADIAH</button>
        <button id="tab-inbox" class="tab-btn" onclick="switchTab('inbox')">KOTAK MASUK <span id="notif-count" style="color:yellow; font-size:10px; display:none;">●</span></button>
    </div>

    <div id="sec-reward">
        <div class="card">
            <span style="font-size:30px;">🔗</span>
            <h4>KODE REFERRAL SAYA</h4>
            <div class="ref-box" id="myRefCode">MEMUAT...</div>
            <button onclick="copyRef()" class="btn-claim">SALIN KODE</button>
            <p style="font-size:11px; color:#aaa; margin-top:15px;">
                Reward IDR 5.000 akan dikirim ke <b>Kotak Masuk</b> jika teman deposit min IDR 20.000. 
                <br><span style="color:var(--neon-pink)">Jika teman tidak deposit, persyaratan tidak terpenuhi.</span>
            </p>
        </div>
    </div>

    <div id="sec-inbox" style="display:none;">
        <div id="inbox-content">
            <div style="text-align:center; padding:40px; color:#666;">
                <span style="font-size:40px;">📩</span>
                <p>Belum ada hadiah referral yang memenuhi syarat.</p>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('plinko_user')) || { username: "GUEST" };
        document.getElementById('myRefCode').innerText = "REF-" + user.username.toUpperCase();

        function switchTab(type) {
            document.getElementById('sec-reward').style.display = type === 'reward' ? 'block' : 'none';
            document.getElementById('sec-inbox').style.display = type === 'inbox' ? 'block' : 'none';
            document.getElementById('tab-reward').classList.toggle('active', type === 'reward');
            document.getElementById('tab-inbox').classList.toggle('active', type === 'inbox');
            if(type === 'inbox') checkReferralGifts();
        }

        // Simulasi Logika: Cek apakah teman yang diundang sudah deposit
        function checkReferralGifts() {
            const container = document.getElementById('inbox-content');
            // 'invited_friend_deposited' adalah kunci simulasi jika teman sudah sukses deposit 20rb
            const hasEligibleFriend = localStorage.getItem('invited_friend_deposited') === 'true';
            const alreadyClaimed = localStorage.getItem('ref_reward_claimed') === 'true';

            if (hasEligibleFriend && !alreadyClaimed) {
                container.innerHTML = `
                    <div class="card" style="border-color:var(--gold)">
                        <h4 style="color:var(--gold)">🎁 HADIAH REFERRAL TERSEDIA!</h4>
                        <p style="font-size:12px">Teman Anda telah melakukan deposit pertama. Persyaratan terpenuhi!</p>
                        <button onclick="claimReferralBonus()" class="btn-claim" style="background:var(--gold); color:black">KLAIM IDR 5.000</button>
                    </div>
                `;
                document.getElementById('notif-count').style.display = 'inline';
            }
        }

        function claimReferralBonus() {
            let saldo = parseInt(localStorage.getItem('user_balance') || 0);
            localStorage.setItem('user_balance', saldo + 5000);
            localStorage.setItem('ref_reward_claimed', 'true');
            alert("Selamat! Reward Referral IDR 5.000 telah masuk ke saldo permainan.");
            window.location.href = 'game.html'; // Update saldo di layar utama
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('myRefCode').innerText);
            alert("Kode disalin!");
        }
    </script>
</body>
</html>
