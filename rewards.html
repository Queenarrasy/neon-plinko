<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Rewards Center</title>
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --bg-dark: #0a0b1e; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid var(--neon-pink); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .btn { background: var(--neon-blue); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .tab-btn { padding: 10px; border: 1px solid var(--neon-pink); background: none; color: white; cursor: pointer; flex: 1; }
        .active { background: var(--neon-pink); }
    </style>
</head>
<body>
    <button onclick="window.location.href='game.html'" style="color:var(--neon-blue); background:none; border:none; margin-bottom:20px;">⬅ KEMBALI</button>
    
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="t1" class="tab-btn active" onclick="show('reward')">HADIAH</button>
        <button id="t2" class="tab-btn" onclick="show('inbox')">KOTAK MASUK</button>
    </div>

    <div id="reward-sec" class="card">
        <h3>DAILY LOGIN</h3>
        <p>Ambil IDR 1.000 gratis!</p>
        <button id="claimBtn" class="btn" onclick="processDaily()">KLAIM SEKARANG</button>
    </div>

    <div id="inbox-sec" style="display:none">
        <div class="card">
            <h4 style="color:var(--gold)">BONUS ADMIN 🎁</h4>
            <p style="font-size:12px">Hadiah saldo spesial dari pusat.</p>
            <button class="btn" onclick="processInbox(5000)">KLAIM IDR 5.000</button>
        </div>
    </div>

    <script>
        function show(type) {
            document.getElementById('reward-sec').style.display = type === 'reward' ? 'block' : 'none';
            document.getElementById('inbox-sec').style.display = type === 'inbox' ? 'block' : 'none';
            document.getElementById('t1').classList.toggle('active', type === 'reward');
            document.getElementById('t2').classList.toggle('active', type === 'inbox');
        }

        function processDaily() {
            const last = localStorage.getItem('last_daily');
            const today = new Date().toDateString();
            if(last === today) return alert("Sudah klaim hari ini!");

            let s = parseInt(localStorage.getItem('user_balance') || 0);
            localStorage.setItem('user_balance', s + 1000);
            localStorage.setItem('last_daily', today);
            alert("Berhasil! IDR 1.000 masuk ke saldo permainan.");
            window.location.href='game.html'; // Balik ke game agar saldo update
        }

        function processInbox(amt) {
            let s = parseInt(localStorage.getItem('user_balance') || 0);
            localStorage.setItem('user_balance', s + amt);
            alert(`Berhasil! IDR ${amt.toLocaleString()} masuk ke saldo.`);
            window.location.href='game.html';
        }
    </script>
</body>
</html>
