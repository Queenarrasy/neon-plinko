<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Rewards & Inbox - Neon Plinko</title>
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --gold: #fbff00; --bg-dark: #0a0b1e; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .reward-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 0, 119, 0.3); border-radius: 20px; width: 100%; max-width: 400px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; }
        
        /* Tab Menu */
        .tab-container { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: 1px solid var(--neon-pink); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        .btn-claim { background: linear-gradient(45deg, var(--neon-blue), #0055ff); border: none; color: white; padding: 12px 30px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        
        /* Kotak Masuk / Inbox Style */
        .inbox-item { background: rgba(255,255,255,0.07); border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--gold); }
        .inbox-title { color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; }
        .inbox-desc { font-size: 12px; color: #ccc; display: block; margin-bottom: 10px; }
        
        .badge-new { background: red; color: white; font-size: 9px; padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="game.html" style="color: var(--neon-blue); text-decoration: none; font-weight: bold;">⬅ KEMBALI</a>
        <h2 style="color: var(--neon-pink); margin: 0;">REWARDS CENTER</h2>
        <div style="width: 50px;"></div>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('reward')">HADIAH</button>
        <button class="tab-btn" onclick="switchTab('inbox')">KOTAK MASUK <span id="inbox-count" class="badge-new" style="display:none">0</span></button>
    </div>

    <div id="reward-section" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="reward-card">
            <span style="font-size: 40px;">📅</span>
            <h3>DAILY LOGIN</h3>
            <p id="day-counter" style="color: var(--gold); font-size: 12px;">HARI KE-1</p>
            <button id="dailyBtn" onclick="claimDaily()" class="btn-claim">KLAIM IDR 1.000</button>
        </div>
