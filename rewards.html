<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REWARD & REFERRAL VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .btn-back { color: var(--neon-blue); text-decoration: none; font-weight: 900; font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; text-transform: uppercase; }

        /* REWARD CARDS */
        .section-card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .section-card h3 { margin: 0 0 15px 0; font-size: 16px; color: var(--neon-gold); display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px var(--neon-gold); }

        /* DAILY REWARD */
        .daily-box { display: flex; justify-content: space-between; align-items: center; }
        .reward-info small { color: #888; display: block; font-size: 10px; }
        .btn-claim { background: var(--neon-pink); border: none; padding: 10px 20px; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; box-shadow: 0 0 15px var(--neon-pink); }
        .btn-claim:disabled { background: #333; box-shadow: none; cursor: not-allowed; opacity: 0.6; }

        /* INBOX */
        .inbox-item { border-left: 3px solid var(--neon-blue); background: rgba(0, 212, 255, 0.05); padding: 12px; border-radius: 0 10px 10px 0; margin-top: 10px; }
        .empty-msg { color: #666; font-size: 13px; font-style: italic; text-align: center; padding: 10px; }

        /* REFERRAL */
        .ref-code-box { 
            background: #000; border: 1px dashed var(--neon-blue); padding: 15px; 
            border-radius: 12px; text-align: center; margin-top: 10px;
        }
        .ref-code { font-size: 24px; font-weight: 900; color: var(--neon-blue); letter-spacing: 3px; display: block; margin: 5px 0; }
        .ref-status { font-size: 11px; color: #aaa; line-height: 1.4; margin-top: 10px; }
        .copy-btn { color: var(--neon-blue); font-size: 12px; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
    </style>
</head>
<body>

    <div class="container">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI</a>

        <div class="section-card" style="border-color: var(--neon-pink);">
            <h3><i class="fa-solid fa-calendar-check"></i> HADIAH HARIAN</h3>
            <div class="daily-box">
                <div class="reward-info">
                    <span style="font-size: 18px; font-weight: bold;">IDR 1.000</span>
                    <small>Berlaku 1x klaim/hari. Terlewat = Hangus.</small>
                </div>
                <button class="btn-claim" id="claimBtn" onclick="claimDaily()">KLAIM</button>
            </div>
        </div>

        <div class="section-card" style="border-color: var(--neon-blue);">
            <h3><i class="fa-solid fa-envelope-open-text"></i> KOTAK MASUK</h3>
            <div id="inbox-container">
                <p class="empty-msg">Pesan kosong, cek lain hari untuk reward lain nya.</p>
            </div>
        </div>

        <div class="section-card" style="border-color: var(--neon-gold);">
            <h3><i class="fa-solid fa-users"></i> PROGRAM REFERRAL</h3>
            <div class="ref-code-box">
                <small style="color: #888;">KODE UNDANGAN ANDA</small>
                <span class="ref-code" id="myRefCode">Loading...</span>
                <button class="copy-btn" onclick="copyRef()">SALIN KODE</button>
            </div>
            <div class="ref-status">
                <i class="fa-solid fa-circle-info"></i> Dapatkan <b>IDR 5.000</b> setiap teman yang Anda undang melakukan deposit minimal <b>IDR 20.000</b> pertama kali.
            </div>
        </div>
    </div>

    <script>
        // INISIALISASI DATA
        let balance = parseInt(localStorage.getItem('saldo_vip')) || 0;
        let lastClaim = localStorage.getItem('last_daily_claim'); // Format: YYYY-MM-DD
        let myRefCode = localStorage.getItem('my_referral_code');

        // Buat Kode Referral Unik jika belum ada
        if (!myRefCode) {
            myRefCode = "PLK" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('my_referral_code', myRefCode);
        }
        document.getElementById('myRefCode').innerText = myRefCode;

        // CEK STATUS KLAIM HARIAN
        function checkDailyStatus() {
            const today = new Date().toISOString().split('T')[0];
            if (lastClaim === today) {
                const btn = document.getElementById('claimBtn');
                btn.disabled = true;
                btn.innerText = "SUDAH KLAIM";
            }
        }

        function claimDaily() {
            const today = new Date().toISOString().split('T')[0];
            balance += 1000;
            localStorage.setItem('saldo_vip', balance);
            localStorage.setItem('last_daily_claim', today);
            alert("Berhasil klaim IDR 1.000!");
            location.reload();
        }

        // SIMULASI KOTAK MASUK DARI ADMIN
        function loadInbox() {
            const adminMessage = localStorage.getItem('admin_reward_msg'); // Data disuntik admin
            if (adminMessage) {
                const container = document.getElementById('inbox-container');
                container.innerHTML = `
                    <div class="inbox-item">
                        <small style="color:var(--neon-blue)">Pesan Sistem • Baru</small>
                        <div style="font-size:14px; margin-top:5px;">${adminMessage}</div>
                    </div>
                `;
            }
        }

        function copyRef() {
            const code = document.getElementById('myRefCode').innerText;
            navigator.clipboard.writeText(code);
            alert("Kode referral berhasil disalin!");
        }

        // Jalankan Fungsi
        checkDailyStatus();
        loadInbox();
    </script>
</body>
</html>
