<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW NEON VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        
        /* HEADER & SALDO */
        .btn-back { color: var(--neon-blue); text-decoration: none; font-weight: 900; font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; text-transform: uppercase; }
        .balance-card { 
            background: linear-gradient(145deg, #0a0c1f, #151833); border: 2px solid var(--neon-blue); 
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        .balance-amount { font-size: 28px; font-weight: 900; color: white; display: block; margin-top: 5px; }

        /* FORM TARIK */
        .wd-form { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="number"] { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: var(--neon-gold); font-size: 20px; font-weight: 900; outline: none; text-align: center; box-sizing: border-box;
        }
        .target-box { margin-top: 15px; background: #000; padding: 12px; border-radius: 10px; border: 1px solid #222; font-size: 12px; display: flex; justify-content: space-between; }
        .btn-wd { 
            width: 100%; padding: 16px; background: var(--neon-pink); border: none; border-radius: 12px; 
            color: white; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px var(--neon-pink); margin-top: 15px;
        }

        /* RIWAYAT */
        .history-section { margin-top: 10px; }
        .history-header { font-size: 12px; color: var(--neon-blue); font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .history-item { 
            background: rgba(0,0,0,0.4); border: 1px solid #222; border-radius: 15px; 
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .hist-left { display: flex; flex-direction: column; }
        .hist-date { font-size: 9px; color: #666; margin-bottom: 4px; }
        .hist-amount { font-size: 15px; font-weight: bold; color: #fff; }
        .hist-status { font-size: 10px; font-weight: 900; padding: 5px 10px; border-radius: 7px; transition: 0.3s; }

        /* POPUP NEON */
        #wd-popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; max-width: 320px; background: #000; border: 2px solid var(--neon-blue); 
            border-radius: 20px; padding: 25px; z-index: 10000; text-align: center; box-shadow: 0 0 50px var(--neon-blue);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <div id="wd-popup">
        <div id="popup-msg" style="font-weight: bold; margin-bottom: 20px; font-size: 14px; line-height: 1.5;"></div>
        <button onclick="closePopup()" style="background: var(--neon-blue); border: none; padding: 10px 30px; border-radius: 10px; font-weight: 900; cursor: pointer;">OKE</button>
    </div>

    <div class="container">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI</a>

        <div class="balance-card">
            <span style="font-size: 10px; color: var(--neon-blue); letter-spacing: 2px; font-weight: 900;">SALDO PERMAINAN</span>
            <span class="balance-amount" id="display-saldo">IDR 0</span>
        </div>

        <div class="wd-form">
            <label>NOMINAL PENARIKAN (MIN 50.000)</label>
            <input type="number" id="wd-amount" placeholder="IDR 0">
            
            <div class="target-box">
                <span style="color: #555; font-weight: bold;">TUJUAN:</span> 
                <b id="user-target" style="color: var(--neon-blue);">MEMUAT...</b>
            </div>

            <button class="btn-wd" onclick="handleWithdraw()">AJUKAN PENARIKAN</button>
        </div>

        <div class="history-section">
            <div class="history-header"><i class="fa-solid fa-history"></i> RIWAYAT PENARIKAN</div>
            <div id="history-list">
                <div style="text-align: center; color: #444; font-size: 12px; padding: 20px;">Belum ada riwayat transaksi.</div>
            </div>
        </div>
    </div>

    <script>
        // INISIALISASI DATA DARI REGISTRASI
        let saldo = parseInt(localStorage.getItem('saldo_vip')) || 0;
        const bank = localStorage.getItem('bank_name') || "BANK";
        const rek = localStorage.getItem('acc_number') || "0000";

        document.getElementById('display-saldo').innerText = "IDR " + saldo.toLocaleString();
        document.getElementById('user-target').innerText = `${bank} - ${rek}`;

        function showPopup(msg, isError = false) {
            const popup = document.getElementById('wd-popup');
            const text = document.getElementById('popup-msg');
            popup.style.borderColor = isError ? 'var(--neon-pink)' : 'var(--neon-blue)';
            popup.style.boxShadow = isError ? '0 0 50px var(--neon-pink)' : '0 0 50px var(--neon-blue)';
            text.innerText = msg;
            popup.style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('wd-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // LOGIKA PENARIKAN
        function handleWithdraw() {
            const amount = parseInt(document.getElementById('wd-amount').value);

            if (!amount || amount < 50000) {
                showPopup("MINIMAL PENARIKAN ADALAH IDR 50.000", true);
                return;
            }
            if (amount > saldo) {
                showPopup("MAAF, SALDO PERMAINAN ANDA TIDAK MENCUKUPI!", true);
                return;
            }

            // Potong Saldo Permainan
            saldo -= amount;
            localStorage.setItem('saldo_vip', saldo);
            document.getElementById('display-saldo').innerText = "IDR " + saldo.toLocaleString();

            // Simpan Riwayat dengan Waktu Lengkap
            const now = new Date();
            const timeStr = `${now.toLocaleDateString('id-ID')} | ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            const wdID = "WD" + Math.floor(100000 + Math.random() * 900000);
            const wdItem = {
                id: wdID,
                date: timeStr,
                amount: amount.toLocaleString(),
                status: "PROSES"
            };

            let history = JSON.parse(localStorage.getItem('wd_history') || "[]");
            history.unshift(wdItem);
            localStorage.setItem('wd_history', JSON.stringify(history));

            showPopup("PERMINTAAN BERHASIL! DANA SEDANG DIPROSES OLEH ADMIN.");
            document.getElementById('wd-amount').value = "";
            renderHistory();

            // SIMULASI: Status berubah BERHASIL setelah 10 detik
            setTimeout(() => {
                let currentHist = JSON.parse(localStorage.getItem('wd_history') || "[]");
                if(currentHist.length > 0 && currentHist[0].id === wdID) {
                    currentHist[0].status = "BERHASIL";
                    localStorage.setItem('wd_history', JSON.stringify(currentHist));
                    renderHistory();
                    showPopup("DANA IDR " + amount.toLocaleString() + " TELAH BERHASIL DIKIRIM KE REKENING ANDA!");
                }
            }, 10000);
        }

        // RENDER TABEL RIWAYAT
        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('wd_history') || "[]");
            const container = document.getElementById('history-list');

            if (history.length > 0) {
                container.innerHTML = history.map(item => {
                    const statusStyle = item.status === "BERHASIL" ? 
                        "background: rgba(0, 212, 255, 0.1); color: var(--neon-blue);" : 
                        "background: rgba(251, 255, 0, 0.1); color: var(--neon-gold);";
                    
                    return `
                        <div class="history-item">
                            <div class="hist-left">
                                <span class="hist-date">${item.date}</span>
                                <span class="hist-amount">IDR ${item.amount}</span>
                            </div>
                            <span class="hist-status" style="${statusStyle}">${item.status}</span>
                        </div>
                    `;
                }).join('');
            }
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
