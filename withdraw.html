<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .card { 
            background: rgba(255,255,255,0.03); 
            border: 2px solid var(--pink); 
            border-radius: 25px; 
            padding: 25px; 
            max-width: 400px; 
            margin: auto; 
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
            position: relative;
        }

        .saldo-container {
            background: #000;
            border: 1px solid var(--blue);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }
        .saldo-label { font-size: 10px; color: var(--blue); font-weight: 900; text-transform: uppercase; }
        .saldo-value { font-size: 20px; color: #fff; font-weight: 900; text-shadow: 0 0 5px var(--blue); }
        
        .info-box { background: #000; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 20px; border-left: 4px solid var(--blue); }
        .info-item { margin-bottom: 8px; }
        .info-item:last-child { margin-bottom: 0; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000; 
            color: white; 
            margin-top: 10px; 
            box-sizing: border-box; 
            outline: none; 
            font-weight: bold;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .btn-wd { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(90deg, var(--pink), #ff4d94); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--pink); 
            text-transform: uppercase;
        }

        .history-section { margin-top: 30px; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; border: 1px solid #222;}
        .history-title { font-size: 12px; color: var(--blue); font-weight: 900; margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 8px;}
        .table-scroll { max-height: 160px; overflow-y: auto; border-radius: 8px;}
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { color: #666; text-align: left; padding: 10px 8px; border-bottom: 1px solid #333; font-weight: 900; text-transform: uppercase; }
        td { padding: 12px 8px; border-bottom: 1px solid #111; font-family: monospace; }
        .status-proses { color: #ffcc00; font-weight: bold; }
        .status-berhasil { color: #00ff88; font-weight: bold; }
        .btn-back { display: block; margin-top: 25px; padding: 12px; text-decoration: none; color: #888; font-size: 12px; font-weight: 900; border: 1px solid #222; border-radius: 10px;}
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000000; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0, 212, 255, 0.1); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #neon-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .neon-modal { background: #0d0f26; border: 2px solid var(--pink); border-radius: 25px; padding: 30px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 40px var(--pink); }
        .neon-modal-btn { flex: 1; background: linear-gradient(90deg, var(--blue), #0088ff); border: none; padding: 12px 0; border-radius: 50px; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .neon-modal-btn.cancel { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--blue); font-size: 10px; font-weight: bold; letter-spacing: 2px;">PROCESSING...</p>
    </div>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title" style="color: var(--pink);">INFO</h2>
            <p id="modal-msg">Pesan sistem di sini.</p>
            <div style="display: flex; gap: 10px;" id="modal-footer">
                <button class="neon-modal-btn" onclick="closeNeonModal()" id="btn-modal-close">MENGERTI</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="color: var(--pink); margin-top: 0;"><i class="fa-solid fa-money-bill-transfer"></i> <span>WITHDRAW</span></h2>
        
        <div class="saldo-container">
            <div class="saldo-label">Saldo Permainan</div>
            <div class="saldo-value" id="wd-display-saldo">IDR 0</div>
        </div>

        <div class="info-box">
            <div class="info-item">
                <small style="color: #666; font-weight: 900; font-size: 8px;">NAMA SESUAI REKENING:</small><br>
                <b id="wd-full-name" style="color: #fff; text-transform: uppercase; font-size: 13px;">-</b>
            </div>
            <div class="info-item">
                <small style="color: #666; font-weight: 900; font-size: 8px;">TUJUAN REKENING:</small><br>
                <b id="wd-bank-display" style="color: var(--blue); text-transform: uppercase;">-</b> 
                <span id="wd-rek-display" style="color: #fff; letter-spacing: 1px; font-family: monospace; margin-left: 5px;">-</span>
            </div>
        </div>

        <input type="hidden" id="wd-bank">
        <input type="hidden" id="wd-rekening">

        <input type="number" id="wd-amount" placeholder="Jumlah Penarikan (Min: 50.000)">
        <button class="btn-wd" onclick="konfirmasiWD()">AJUKAN PENARIKAN</button>
        
        <div class="history-section">
            <div class="history-title">RIWAYAT PENARIKAN</div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>TANGGAL / WAKTU</th>
                            <th>TOTAL</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="wd-history-list"></tbody>
                </table>
            </div>
        </div>

        <a href="game.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> <span>KEMBALI KE PERMAINAN</span>
        </a>
    </div>

    <script src="global.js"></script>
    <script>
        function loadWithdrawData() {
            const fullName = localStorage.getItem('fullname') || "-";
            const bankName = localStorage.getItem('bank_name') || "-";
            const accNumber = localStorage.getItem('account_no') || "-";
            const saldo = localStorage.getItem('saldo_permainan') || 0;

            document.getElementById('wd-full-name').innerText = fullName;
            document.getElementById('wd-bank-display').innerText = bankName;
            document.getElementById('wd-rek-display').innerText = accNumber;
            document.getElementById('wd-display-saldo').innerText = "IDR " + parseInt(saldo).toLocaleString('id-ID');

            document.getElementById('wd-bank').value = bankName;
            document.getElementById('wd-rekening').value = accNumber;
        }

        function showNeonModal(msg, title = "INFO", isConfirm = false, onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            const footer = document.getElementById('modal-footer');
            if (isConfirm) {
                footer.innerHTML = `
                    <button class="neon-modal-btn cancel" onclick="closeNeonModal()">BATAL</button>
                    <button class="neon-modal-btn" id="confirm-ok">YA, TARIK</button>
                `;
                document.getElementById('confirm-ok').onclick = () => { closeNeonModal(); if(onConfirm) onConfirm(); };
            } else {
                footer.innerHTML = `<button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>`;
            }
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeNeonModal() { document.getElementById('neon-modal-overlay').style.display = 'none'; }

        function konfirmasiWD() {
            const amt = parseInt(document.getElementById('wd-amount').value);
            const saldo = parseInt(localStorage.getItem('saldo_permainan')) || 0;

            if (isNaN(amt) || amt < 50000) {
                showNeonModal("Minimal penarikan adalah IDR 50.000", "DATA TIDAK VALID");
                return;
            }
            if (amt > saldo) {
                showNeonModal("Saldo Permainan tidak mencukupi!", "SALDO KURANG");
                return;
            }

            showNeonModal(`Tarik IDR ${amt.toLocaleString('id-ID')} ke rekening Anda?`, "KONFIRMASI", true, prosesWDCloud);
        }

        async function prosesWDCloud() {
            const amt = parseInt(document.getElementById('wd-amount').value);
            const user = localStorage.getItem('user_session');
            const bank = document.getElementById('wd-bank').value;
            const rek = document.getElementById('wd-rekening').value;
            const full = document.getElementById('wd-full-name').innerText;

            document.getElementById('loading-overlay').style.display = 'flex';
            const skrg = new Date().toLocaleString('id-ID');

            try {
                const result = await fetchCloud({
                    action: "withdraw",
                    username: user,
                    fullname: full,
                    bank: bank,
                    rekening: rek,
                    amount: amt,
                    date: skrg
                });

                document.getElementById('loading-overlay').style.display = 'none';

                if (result === "SUCCESS") {
                    const saldoBaru = (parseInt(localStorage.getItem('saldo_permainan')) || 0) - amt;
                    localStorage.setItem('saldo_permainan', saldoBaru);

                    showNeonModal("Penarikan berhasil diajukan!", "SUKSES");
                    document.getElementById('wd-amount').value = "";
                    loadWithdrawData();
                    renderHistory(); // Sekarang mengambil data terbaru dari Cloud
                } else {
                    showNeonModal("Gagal mengirim permintaan.", "ERROR");
                }
            } catch (e) {
                document.getElementById('loading-overlay').style.display = 'none';
                showNeonModal("Kesalahan koneksi!", "ERROR");
            }
        }

        // --- FUNGSI RIWAYAT TERBARU (SINKRON DENGAN SHEET) ---
        async function renderHistory() {
            const list = document.getElementById('wd-history-list');
            const user = localStorage.getItem('user_session');
            
            list.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#666;'>Memuat riwayat...</td></tr>";

            try {
                const history = await fetchCloud({
                    action: "getHistory",
                    username: user
                });

                list.innerHTML = ""; 

                if (!history || history.length === 0) {
                    list.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#444;'>Belum ada penarikan</td></tr>";
                    return;
                }

                history.forEach(item => {
                    let statusClass = "status-proses";
                    let statusText = item.status;

                    if (item.status === "SUCCESS") {
                        statusClass = "status-berhasil";
                        statusText = "BERHASIL";
                    } else if (item.status === "GAGAL") {
                        statusText = "DITOLAK";
                    }

                    const row = `<tr>
                        <td style="font-size: 9px;">${item.tanggal}</td>
                        <td style="color: #fbff00">IDR ${parseInt(item.total).toLocaleString('id-ID')}</td>
                        <td class="${statusClass}">${statusText}</td>
                    </tr>`;
                    list.innerHTML += row;
                });
            } catch (e) {
                list.innerHTML = "<tr><td colspan='3' style='text-align:center; color:red;'>Gagal sinkronisasi data</td></tr>";
            }
        }

        window.onload = () => {
            loadWithdrawData();
            renderHistory();
            if (typeof applyLanguage === 'function') applyLanguage();
        };
    </script>
</body>
</html>
