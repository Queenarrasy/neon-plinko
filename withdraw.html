<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHDRAW VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #070816; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 2px solid #ff0077; border-radius: 25px; padding: 25px; }
        .info-box { background: #000; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 20px; border-left: 4px solid #00d4ff; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #111; color: white; margin-top: 10px; box-sizing: border-box; }
        .btn-wd { width: 100%; padding: 15px; background: #ff0077; color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fa-solid fa-money-bill-transfer"></i> PENARIKAN</h2>
        <div class="info-box">
            <small style="color: #666; font-weight: bold;">TUJUAN PENARIKAN:</small><br>
            <b id="wd-bank">-</b><br>
            <span id="wd-rek">-</span>
        </div>
        <input type="number" id="wd-amount" placeholder="Masukkan Jumlah (Min: 50.000)">
        <button class="btn-wd" onclick="prosesWD()">KONFIRMASI WD</button>
        <button onclick="location.href='game.html'" style="background:none; border:none; color:#666; margin-top:15px;">Kembali</button>
    </div>

    <script>
        // Ambil data pendaftaran
        document.getElementById('wd-bank').innerText = localStorage.getItem('bank_name') || "Belum Set";
        document.getElementById('wd-rek').innerText = localStorage.getItem('acc_number') || "00000000";

        function prosesWD() {
            const amt = document.getElementById('wd-amount').value;
            if(amt >= 50000) alert("Permintaan WD Diproses!");
            else alert("Minimal WD IDR 50.000");
        }
    </script>
</body>
</html>
