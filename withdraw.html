<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .card { 
            background: rgba(255,255,255,0.03); 
            border: 2px solid var(--pink); 
            border-radius: 25px; 
            padding: 25px; 
            max-width: 400px; 
            margin: auto; 
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
            position: relative;
        }

        /* Saldo Display */
        .saldo-container {
            background: #000;
            border: 1px solid var(--blue);
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }
        .saldo-label { font-size: 10px; color: var(--blue); font-weight: 900; text-transform: uppercase; }
        .saldo-value { font-size: 20px; color: #fff; font-weight: 900; text-shadow: 0 0 5px var(--blue); }
        
        /* Box Info Rekening */
        .info-box { background: #000; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 20px; border-left: 4px solid var(--blue); }
        .info-item { margin-bottom: 8px; }
        .info-item:last-child { margin-bottom: 0; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000; 
            color: white; 
            margin-top: 10px; 
            box-sizing: border-box; 
            outline: none; 
            font-weight: bold;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .btn-wd { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(90deg, var(--pink), #ff4d94); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--pink); 
            text-transform: uppercase;
        }

        /* RIWAYAT - Scrollable Table */
        .history-section { 
            margin-top: 30px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #222;
        }
        .history-title { 
            font-size: 12px; 
            color: var(--blue); 
            font-weight: 900; 
            margin-bottom: 15px; 
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-title::before { content: ""; width: 3px; height: 12px; background: var(--blue); display: inline-block; }
        
        .table-scroll {
            max-height: 160px; 
            overflow-y: auto;  
            border-radius: 8px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        thead { position: sticky; top: 0; background: #111; z-index: 1; }
        th { color: #666; text-align: left; padding: 10px 8px; border-bottom: 1px solid #333; font-weight: 900; text-transform: uppercase; }
        td { padding: 12px 8px; border-bottom: 1px solid #111; font-family: monospace; }
        
        .status-proses { color: #ffcc00; font-weight: bold; text-transform: uppercase; }
        .status-berhasil { color: #00ff88; font-weight: bold; text-transform: uppercase; }

        .btn-back {
            display: block;
            margin-top: 25px;
            padding: 12px;
            text-decoration: none;
            color: #888;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid #222;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { color: white; border-color: #444; background: rgba(255,255,255,0.05); }

        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .neon-modal {
            background: #0d0f26; border: 2px solid var(--pink); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 40px var(--pink);
        }
        .neon-modal-btn {
            flex: 1; background: linear-gradient(90deg, var(--blue), #0088ff); border: none;
            padding: 12px 0; border-radius: 50px; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .neon-modal-btn.cancel { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title" style="color: var(--pink);">INFO</h2>
            <p id="modal-msg">Pesan sistem di sini.</p>
            <div style="display: flex; gap: 10px;" id="modal-footer">
                <button class="neon-modal-btn" onclick="closeNeonModal()" id="btn-modal-close">MENGERTI</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="color: var(--pink); margin-top: 0;"><i class="fa-solid fa-money-bill-transfer"></i> <span data-i18n="nav-withdraw">WITHDRAW</span></h2>
        
        <div class="saldo-container">
            <div class="saldo-label" data-i18n="label-saldo-game">Saldo Permainan</div>
            <div class="saldo-value" id="wd-display-saldo">IDR 0</div>
        </div>

        <div class="info-box">
            <div class="info-item">
                <small style="color: #666; font-weight: 900; font-size: 8px;" data-i18n="label-name-rek">NAMA SESUAI REKENING:</small><br>
                <b id="wd-full-name" style="color: #fff; text-transform: uppercase; font-size: 13px;">-</b>
            </div>
            <div class="info-item">
                <small style="color: #666; font-weight: 900; font-size: 8px;" data-i18n="label-target-rek">TUJUAN REKENING:</small><br>
                <b id="wd-bank" style="color: var(--blue); text-transform: uppercase;">-</b> 
                <span id="wd-rek" style="color: #fff; letter-spacing: 1px; font-family: monospace; margin-left: 5px;">-</span>
            </div>
        </div>

        <input type="number" id="wd-amount" placeholder="Jumlah Penarikan (Min: 50.000)">
        <button class="btn-wd" onclick="konfirmasiWD()" data-i18n="btn-submit-wd">AJUKAN PENARIKAN</button>
        
        <div class="history-section">
            <div class="history-title" data-i18n="label-history-wd">RIWAYAT PENARIKAN</div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="th-date">TANGGAL / WAKTU</th>
                            <th data-i18n="th-total">TOTAL</th>
                            <th data-i18n="th-status">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="wd-history-list">
                    </tbody>
                </table>
            </div>
        </div>

        <a href="game.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> <span data-i18n="btn-back-game">KEMBALI KE PERMAINAN</span>
        </a>
    </div>

    <script src="global.js"></script>
    <script>
        // Ambil bahasa dari global.js atau default ID
        const getLang = () => localStorage.getItem('appLang') || 'id';

        function updateSaldoUI() {
            const saldo = parseInt(localStorage.getItem('saldo_permainan')) || 0;
            document.getElementById('wd-display-saldo').innerText = "IDR " + saldo.toLocaleString('id-ID');
        }

        function showNeonModal(msg, title = "INFO", isConfirm = false, onConfirm = null) {
            const lang = getLang();
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            const footer = document.getElementById('modal-footer');
            
            const txtBatal = lang === 'id' ? 'BATAL' : 'CANCEL';
            const txtYa = lang === 'id' ? 'YA, TARIK' : 'YES, WITHDRAW';
            const txtOk = lang === 'id' ? 'MENGERTI' : 'I UNDERSTAND';

            if (isConfirm) {
                footer.innerHTML = `
                    <button class="neon-modal-btn cancel" onclick="closeNeonModal()">${txtBatal}</button>
                    <button class="neon-modal-btn" id="confirm-ok">${txtYa}</button>
                `;
                document.getElementById('confirm-ok').onclick = () => { closeNeonModal(); if(onConfirm) onConfirm(); };
            } else {
                footer.innerHTML = `<button class="neon-modal-btn" onclick="closeNeonModal()">${txtOk}</button>`;
            }
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeNeonModal() { document.getElementById('neon-modal-overlay').style.display = 'none'; }

        // Load data rekening
        document.getElementById('wd-full-name').innerText = localStorage.getItem('full_name') || "User VIP";
        document.getElementById('wd-bank').innerText = localStorage.getItem('bank_name') || "Bank";
        document.getElementById('wd-rek').innerText = localStorage.getItem('acc_number') || "000000";

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('history_wd') || "[]");
            const list = document.getElementById('wd-history-list');
            const lang = getLang();
            const emptyMsg = lang === 'id' ? "Belum ada penarikan" : "No withdrawals yet";

            list.innerHTML = history.length === 0 ? `<tr><td colspan='3' style='text-align:center; color:#444; padding: 20px;'>${emptyMsg}</td></tr>` : "";
            
            history.slice().reverse().forEach(item => {
                // Terjemahan status
                let displayStatus = item.status;
                if(lang === 'en') {
                    displayStatus = item.status === 'Proses' ? 'Processing' : 'Success';
                }

                const statusClass = item.status === 'Berhasil' ? 'status-berhasil' : 'status-proses';
                const row = `<tr>
                    <td style="font-size: 9px; line-height: 1.2;">${item.tanggal}</td>
                    <td style="color: #fbff00">IDR ${parseInt(item.total).toLocaleString('id-ID')}</td>
                    <td class="${statusClass}">${displayStatus}</td>
                </tr>`;
                list.innerHTML += row;
            });
        }

        function konfirmasiWD() {
            const lang = getLang();
            const amtInput = document.getElementById('wd-amount');
            const amt = parseInt(amtInput.value);
            const saldoSaatIni = parseInt(localStorage.getItem('saldo_permainan')) || 0;

            if (isNaN(amt) || amt < 50000) {
                const msg = lang === 'id' ? "Minimal penarikan adalah IDR 50.000" : "Minimum withdrawal is IDR 50,000";
                const title = lang === 'id' ? "DATA TIDAK VALID" : "INVALID DATA";
                showNeonModal(msg, title);
                return;
            }

            if (amt > saldoSaatIni) {
                const msg = lang === 'id' ? "Saldo Permainan tidak mencukupi!" : "Insufficient game balance!";
                const title = lang === 'id' ? "SALDO KURANG" : "INSUFFICIENT BALANCE";
                showNeonModal(msg, title);
                return;
            }

            const confirmMsg = lang === 'id' 
                ? `Tarik saldo IDR ${amt.toLocaleString('id-ID')} ke rekening Anda?` 
                : `Withdraw IDR ${amt.toLocaleString('id-ID')} to your account?`;
            
            const confirmTitle = lang === 'id' ? "KONFIRMASI WD" : "WITHDRAW CONFIRMATION";

            showNeonModal(confirmMsg, confirmTitle, true, prosesWD);
        }

        function prosesWD() {
            const amtInput = document.getElementById('wd-amount');
            const amt = parseInt(amtInput.value);
            const saldoSaatIni = parseInt(localStorage.getItem('saldo_permainan')) || 0;
            const lang = getLang();

            const saldoBaru = saldoSaatIni - amt;
            localStorage.setItem('saldo_permainan', saldoBaru);

            const skrg = new Date();
            const d = String(skrg.getDate()).padStart(2, '0');
            const m = String(skrg.getMonth() + 1).padStart(2, '0');
            const y = skrg.getFullYear();
            const jam = String(skrg.getHours()).padStart(2, '0');
            const min = String(skrg.getMinutes()).padStart(2, '0');
            const sec = String(skrg.getSeconds()).padStart(2, '0');
            const tglString = `${d}/${m}/${y} ${jam}:${min}:${sec}`;
            
            const history = JSON.parse(localStorage.getItem('history_wd') || "[]");
            history.push({ tanggal: tglString, total: amt, status: "Proses" });
            localStorage.setItem('history_wd', JSON.stringify(history));

            const successMsg = lang === 'id' ? "Berhasil! Penarikan sedang diproses." : "Success! Withdrawal is being processed.";
            const successTitle = lang === 'id' ? "SUKSES" : "SUCCESS";
            
            showNeonModal(successMsg, successTitle);
            
            amtInput.value = "";
            updateSaldoUI();
            renderHistory();
        }

        window.onload = () => {
            // Jalankan applyLanguage dari global.js jika tersedia
            if (typeof applyLanguage === "function") applyLanguage();
            
            // Atur placeholder input sesuai bahasa
            const lang = getLang();
            document.getElementById('wd-amount').placeholder = lang === 'id' 
                ? "Jumlah Penarikan (Min: 50.000)" 
                : "Withdrawal Amount (Min: 50,000)";

            updateSaldoUI();
            renderHistory();
        };
    </script>
</body>
</html>
