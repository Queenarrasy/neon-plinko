<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW VIP - NEON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .card { 
            background: rgba(255,255,255,0.03); 
            border: 2px solid var(--pink); 
            border-radius: 25px; 
            padding: 25px; 
            max-width: 400px; 
            margin: auto; 
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
            backdrop-filter: blur(10px);
        }

        .saldo-container {
            background: #000;
            border: 1px solid var(--blue);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
        }
        .saldo-label { font-size: 10px; color: var(--blue); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .saldo-value { font-size: 24px; color: #fff; font-weight: 900; text-shadow: 0 0 5px var(--blue); margin-top: 5px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { font-size: 9px; color: var(--blue); font-weight: 900; margin-left: 5px; text-transform: uppercase; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000; 
            color: white; 
            margin-top: 5px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 14px;
        }
        input:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(255, 0, 119, 0.2); }
        
        .btn-wd { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(90deg, var(--pink), #ff4d94); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            margin-top: 10px; 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--pink); 
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-wd:active { transform: scale(0.98); }

        .history-section { margin-top: 30px; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; border: 1px solid #222;}
        .history-title { font-size: 11px; color: var(--blue); font-weight: 900; margin-bottom: 15px; text-align: left; letter-spacing: 1px;}
        .table-scroll { max-height: 200px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { color: #666; text-align: left; padding: 10px 5px; border-bottom: 1px solid #333; font-weight: 900; }
        td { padding: 12px 5px; border-bottom: 1px solid #111; }
        
        .status-proses { color: var(--yellow); font-weight: bold; }
        .status-berhasil { color: #00ff88; font-weight: bold; text-shadow: 0 0 5px #00ff88; }
        
        .btn-back { display: block; margin-top: 20px; padding: 12px; text-decoration: none; color: #888; font-size: 11px; font-weight: 900; border: 1px solid #222; border-radius: 10px; text-transform: uppercase;}

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000000; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0, 212, 255, 0.1); border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #neon-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .neon-modal { background: #0d0f26; border: 2px solid var(--pink); border-radius: 25px; padding: 30px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 40px var(--pink); }
        .neon-modal-btn { flex: 1; background: var(--blue); border: none; padding: 12px; border-radius: 10px; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .neon-modal-btn.cancel { background: #333; color: #fff; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--blue); font-size: 10px; font-weight: bold; letter-spacing: 2px;">MENGHUBUNGKAN KE SERVER...</p>
    </div>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title" style="color: var(--pink); margin-top: 0;">INFO</h2>
            <p id="modal-msg">Pesan sistem.</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;" id="modal-footer">
                <button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="color: var(--pink); margin-top: 0; letter-spacing: 2px;"><i class="fa-solid fa-money-bill-transfer"></i> WITHDRAW</h2>
        
        <div class="saldo-container">
            <div class="saldo-label">Saldo Saat Ini</div>
            <div class="saldo-value" id="wd-display-saldo">IDR 0</div>
        </div>

        <div class="form-group">
            <label>NAMA SESUAI REKENING:</label>
            <input type="text" id="wd-name" readonly style="background: #111; color: #888; border-color: #222;">
        </div>

        <div class="form-group">
            <label>NOMOR REKENING TUJUAN:</label>
            <input type="text" id="wd-rek" readonly style="background: #111; color: #888; border-color: #222;">
        </div>

        <div class="form-group">
            <label>NOMINAL PENARIKAN (IDR):</label>
            <input type="number" id="wd-amount" placeholder="Contoh: 100000">
            <small style="color: #666; font-size: 9px; margin-top: 5px; display: block;">*Minimal penarikan IDR 50.000</small>
        </div>

        <button class="btn-wd" onclick="konfirmasiWD()">AJUKAN PENARIKAN</button>
        
        <div class="history-section">
            <div class="history-title"><i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT WD</div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>WAKTU</th>
                            <th>JUMLAH</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="wd-history-list">
                        </tbody>
                </table>
            </div>
        </div>

        <a href="game.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI KE LOBBY
        </a>
    </div>

    <script src="global.js"></script>
    <script>
        // URL Apps Script Anda
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqQWXIJuVnkIxLvdu3kYiiRDVh7eyrsy-KU6rG1qtQClgfAzmMoclv2ULFZ_hRdE_qUg/exec";

        function loadWithdrawData() {
            const name = localStorage.getItem('fullname') || "-";
            const rek = localStorage.getItem('account_no') || "-"; // Menggunakan kunci yang sama dengan auth.html
            const bank = localStorage.getItem('bank_name') || "-";
            const saldo = localStorage.getItem('saldo_permainan') || 0;

            document.getElementById('wd-name').value = name;
            document.getElementById('wd-rek').value = bank + " - " + rek;
            document.getElementById('wd-display-saldo').innerText = "IDR " + parseInt(saldo).toLocaleString('id-ID');
        }

        function showNeonModal(msg, title = "INFO", isConfirm = false, onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            const footer = document.getElementById('modal-footer');
            
            if (isConfirm) {
                footer.innerHTML = `
                    <button class="neon-modal-btn cancel" onclick="closeNeonModal()">BATAL</button>
                    <button class="neon-modal-btn" id="confirm-ok">YA, TARIK</button>
                `;
                document.getElementById('confirm-ok').onclick = () => { closeNeonModal(); if(onConfirm) onConfirm(); };
            } else {
                footer.innerHTML = `<button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>`;
            }
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeNeonModal() { document.getElementById('neon-modal-overlay').style.display = 'none'; }

        function konfirmasiWD() {
            const amt = parseInt(document.getElementById('wd-amount').value);
            const saldo = parseInt(localStorage.getItem('saldo_permainan')) || 0;

            if (isNaN(amt) || amt < 50000) {
                showNeonModal("Minimal penarikan adalah IDR 50.000", "DATA TIDAK VALID");
                return;
            }
            if (amt > saldo) {
                showNeonModal("Saldo Anda tidak mencukupi untuk melakukan penarikan ini.", "SALDO KURANG");
                return;
            }

            showNeonModal(`Anda akan menarik IDR ${amt.toLocaleString('id-ID')}?`, "KONFIRMASI", true, kirimWDKeCloud);
        }

        async function kirimWDKeCloud() {
            const amt = parseInt(document.getElementById('wd-amount').value);
            const user = localStorage.getItem('user_session');
            const full = localStorage.getItem('fullname');
            const bank = localStorage.getItem('bank_name');
            const rek = localStorage.getItem('account_no');

            document.getElementById('loading-overlay').style.display = 'flex';
            
            // Format Tanggal untuk Sheet
            const skrg = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });

            try {
                // Mengirim data ke action "withdraw" di Apps Script
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "withdraw",
                        tanggal: skrg,
                        username: user,
                        fullname: full,
                        bank: bank,
                        rekening: rek,
                        amount: amt,
                        status: "PROSES" // Otomatis berstatus PROSES saat ajukan
                    })
                });

                const result = await response.json();
                document.getElementById('loading-overlay').style.display = 'none';

                if (result.result === "SUCCESS") {
                    // Potong saldo di LocalStorage
                    const saldoBaru = (parseInt(localStorage.getItem('saldo_permainan')) || 0) - amt;
                    localStorage.setItem('saldo_permainan', saldoBaru);

                    showNeonModal("Permintaan penarikan telah dikirim dan sedang diproses admin.", "SUKSES");
                    document.getElementById('wd-amount').value = "";
                    loadWithdrawData();
                    renderHistory(); // Refresh tabel riwayat
                } else {
                    showNeonModal("Terjadi kesalahan pada server.", "GAGAL");
                }
            } catch (e) {
                document.getElementById('loading-overlay').style.display = 'none';
                showNeonModal("Gagal terhubung ke database. Coba lagi.", "KONEKSI ERROR");
            }
        }

        async function renderHistory() {
            const list = document.getElementById('wd-history-list');
            const user = localStorage.getItem('user_session');
            
            list.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px; color:#444;'>Sinkronisasi...</td></tr>";

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getHistory&username=${user}&type=withdraw`);
                const data = await response.json();

                list.innerHTML = ""; 

                if (!data || data.length === 0) {
                    list.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px; color:#444;'>Tidak ada riwayat.</td></tr>";
                    return;
                }

                data.forEach(item => {
                    let statusHTML = "";
                    // Filter tampilan status sesuai instruksi
                    if (item.status === "BERHASIL") {
                        statusHTML = `<span class="status-berhasil">BERHASIL</span>`;
                    } else if (item.status === "GAGAL" || item.status === "DITOLAK") {
                        statusHTML = `<span style="color:#ff4d4d;">DITOLAK</span>`;
                    } else {
                        statusHTML = `<span class="status-proses">PROSES</span>`;
                    }

                    const row = `<tr>
                        <td style="font-size: 9px; color: #888;">${item.tanggal}</td>
                        <td style="color: var(--yellow); font-weight: bold;">IDR ${parseInt(item.amount).toLocaleString('id-ID')}</td>
                        <td>${statusHTML}</td>
                    </tr>`;
                    list.innerHTML += row;
                });
            } catch (e) {
                list.innerHTML = "<tr><td colspan='3' style='text-align:center; color:red;'>Gagal memuat riwayat.</td></tr>";
            }
        }

        window.onload = () => {
            loadWithdrawData();
            renderHistory();
        };
    </script>
</body>
</html>
