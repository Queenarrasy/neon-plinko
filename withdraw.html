<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WITHDRAW VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .card { 
            background: rgba(255,255,255,0.03); 
            border: 2px solid var(--pink); 
            border-radius: 25px; 
            padding: 25px; 
            max-width: 400px; 
            margin: auto; 
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
            position: relative;
        }
        
        .info-box { background: #000; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 20px; border-left: 4px solid var(--blue); }
        
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #000; 
            color: white; 
            margin-top: 10px; 
            box-sizing: border-box; 
            outline: none; 
            font-weight: bold;
        }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .btn-wd { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(90deg, var(--pink), #ff4d94); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            margin-top: 20px; 
            cursor: pointer; 
            box-shadow: 0 0 15px var(--pink); 
            text-transform: uppercase;
        }

        /* RIWAYAT - Disamakan dengan gaya Deposit */
        .history-section { 
            margin-top: 30px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #222;
        }
        .history-title { 
            font-size: 12px; 
            color: var(--blue); 
            font-weight: 900; 
            margin-bottom: 15px; 
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-title::before { content: ""; width: 3px; height: 12px; background: var(--blue); display: inline-block; }
        
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { color: #666; text-align: left; padding: 10px 8px; border-bottom: 1px solid #333; font-weight: 900; text-transform: uppercase; }
        td { padding: 12px 8px; border-bottom: 1px solid #111; font-family: monospace; }
        
        .status-proses { color: #ffcc00; font-weight: bold; text-transform: uppercase; }
        .status-berhasil { color: #00ff88; font-weight: bold; text-transform: uppercase; }

        .btn-back {
            display: block;
            margin-top: 25px;
            padding: 12px;
            text-decoration: none;
            color: #888;
            font-size: 12px;
            font-weight: 900;
            border: 1px solid #222;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-back:hover { color: white; border-color: #444; background: rgba(255,255,255,0.05); }

        /* --- STYLE UNTUK NEON MODAL --- */
        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .neon-modal {
            background: #0d0f26; border: 2px solid var(--pink); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 40px var(--pink), inset 0 0 15px rgba(255, 0, 119, 0.2);
            animation: zoomModal 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomModal { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .neon-modal h2 { color: var(--pink); text-shadow: 0 0 10px var(--pink); margin-top: 0; letter-spacing: 2px; text-transform: uppercase; }
        .neon-modal p { color: #fff; line-height: 1.5; margin-bottom: 25px; font-size: 15px; }
        .neon-modal-footer { display: flex; gap: 10px; }
        .neon-modal-btn {
            flex: 1; background: linear-gradient(90deg, var(--blue), #0088ff); border: none;
            padding: 12px 0; border-radius: 50px; color: #000;
            font-weight: 900; cursor: pointer; box-shadow: 0 0 15px var(--blue);
            text-transform: uppercase;
        }
        .neon-modal-btn.cancel { background: #333; color: #fff; box-shadow: none; }
    </style>
</head>
<body>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title">INFO</h2>
            <p id="modal-msg">Pesan sistem di sini.</p>
            <div class="neon-modal-footer" id="modal-footer">
                <button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="color: var(--pink); margin-top: 0;"><i class="fa-solid fa-money-bill-transfer"></i> WITHDRAW</h2>
        
        <div class="info-box">
            <small style="color: #666; font-weight: 900; font-size: 9px;">TUJUAN TRANSFER:</small><br>
            <b id="wd-bank" style="color: var(--blue); text-transform: uppercase;">-</b><br>
            <span id="wd-rek" style="letter-spacing: 1px; font-family: monospace; font-size: 16px;">-</span>
        </div>

        <input type="number" id="wd-amount" placeholder="Jumlah Penarikan (Min: 50.000)">
        <button class="btn-wd" onclick="konfirmasiWD()">AJUKAN PENARIKAN</button>
        
        <div class="history-section">
            <div class="history-title">RIWAYAT PENARIKAN</div>
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL</th>
                        <th>TOTAL</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="wd-history-list">
                    </tbody>
            </table>
        </div>

        <a href="game.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> KEMBALI KE PERMAINAN
        </a>
    </div>

    <script src="global.js"></script>
    <script>
        // --- CUSTOM MODAL ENGINE ---
        function showNeonModal(msg, title = "INFO", isConfirm = false, onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            const footer = document.getElementById('modal-footer');
            
            if (isConfirm) {
                footer.innerHTML = `
                    <button class="neon-modal-btn cancel" onclick="closeNeonModal()">BATAL</button>
                    <button class="neon-modal-btn" id="confirm-ok">YA, TARIK</button>
                `;
                document.getElementById('confirm-ok').onclick = () => {
                    closeNeonModal();
                    if(onConfirm) onConfirm();
                };
            } else {
                footer.innerHTML = `<button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>`;
            }
            
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeNeonModal() {
            document.getElementById('neon-modal-overlay').style.display = 'none';
        }

        // Ambil Data User Aktif
        document.getElementById('wd-bank').innerText = localStorage.getItem('bank_name') || "Belum Terdaftar";
        document.getElementById('wd-rek').innerText = localStorage.getItem('acc_number') || "00000000";

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('history_wd') || "[]");
            const list = document.getElementById('wd-history-list');
            list.innerHTML = history.length === 0 ? "<tr><td colspan='3' style='text-align:center; color:#444; padding: 20px;'>Belum ada penarikan</td></tr>" : "";
            
            history.slice().reverse().forEach(item => {
                const statusClass = item.status === 'Berhasil' ? 'status-berhasil' : 'status-proses';
                const row = `<tr>
                    <td>${item.tanggal}</td>
                    <td style="color: #fbff00">IDR ${parseInt(item.total).toLocaleString('id-ID')}</td>
                    <td class="${statusClass}">${item.status}</td>
                </tr>`;
                list.innerHTML += row;
            });
        }

        function getSaldoSekarang() {
            return parseInt(localStorage.getItem('saldo_permainan')) || 0;
        }

        function konfirmasiWD() {
            const amtInput = document.getElementById('wd-amount');
            const amt = parseInt(amtInput.value);
            const saldoSaatIni = getSaldoSekarang();

            if (isNaN(amt) || amt < 50000) {
                showNeonModal("Minimal penarikan adalah IDR 50.000", "DATA TIDAK VALID");
                return;
            }

            if (amt > saldoSaatIni) {
                showNeonModal("Saldo Permainan tidak mencukupi untuk melakukan penarikan!", "SALDO KURANG");
                return;
            }

            // Tampilkan Modal Konfirmasi
            showNeonModal(
                `Yakin ingin menarik saldo sebesar IDR ${amt.toLocaleString('id-ID')} ke rekening Anda?`, 
                "KONFIRMASI WD", 
                true, 
                prosesWD
            );
        }

        function prosesWD() {
            const amtInput = document.getElementById('wd-amount');
            const amt = parseInt(amtInput.value);
            const saldoSaatIni = getSaldoSekarang();

            // Logika Pemotongan Saldo
            const saldoBaru = saldoSaatIni - amt;
            localStorage.setItem('saldo_permainan', saldoBaru);

            // Ambil Waktu Lengkap
            const skrg = new Date();
            const d = String(skrg.getDate()).padStart(2, '0');
            const m = String(skrg.getMonth() + 1).padStart(2, '0');
            const y = skrg.getFullYear();
            const h = String(skrg.getHours()).padStart(2, '0');
            const min = String(skrg.getMinutes()).padStart(2, '0');
            const s = String(skrg.getSeconds()).padStart(2, '0');
            const tglString = `${d}/${m}/${y} ${h}:${min}:${s}`;
            
            // Simpan ke Riwayat
            const history = JSON.parse(localStorage.getItem('history_wd') || "[]");
            history.push({
                tanggal: tglString,
                total: amt,
                status: "Proses"
            });
            localStorage.setItem('history_wd', JSON.stringify(history));

            showNeonModal(`Berhasil! Penarikan IDR ${amt.toLocaleString('id-ID')} sedang diproses oleh admin.`, "SUKSES");
            
            amtInput.value = "";
            renderHistory();
            
            if(window.updateSaldoUI) window.updateSaldoUI();
        }

        window.onload = renderHistory;
    </script>
</body>
</html>
