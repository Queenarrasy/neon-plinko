<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .balance-box { background: #000; border: 2px solid var(--neon-blue); border-radius: 20px; padding: 5px 15px; text-align: center; min-width: 120px; }
        
        /* PLINKO BOARD */
        #game-container { position: relative; width: 100%; height: 400px; margin-top: 20px; }
        .peg { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; box-shadow: 0 0 5px white; }
        .ball { position: absolute; width: 12px; height: 12px; background: var(--neon-pink); border-radius: 50%; box-shadow: 0 0 10px var(--neon-pink); z-index: 10; transition: all 0.1s linear; }
        
        .multipliers { display: flex; justify-content: center; gap: 4px; padding: 10px; margin-top: 10px; }
        .slot { flex: 1; padding: 8px 0; border-radius: 4px; text-align: center; font-size: 10px; font-weight: bold; }
        
        .controls { text-align: center; padding: 20px; }
        .btn-play { width: 80%; padding: 15px; border-radius: 50px; background: var(--neon-blue); color: black; font-weight: 900; border: none; cursor: pointer; box-shadow: 0 0 20px var(--neon-blue); }
    </style>
</head>
<body>
    <div class="header">
        <div onclick="location.href='profil.html'" style="cursor:pointer"><i class="fa-solid fa-circle-user fa-2x" style="color:var(--neon-pink)"></i></div>
        <div class="balance-box">
            <span id="tier-name" style="font-size: 8px; font-weight: bold;">BRONZE</span>
            <span style="font-size: 14px; display: block;" id="display-saldo">IDR 0</span>
        </div>
        <div onclick="location.href='deposit.html'" style="cursor:pointer"><i class="fa-solid fa-wallet fa-2x" style="color:var(--neon-gold)"></i></div>
    </div>

    <div id="game-container"></div>

    <div class="multipliers" id="multiplier-slots">
        <div class="slot" style="background:#ff0000">5x</div>
        <div class="slot" style="background:#ff7700">2x</div>
        <div class="slot" style="background:#ffcc00; color:black">1.2x</div>
        <div class="slot" style="background:#00d4ff; color:black">0.2x</div>
        <div class="slot" style="background:#ffcc00; color:black">1.2x</div>
        <div class="slot" style="background:#ff7700">2x</div>
        <div class="slot" style="background:#ff0000">5x</div>
    </div>

    <div class="controls">
        <div style="margin-bottom: 10px; color: var(--neon-gold); font-weight: bold;">TARUHAN: 1.000</div>
        <button class="btn-play" onclick="dropBall()">MULAI MAIN</button>
    </div>

    <script src="global.js"></script>
    <script>
        const container = document.getElementById('game-container');
        const rows = 8;
        const slots = [5, 2, 1.2, 0.2, 1.2, 2, 5];

        // Buat Paku Piramida
        for (let r = 2; r <= rows; r++) {
            for (let i = 0; i < r; i++) {
                const peg = document.createElement('div');
                peg.className = 'peg';
                peg.style.top = (r * 45) + 'px';
                peg.style.left = `calc(50% + ${(i - (r - 1) / 2) * 40}px)`;
                container.appendChild(peg);
            }
        }

        function dropBall() {
            if (!updateSaldo(-1000)) return alert("Saldo tidak cukup!");

            const ball = document.createElement('div');
            ball.className = 'ball';
            let posX = container.offsetWidth / 2;
            let posY = 20;
            ball.style.left = posX + 'px';
            ball.style.top = posY + 'px';
            container.appendChild(ball);

            let currentRow = 0;
            let currentIdx = 0;

            const interval = setInterval(() => {
                currentRow++;
                posY += 45;
                // Logika Acak Kiri/Kanan
                const move = Math.random() > 0.5 ? 1 : -1;
                currentIdx += move * 0.5;
                posX += move * 20;

                ball.style.top = posY + 'px';
                ball.style.left = posX + 'px';

                if (currentRow >= rows - 1) {
                    clearInterval(interval);
                    setTimeout(() => {
                        ball.remove();
                        // Hitung Slot Akhir
                        const finalIdx = Math.round(currentIdx + 3);
                        const safeIdx = Math.max(0, Math.min(6, finalIdx));
                        const winMult = slots[safeIdx];
                        updateSaldo(1000 * winMult);
                    }, 200);
                }
            }, 250);
        }
    </script>
</body>
</html>
