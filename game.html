<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko VIP - Pro Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --gold: #fbff00;
            --bg-dark: #0a0b1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #1a1c3d 0%, var(--bg-dark) 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER: Profile Anime & Saldo */
        .game-header {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .profile-img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            object-fit: cover;
            background: #222;
        }

        .balance-display {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
        }

        /* ARENA GAME (TENGAH) */
        .game-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        #plinko-canvas-container {
            width: 100%;
            max-width: 380px;
            height: 380px;
            position: relative;
        }

        /* KOTAK PERKALIAN BERWARNA */
        #bucket-labels {
            display: flex;
            justify-content: center;
            gap: 3px;
            width: 100%;
            position: absolute;
            bottom: -5px;
        }

        .m-badge {
            font-size: 9px;
            font-weight: bold;
            color: #fff;
            padding: 5px 2px;
            border-radius: 4px;
            min-width: 34px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .m-high { background: linear-gradient(180deg, #ff0044, #8b0000); }
        .m-mid { background: linear-gradient(180deg, #ff8800, #b35900); }
        .m-low { background: linear-gradient(180deg, #00ff88, #008044); }
        .m-zero { background: linear-gradient(180deg, #555, #222); }

        /* MENU NAVIGASI BAWAH (4 KOLOM) */
        .bottom-menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 92%;
            margin: 15px auto;
        }

        .menu-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 0, 119, 0.2);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .menu-icon { font-size: 26px; margin-bottom: 6px; }
        .menu-text {
            font-size: 8px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            text-transform: uppercase;
            text-align: center;
        }

        /* SIDEBAR RISIKO (KANAN) */
        .side-risk {
            position: absolute;
            right: 10px;
            top: 30%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 5;
        }

        .risk-btn {
            width: 50px;
            padding: 8px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: #777;
            font-size: 9px;
            font-weight: bold;
        }

        .risk-btn.active { border-color: var(--neon-pink); color: white; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        /* FOOTER CONTROLS */
        .footer-controls {
            padding: 15px 20px 25px;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .bet-adjuster {
            display: flex;
            align-items: center;
            gap: 25px;
            background: rgba(0,0,0,0.4);
            padding: 5px 25px;
            border-radius: 30px;
            border: 1px solid #444;
        }

        .btn-play {
            width: 100%;
            max-width: 280px;
            padding: 14px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(to right, #00d4ff, #0055ff);
            color: white;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            text-transform: uppercase;
        }
    </style>
</head>
<body onload="initPlinko()">

    <div class="game-header">
        <div class="profile-section" onclick="window.location.href='profile.html'">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Lucky" class="profile-img">
            <span class="menu-text" style="font-size:7px; margin-top:4px;">PROFILE</span>
        </div>
        <div class="balance-display">
            <span style="font-size: 9px; color: #aaa; display:block">CREDITS</span>
            <span id="user-balance" style="font-weight: bold; font-size: 16px; color: var(--neon-blue);">IDR 0</span>
        </div>
        <div class="profile-section" onclick="window.location.href='deposit.html'">
            <div style="font-size:28px; filter: drop-shadow(0 0 5px gold);">💰</div>
            <span class="menu-text" style="font-size:7px;">DEPOSIT</span>
        </div>
    </div>

    <div class="main-content" style="position:relative; flex:1; display:flex; flex-direction:column;">
        <div class="side-risk">
            <button class="risk-btn active" id="risk-low" onclick="setRisk('low')">LOW</button>
            <button class="risk-btn" id="risk-med" onclick="setRisk('med')">MED</button>
            <button class="risk-btn" id="risk-high" onclick="setRisk('high')">HIGH</button>
        </div>

        <div class="game-arena">
            <div id="plinko-canvas-container">
                <div id="bucket-labels"></div>
            </div>
        </div>

        <div class="bottom-menu-grid">
            <div class="menu-box" onclick="window.location.href='deposit.html'">
                <span class="menu-icon">➕</span>
                <span class="menu-text">TOP UP</span>
            </div>
            <div class="menu-box" onclick="window.location.href='withdraw.html'">
                <span class="menu-icon" style="font-size:30px">💱</span>
                <span class="menu-text">TARIK</span>
            </div>
            <div class="menu-box" onclick="window.location.href='deposit.html'">
                <span class="menu-icon" style="font-size:32px">💲</span>
                <span class="menu-text">DEPOSIT</span>
            </div>
            <div class="menu-box" onclick="alert('Ranking Segera Tersedia!')">
                <span class="menu-icon">🏆</span>
                <span class="menu-text" style="font-size:6px">SEGERA TERSEDIA</span>
            </div>
        </div>
    </div>

    <div class="footer-controls">
        <div class="bet-adjuster">
            <button onclick="adjustBet(-5000)" style="background:none; border:none; color:var(--neon-blue); font-size:24px;">-</button>
            <div style="text-align:center">
                <span style="font-size:8px; color:#888; display:block">BET AMOUNT</span>
                <span id="current-bet" style="font-weight:bold; font-size:16px">5.000</span>
            </div>
            <button onclick="adjustBet(5000)" style="background:none; border:none; color:var(--neon-blue); font-size:24px;">+</button>
        </div>
        <button class="btn-play" onclick="dropBall()">PLAY BALL</button>
    </div>

    <script>
        const multipliers = {
            low: [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5],
            med: [15, 8, 3, 0.2, 0.1, 0.2, 3, 8, 15],
            high: [100, 25, 5, 0, 0, 0, 5, 25, 100]
        };
        let currentRisk = 'low';
        let betAmount = 5000;
        let engine, world, render;

        function initPlinko() {
            const container = document.getElementById('plinko-canvas-container');
            engine = Matter.Engine.create();
            world = engine.world;
            render = Matter.Render.create({
                element: container,
                engine: engine,
                options: { width: container.clientWidth, height: 380, wireframes: false, background: 'transparent' }
            });
            createPins(container.clientWidth);
            updateBuckets();
            updateUI();
            Matter.Render.run(render);
            Matter.Runner.run(Matter.Runner.create(), engine);
        }

        function createPins(cw) {
            const rows = 10;
            const spacing = cw / 11;
            for (let r = 0; r < rows; r++) {
                const pinsInRow = r + 2;
                for (let i = 0; i < pinsInRow; i++) {
                    const x = (cw / 2) + (i - (pinsInRow - 1) / 2) * spacing;
                    const y = 40 + r * 32;
                    Matter.World.add(world, Matter.Bodies.circle(x, y, 3, { isStatic: true, render: { fillStyle: '#ffffff' } }));
                }
            }
        }

        function updateBuckets() {
            const container = document.getElementById('bucket-labels');
            container.innerHTML = '';
            multipliers[currentRisk].forEach(m => {
                const d = document.createElement('div');
                d.className = 'm-badge';
                if (m >= 5) d.classList.add('m-high');
                else if (m >= 2) d.classList.add('m-mid');
                else if (m >= 1) d.
