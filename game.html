<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Area - Neon Plinko</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body onload="initGame()">
    <div class="game-header">
        <button onclick="toggleModal(true)" class="btn-icon">👤 PROFIL</button>
        <div class="balance-text">💰 IDR <span id="user-balance">0</span></div>
        <button onclick="window.location.href='deposit.html'" class="btn-depo">DEPOSIT</button>
    </div>

    <div id="plinko-container"></div>

    <div class="game-footer">
        <div class="bet-control">
            <button onclick="changeBet(-1000)">-</button>
            <span>BET: <b id="bet-display">1000</b></span>
            <button onclick="changeBet(1000)">+</button>
        </div>
        <button onclick="dropBall()" class="btn-play">PLAY BALL</button>
    </div>

    <div id="profile-modal" class="modal-overlay" style="display:none">
        <div class="glass-card modal-content">
            <h3 style="color:#00f7ff">DATA AKUN (LOCKED)</h3>
            <hr border="1" color="#333">
            <div class="info-list">
                <p>USER ID: <span id="p-id" class="neon-text"></span></p>
                <p>NAMA: <span id="p-nama" class="neon-text"></span></p>
                <p>WALLET: <span id="p-wallet" class="neon-text"></span></p>
            </div>
            <button onclick="toggleModal(false)" class="btn-primary">KEMBALI KE GAME</button>
        </div>
    </div>

    <script>
        let engine, world, currentBet = 1000;

        function initGame() {
            const data = JSON.parse(localStorage.getItem('plinko_user'));
            if(!data) return window.location.href = "index.html";
            
            document.getElementById('p-id').innerText = data.username;
            document.getElementById('p-nama').innerText = data.nama;
            document.getElementById('p-wallet').innerText = data.wallet;

            const { Engine, Render, Runner, Bodies, Composite } = Matter;
            engine = Engine.create(); world = engine.world;
            const container = document.getElementById('plinko-container');
            const render = Render.create({
                element: container, engine: engine,
                options: { width: container.clientWidth, height: 400, wireframes: false, background: 'transparent' }
            });
            for (let i = 0; i < 9; i++) {
                for (let j = 0; j <= i; j++) {
                    Composite.add(world, Bodies.circle(container.clientWidth/2 + (j-i/2)*35, 50+i*40, 3, { isStatic: true, render: {fillStyle: '#fff'} }));
                }
            }
            Render.run(render); Runner.run(Runner.create(), engine);
        }

        function toggleModal(show) {
            document.getElementById('profile-modal').style.display = show ? 'flex' : 'none';
        }

        function dropBall() {
            const ball = Matter.Bodies.circle(window.innerWidth/2, 10, 8, { restitution: 0.5, render: {fillStyle: '#ff0077'} });
            Matter.Composite.add(world, ball);
        }

        function changeBet(val) {
            currentBet += val;
            if(currentBet < 1000) currentBet = 1000;
            document.getElementById('bet-display').innerText = currentBet;
        }
    </script>
</body>
</html>
