<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena - NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --gold: #fbff00;
            --bg-dark: #0a0b1e;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* TOP NAVIGATION */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
        }

        .nav-item { text-align: center; cursor: pointer; text-decoration: none; }
        .nav-icon { width: 45px; height: 45px; margin-bottom: 5px; filter: drop-shadow(0 0 5px var(--neon-pink)); }
        .nav-label { font-size: 9px; font-weight: 900; color: var(--neon-pink); text-transform: uppercase; }

        .saldo-box {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--neon-blue);
            border-radius: 25px;
            padding: 8px 25px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        .saldo-label { font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block; }
        .saldo-amount { font-size: 16px; font-weight: 900; color: white; }

        /* MAIN GAME AREA */
        .plinko-board { margin: 20px 0; /* Area Papan Pasak */ }

        /* BOTTOM ACTION BUTTONS */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 25px;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-card:active { transform: scale(0.95); border-color: var(--neon-blue); }
        .action-card i { font-size: 24px; margin-bottom: 8px; display: block; }
        .label-action { font-size: 9px; font-weight: bold; text-transform: uppercase; }

        /* TOMBOL MAIN */
        .btn-play {
            width: 85%;
            padding: 18px;
            background: linear-gradient(180deg, var(--neon-blue), #0088ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="profile.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="nav-icon">
            <span class="nav-label">PROFILE</span>
        </a>

        <div class="saldo-box">
            <span class="saldo-label">SALDO VIP</span>
            <span class="saldo-amount" id="displayBalance">IDR 0</span>
        </div>

        <a href="hadiah.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png" class="nav-icon">
            <span class="nav-label">HADIAH</span>
        </a>
    </div>

    <div class="plinko-board">
        <div style="height: 300px; width: 300px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; color: #444;">
            PAPAN PLINKO
        </div>
    </div>

    <div class="action-grid">
        <div class="action-card" onclick="window.location.href='tarik.html'">
            <i class="fa-solid fa-money-bill-transfer" style="color: #888;"></i>
            <span class="label-action" style="color: var(--neon-pink);">TARIK</span>
        </div>
        
        <div class="action-card" onclick="window.location.href='deposit.html'">
            <i class="fa-solid fa-file-invoice-dollar" style="color: var(--neon-blue);"></i>
            <span class="label-action" style="color: var(--neon-pink);">DEPOSIT</span>
        </div>

        <div class="action-card">
            <i class="fa-solid fa-trophy" style="color: var(--gold);"></i>
            <span class="label-action" style="color: var(--neon-pink);">RANK</span>
        </div>
    </div>

    <button class="btn-play">MULAI MAIN</button>

    <script>
        window.onload = () => {
            const balance = localStorage.getItem('user_balance') || 0;
            document.getElementById('displayBalance').innerText = "IDR " + parseInt(balance).toLocaleString();
        };
    </script>
</body>
</html>
