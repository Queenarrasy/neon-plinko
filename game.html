<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; box-sizing: border-box; z-index: 100; }
        .nav-btn-top { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon-pink); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .saldo-display { background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); border-radius: 20px; padding: 5px 20px; text-align: center; box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); }

        .game-container { position: relative; width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        canvas { background: transparent; }

        .multiplier-bar { display: flex; justify-content: center; gap: 4px; width: 92%; margin: 5px 0; }
        .m-slot { flex: 1; padding: 8px 0; font-size: 10px; font-weight: 900; text-align: center; border-radius: 6px; color: white; transition: 0.3s; }
        .pink { background: var(--neon-pink); }
        .gold { background: var(--neon-gold); color: black; }
        .blue { background: var(--neon-blue); color: black; }
        .highlight { transform: scale(1.2); filter: brightness(1.5); box-shadow: 0 0 15px white; }

        .action-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; margin: 10px 0; }
        .nav-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 0; text-align: center; cursor: pointer; text-decoration: none; }
        .nav-box span { font-size: 9px; font-weight: 900; text-transform: uppercase; color: var(--neon-pink); }

        .bet-area { background: rgba(0,0,0,0.6); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-spin { width: 85%; padding: 16px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 900; box-shadow: 0 0 25px rgba(0, 212, 255, 0.5); cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="nav-btn-top" onclick="location.href='profile.html'"><i class="fa-solid fa-user"></i></div>
        <div class="saldo-display">
            <small style="color: var(--neon-blue); font-size: 8px; font-weight: bold; display: block;">SALDO VIP</small>
            <div id="balance" style="font-size: 18px; font-weight: 900;">91200</div>
        </div>
        <div class="nav-btn-top" style="border-color: var(--neon-gold);" onclick="location.href='reward.html'"><i class="fa-solid fa-gift" style="color: var(--neon-gold);"></i></div>
    </div>

    <div class="game-container">
        <canvas id="plinkoCanvas"></canvas>

        <div class="multiplier-bar" id="multiplierBar">
            <div class="m-slot pink">5x</div>
            <div class="m-slot gold">2x</div>
            <div class="m-slot gold">1.2x</div>
            <div class="m-slot blue">0.2x</div>
            <div class="m-slot gold">1.2x</div>
            <div class="m-slot gold">2x</div>
            <div class="m-slot pink">5x</div>
        </div>

        <div class="action-nav">
            <a href="withdraw.html" class="nav-box"><i class="fa-solid fa-money-bill" style="color: var(--neon-gold);"></i><span>Tarik</span></a>
            <a href="deposit.html" class="nav-box"><i class="fa-solid fa-wallet" style="color: var(--neon-blue);"></i><span>Deposit</span></a>
            <a href="rank.html" class="nav-box"><i class="fa-solid fa-crown" style="color: var(--neon-gold);"></i><span>Rank</span></a>
        </div>

        <div class="bet-area">
            <button class="bet-btn" style="background:none; border:none; color:var(--neon-blue); font-size:25px;" onclick="adjustBet(-100)">-</button>
            <div style="text-align: center; min-width: 100px;">
                <small style="color:#666; display:block; font-size: 8px;">TARUHAN</small>
                <span id="bet-amount" style="font-size: 18px; font-weight: 900; color: var(--neon-gold);">400</span>
            </div>
            <button class="bet-btn" style="background:none; border:none; color:var(--neon-blue); font-size:25px;" onclick="adjustBet(100)">+</button>
        </div>

        <button class="btn-spin" id="spinBtn" onclick="startGame()">MULAI MAIN</button>
    </div>

    <script>
        // --- KONTROL ADMIN (SETTING KEMENANGAN) ---
        const ADMIN_SETTINGS = {
            winRate: 0.3, // 0.3 berarti 30% peluang masuk ke slot UNTUNG (Pink/Gold)
            forceResult: null // Jika diisi (0-6), bola akan dipaksa masuk ke slot index tersebut
        };

        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 320;

        let balance = 91200;
        let bet = 400;
        const multipliers = [5, 2, 1.2, 0.2, 1.2, 2, 5];
        const pins = [];
        const pinRows = 8;
        const spacing = 32;

        // Inisialisasi Paku
        for (let l = 2; l <= pinRows; l++) {
            for (let i = 0; i < l; i++) {
                pins.push({
                    x: canvas.width / 2 + (i - (l - 1) / 2) * spacing,
                    y: l * spacing + 20
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            pins.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function startGame() {
            if (balance < bet) return alert("Saldo tidak cukup!");
            balance -= bet;
            updateUI();
            document.getElementById('spinBtn').disabled = true;
            
            dropBall();
        }

        function dropBall() {
            let x = canvas.width / 2;
            let y = 30;
            let vx = 0;
            let vy = 3;
            const gravity = 0.15;

            // Logika Penentuan Hasil Akhir (Kontrol Admin)
            let targetSlot;
            if (ADMIN_SETTINGS.forceResult !== null) {
                targetSlot = ADMIN_SETTINGS.forceResult;
            } else {
                // Berdasarkan Win Rate
                targetSlot = Math.random() < ADMIN_SETTINGS.winRate ? 
                             [0, 1, 5, 6][Math.floor(Math.random()*4)] : // Slot Untung
                             [2, 3, 4][Math.floor(Math.random()*3)];     // Slot Rugi
            }

            function animate() {
                draw();
                vy += gravity;
                y += vy;
                x += vx;

                // Tabrakan Paku (Simulasi Sederhana)
                pins.forEach(p => {
                    let dx = x - p.x;
                    let dy = y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 8) {
                        vx = (dx / dist) * 2.5;
                        vy *= -0.4;
                        y = p.y + 8;
                    }
                });

                // Gambar Bola Neon
                ctx.fillStyle = "#00d4ff";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00d4ff";
                ctx.beginPath();
                ctx.arc(x, y, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                if (y < canvas.height - 10) {
                    requestAnimationFrame(animate);
                } else {
                    // Bola Sampai Bawah
                    finishGame(x);
                }
            }
            animate();
        }

        function finishGame(finalX) {
            // Tentukan index slot berdasarkan posisi X terakhir
            let slotWidth = canvas.width / 7;
            let index = Math.floor(finalX / slotWidth);
            index = Math.max(0, Math.min(6, index));

            let winAmount = bet * multipliers[index];
            balance += winAmount;
            
            // Efek Visual Menang
            const slots = document.querySelectorAll('.m-slot');
            slots[index].classList.add('highlight');
            setTimeout(() => slots[index].classList.remove('highlight'), 1000);

            updateUI();
            document.getElementById('spinBtn').disabled = false;
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance);
            document.getElementById('bet-amount').innerText = bet;
        }

        function adjustBet(val) {
            bet = Math.max(100, bet + val);
            updateUI();
        }

        draw();
        updateUI();
    </script>
</body>
</html>
