<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* HEADER */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 100; box-sizing: border-box; }
        .nav-icon-funny { width: 50px; height: 50px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px var(--neon-pink)); }
        .nav-icon-funny:active { transform: scale(0.8); }
        
        .saldo-display { background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); border-radius: 20px; padding: 5px 15px; text-align: center; box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }

        /* GRID TOMBOL DENGAN KETERANGAN PINK NEON */
        .action-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 92%; margin: 10px 0; }
        .nav-card { 
            background: rgba(255,255,255,0.03); border-radius: 15px; padding: 10px 5px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1); text-decoration: none;
        }
        .nav-card img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; }
        .nav-card span { 
            font-size: 10px; font-weight: 900; color: var(--neon-pink); 
            text-transform: uppercase; display: block;
            text-shadow: 0 0 8px var(--neon-pink); /* Font Pink Neon menyala */
        }

        /* PERKALIAN */
        .multiplier-bar { display: flex; justify-content: center; gap: 3px; width: 95%; margin: 5px 0; }
        .m-slot { flex: 1; padding: 8px 0; font-size: 10px; font-weight: 900; text-align: center; border-radius: 5px; color: white; }
        .pink { background: var(--neon-pink); } .gold { background: var(--neon-gold); color: black; } .blue { background: var(--neon-blue); color: black; }

        /* BET CONTROL */
        .bet-area { background: rgba(0,0,0,0.6); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-spin { width: 85%; padding: 16px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 900; box-shadow: 0 0 25px rgba(0, 212, 255, 0.5); cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKMGpxof8C96xf2/giphy.gif" class="nav-icon-funny" onclick="location.href='profile.html'">
        
        <div class="saldo-display">
            <small style="color: var(--neon-blue); font-size: 8px; font-weight: bold; display: block;">SALDO VIP</small>
            <div id="balance" style="font-size: 18px; font-weight: 900;">100.000</div>
        </div>

        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l41lTfO3v7s0G9Wk8/giphy.gif" class="nav-icon-funny" onclick="location.href='reward.html'">
    </div>

    <div class="game-container" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <canvas id="plinkoCanvas"></canvas>

        <div class="multiplier-bar">
            <div class="m-slot pink">5x</div><div class="m-slot gold">2x</div><div class="m-slot gold">1.2x</div>
            <div class="m-slot blue">0.2x</div>
            <div class="m-slot gold">1.2x</div><div class="m-slot gold">2x</div><div class="m-slot pink">5x</div>
        </div>

        <div class="action-nav">
            <div class="nav-card" onclick="location.href='withdraw.html'">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKVUn7iM8FMEU24/giphy.gif">
                <span>Tarik</span>
            </div>
            <div class="nav-card" onclick="location.href='deposit.html'">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/l0HlSnoFqX3W7P_4k/giphy.gif">
                <span>Deposit</span>
            </div>
            <div class="nav-card" onclick="location.href='rank.html'">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueXF6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6bmZ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/3o7TKMGpxof8C96xf2/giphy.gif">
                <span>Rank</span>
            </div>
        </div>

        <div class="bet-area">
            <button onclick="changeBet(-1)" style="background:none; border:none; color:var(--neon-blue); font-size:30px; cursor:pointer;">-</button>
            <div style="text-align: center; min-width: 130px;">
                <small style="color:#666; display:block; font-size: 8px;">TARUHAN</small>
                <span id="bet-amount" style="font-size: 20px; font-weight: 900; color: var(--neon-gold);">400</span>
            </div>
            <button onclick="changeBet(1)" style="background:none; border:none; color:var(--neon-blue); font-size:30px; cursor:pointer;">+</button>
        </div>

        <button class="btn-spin" onclick="spawnBall()">MULAI MAIN</button>
    </div>

    <script>
        // URUTAN BET SESUAI PERMINTAAN
        const betLevels = [400, 600, 800, 1000, 1200, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 12000, 16000, 18000, 20000];
        let currentBetIndex = 0;

        function changeBet(direction) {
            currentBetIndex += direction;
            if (currentBetIndex < 0) currentBetIndex = 0;
            if (currentBetIndex >= betLevels.length) currentBetIndex = betLevels.length - 1;
            document.getElementById('bet-amount').innerText = betLevels[currentBetIndex].toLocaleString();
        }

        // Logika Game (Singkat)
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 300;

        function spawnBall() {
            let bet = betLevels[currentBetIndex];
            let balance = parseInt(document.getElementById('balance').innerText.replace('.',''));
            if (balance < bet) return alert("Saldo tidak cukup!");
            
            // Pengurangan Saldo
            balance -= bet;
            document.getElementById('balance').innerText = balance.toLocaleString();
            
            // Jalankan animasi bola (logika sebelumnya tetap sama)
        }
    </script>
</body>
</html>
