<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Vault Plinko</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --neon-blue: #00f7ff; --neon-pink: #ff0077; --bg: #050510; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: white;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Layout Utama: Samping Kiri - Tengah - Samping Kanan */
        .main-layout {
            display: flex;
            flex: 1;
            width: 100%;
            padding: 10px;
            gap: 10px;
            align-items: center;
        }

        /* Sidebar Style */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 70px;
        }

        .btn-side {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 1px solid #333;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-side.active { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); }

        /* Area Game (Tengah) */
        .game-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #plinko-canvas-container {
            width: 100%;
            height: 450px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            border: 1px solid rgba(0, 247, 255, 0.1);
            position: relative;
        }

        /* Header & Footer */
        .game-header { width: 100%; padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        .balance-box { background: #111; padding: 10px; border-radius: 10px; border: 1px solid var(--neon-blue); }
        
        .play-section { width: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .btn-play {
            width: 80%;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-pink), #ff00ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        #bucket-labels { display: flex; position: absolute; bottom: 5px; width: 100%; justify-content: space-around; }
        .m-box { font-size: 8px; color: var(--neon-pink); font-weight: bold; }
    </style>
</head>
<body onload="initPlinko()">

    <div class="game-header">
        <div class="balance-box">
            <span style="font-size: 10px; color: #888;">SALDO</span><br>
            <span id="user-balance" style="font-weight: bold; color: var(--neon-blue);">IDR 0</span>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="btn-side" onclick="window.location.href='profile.html'">👤<br>PROFIL</div>
            <div class="btn-side" onclick="window.location.href='deposit.html'">➕<br>TOPUP</div>
            <div class="btn-side" onclick="window.location.href='withdraw.html'">💸<br>TARIK</div>
        </div>

        <div class="game-center">
            <div id="plinko-canvas-container">
                <div id="bucket-labels"></div>
            </div>
            <div style="margin-top: 10px; font-size: 12px; color: #888;">BET: <span id="current-bet" style="color:white">5,000</span></div>
        </div>

        <div class="sidebar">
            <div class="btn-side active" id="risk-low" onclick="setRisk('low')">LOW</div>
            <div class="btn-side" id="risk-med" onclick="setRisk('med')">MED</div>
            <div class="btn-side" id="risk-high" onclick="setRisk('high')">HIGH</div>
            <div class="btn-side" onclick="adjustBet(5000)">➕<br>BET</div>
            <div class="btn-side" onclick="adjustBet(-5000)">➖<br>BET</div>
        </div>
    </div>

    <div class="play-section">
        <button class="btn-play" onclick="dropBall()">PLAY BALL</button>
    </div>

    <script>
        const multipliers = {
            low: [5, 2, 1, 0.5, 0.2, 0.5, 1, 2, 5],
            med: [15, 8, 3, 0.2, 0.1, 0.2, 3, 8, 15],
            high: [100, 25, 5, 0, 0, 0, 5, 25, 100]
        };
        let currentRisk = 'low';
        let betAmount = 5000;
        let engine, world, render;

        function initPlinko() {
            const container = document.getElementById('plinko-canvas-container');
            engine = Matter.Engine.create();
            world = engine.world;
            render = Matter.Render.create({
                element: container,
                engine: engine,
                options: { width: container.clientWidth, height: 450, wireframes: false, background: 'transparent' }
            });
            createPins(container.clientWidth);
            updateBuckets();
            updateUI();
            Matter.Render.run(render);
            Matter.Runner.run(Matter.Runner.create(), engine);
        }

        function createPins(cw) {
            const rows = 9;
            const spacing = cw / 10;
            for (let r = 0; r < rows; r++) {
                const pinsInRow = r + 2;
                for (let i = 0; i < pinsInRow; i++) {
                    const x = (cw / 2) + (i - (pinsInRow - 1) / 2) * spacing;
                    const y = 60 + r * 38;
                    Matter.World.add(world, Matter.Bodies.circle(x, y, 3, { isStatic: true, render: { fillStyle: '#00f7ff' } }));
                }
            }
        }

        function updateBuckets() {
            const container = document.getElementById('bucket-labels');
            container.innerHTML = '';
            multipliers[currentRisk].forEach(m => {
                const d = document.createElement('div');
                d.className = 'm-box'; d.innerText = m + 'x';
                container.appendChild(d);
            });
        }

        function dropBall() {
            let saldo = parseInt(localStorage.getItem('user_balance') || 0);
            if (saldo < betAmount) return alert("Saldo IDR 0! Top Up dulu.");
            localStorage.setItem('user_balance', saldo - betAmount);
            updateUI();

            const ball = Matter.Bodies.circle(document.getElementById('plinko-canvas-container').clientWidth/2, 20, 7, {
                restitution: 0.5, render: { fillStyle: '#ff0077' }
            });
            Matter.World.add(world, ball);

            setTimeout(() => {
                Matter.World.remove(world, ball);
                const res = multipliers[currentRisk][Math.floor(Math.random() * 9)];
                localStorage.setItem('user_balance', parseInt(localStorage.getItem('user_balance')) + (betAmount * res));
                updateUI();
            }, 3500);
        }

        function setRisk(level) {
            currentRisk = level;
            document.querySelectorAll('.btn-side').forEach(b => b.classList.remove('active'));
            document.getElementById('risk-' + level).classList.add('active');
            updateBuckets();
        }

        function adjustBet(v) { betAmount = Math.max(5000, betAmount + v); updateUI(); }
        function updateUI() {
            document.getElementById('user-balance').innerText = "IDR " + parseInt(localStorage.getItem('user_balance') || 0).toLocaleString();
            document.getElementById('current-bet').innerText = betAmount.toLocaleString();
        }
    </script>
</body>
</html>
