<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - Arena</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --neon-gold: #fbff00;
            --bg-dark: #070816;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* EFEK LATAR BELAKANG NEON SAMAR */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 119, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 40%);
        }

        /* TOP NAV AREA */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            box-sizing: border-box;
        }
        .profile-btn { 
            width: 50px; height: 50px; border-radius: 50%; 
            border: 2px solid var(--neon-pink); 
            box-shadow: 0 0 15px var(--neon-pink);
            cursor: pointer;
        }
        .hadiah-btn {
            width: 50px; height: 50px;
            filter: drop-shadow(0 0 10px var(--neon-pink));
            cursor: pointer;
        }
        .saldo-badge {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            border-radius: 25px;
            padding: 5px 25px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            text-align: center;
        }

        /* PIRAMIDA & MULTIPLIER (JARAK DIPERDEKAT) */
        #game-canvas {
            display: block;
            margin-top: 10px;
        }

        .multiplier-container {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: -10px; /* Menempel lebih dekat ke piramida */
            width: 95%;
        }

        .slot {
            flex: 1;
            padding: 6px 0;
            font-size: 10px;
            font-weight: 900;
            text-align: center;
            border-radius: 5px;
            text-transform: uppercase;
        }
        /* TEMA WARNA NEON KOTAK */
        .pink { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); color: white; }
        .blue { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); color: #000; }
        .gold { background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); color: #000; }

        /* ACTION BOX MEWAH */
        .action-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            margin: 25px 0;
        }
        .action-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px 0;
            text-align: center;
            cursor: pointer;
        }
        .icon-vip { font-size: 24px; margin-bottom: 8px; display: block; }
        .label-vip { font-size: 9px; font-weight: 900; color: var(--neon-pink); }

        /* BET CONTROL */
        .bet-control {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 20px;
            margin-bottom: 20px;
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 25px; cursor: pointer; }
        .bet-info { margin: 0 30px; text-align: center; }

        .btn-play {
            width: 85%;
            padding: 20px;
            background: linear-gradient(180deg, var(--neon-blue), #0066ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="profile-btn" onclick="window.location.href='profile.html'">
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block;">SALDO VIP</span>
            <span id="balance" style="font-size: 16px; font-weight: 900;">IDR 0</span>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="hadiah-btn" onclick="window.location.href='hadiah.html'">
    </div>

    <canvas id="game-canvas"></canvas>

    <div class="multiplier-container">
        <div class="slot pink">5x</div>
        <div class="slot gold">2x</div>
        <div class="slot gold">1.2x</div>
        <div class="slot blue">0.2x</div>
        <div class="slot gold">1.2x</div>
        <div class="slot gold">2x</div>
        <div class="slot pink">5x</div>
    </div>

    <div class="action-container">
        <div class="action-box" onclick="window.location.href='tarik.html'">
            <i class="fa-solid fa-hand-holding-dollar icon-vip" style="color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold);"></i>
            <span class="label-vip">TARIK</span>
        </div>
        <div class="action-box" onclick="window.location.href='deposit.html'">
            <i class="fa-solid fa-building-columns icon-vip" style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);"></i>
            <span class="label-vip">DEPOSIT</span>
        </div>
        <div class="action-box">
            <i class="fa-solid fa-crown icon-vip" style="color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold);"></i>
            <span class="label-vip">RANK</span>
        </div>
    </div>

    <div class="bet-control">
        <button class="bet-btn" onclick="changeBet(-100)">-</button>
        <div class="bet-info">
            <span style="font-size: 7px; color:#555; display:block; font-weight:bold;">TARUHAN</span>
            <span id="betVal" style="font-size: 15px; font-weight:900; color: var(--neon-gold);">400</span>
        </div>
        <button class="bet-btn" onclick="changeBet(100)">+</button>
    </div>

    <button class="btn-play" onclick="dropBall()">MULAI MAIN</button>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360;
        canvas.height = 340; // Diperpendek agar menempel ke kotak multiplier

        let balance = parseInt(localStorage.getItem('user_balance')) || 0;
        let currentBet = 400;
        const pins = [];
        const rows = 9;

        // Pasak Piramida
        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({
                    x: canvas.width / 2 + (j - (i - 1) / 2) * 32,
                    y: i * 32
                });
            }
        }

        function drawPins() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            pins.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function updateUI() {
            document.getElementById('balance').innerText = "IDR " + balance.toLocaleString();
            document.getElementById('betVal').innerText = currentBet.toLocaleString();
            localStorage.setItem('user_balance', balance);
        }

        function changeBet(v) {
            currentBet += v;
            if(currentBet < 400) currentBet = 400;
            updateUI();
        }

        function dropBall() {
            if(balance < currentBet) return alert("Saldo tidak cukup!");
            balance -= currentBet;
            updateUI();
            // Logika animasi bola bisa ditambahkan di sini
        }

        window.onload = () => { drawPins(); updateUI(); };
    </script>
</body>
</html>
