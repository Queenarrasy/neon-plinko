<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP NEON GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; 
            --neon-pink: 0 0 10px var(--pink);
            --neon-blue: 0 0 10px var(--blue);
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER & SALDO BOX */
        .game-header {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--blue);
            border-radius: 12px;
            padding: 8px 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            box-shadow: var(--neon-blue);
            min-width: 120px;
        }

        .neon-y { color: var(--yellow); font-size: 10px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 5px var(--yellow); }
        .neon-b { color: white; font-size: 16px; font-weight: 900; text-shadow: var(--neon-blue); }

        .btn-profile {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--pink);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--pink);
            font-size: 20px;
            box-shadow: var(--neon-pink);
            text-decoration: none;
        }

        /* AREA GAME (Placeholder untuk Canvas/Logic Game Anda) */
        #game-container {
            width: 100vw;
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .game-placeholder { color: #333; font-weight: bold; font-size: 20px; border: 2px dashed #222; padding: 50px; border-radius: 20px; }

        /* MODAL NOTIFIKASI */
        #notif-container {
            position: fixed;
            top: 20px;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            z-index: 9999;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="game-header">
        <a href="profil.html" class="btn-profile">
            <i class="fa-solid fa-user-tie"></i>
        </a>

        <div class="balance-box">
            <span id="tier-name" class="neon-y">VIP PLAYER</span>
            <span id="display-saldo" class="neon-b">IDR 0</span>
        </div>
    </header>

    <div id="game-container">
        <div class="game-placeholder">AREA PERMAINAN</div>
    </div>

    <div id="notif-container"></div>

    <script>
        // URL SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqQWXIJuVnkIxLvdu3kYiiRDVh7eyrsy-KU6rG1qtQClgfAzmMoclv2ULFZ_hRdE_qUg/exec";
        
        let currentBalance = 0;
        const user = localStorage.getItem('user_session');

        // 1. Inisialisasi Saldo dari Database
        async function initGameBalance() {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getUserData', username: user })
                });
                const data = await response.json();
                
                if (data.result === "SUCCESS") {
                    currentBalance = parseInt(data.saldo);
                    localStorage.setItem('saldo', currentBalance);
                    localStorage.setItem('tier', data.tier);
                    updateDisplay();
                }
            } catch (e) {
                // Jika koneksi gagal, gunakan saldo lokal terakhir
                currentBalance = parseInt(localStorage.getItem('saldo')) || 0;
                updateDisplay();
            }
        }

        // 2. Fungsi Update Tampilan Saldo
        function updateDisplay() {
            const display = document.getElementById('display-saldo');
            const tierDisplay = document.getElementById('tier-name');
            
            display.innerText = "IDR " + currentBalance.toLocaleString('id-ID');
            
            const tier = localStorage.getItem('tier') || "BRONZE";
            tierDisplay.innerText = tier.toUpperCase() + " PLAYER";
        }

        /**
         * 3. FUNGSI UTAMA UNTUK GAME (PENTING!)
         * Panggil fungsi ini di dalam logika game Anda:
         * Saat Menang: changeSaldo(5000)
         * Saat Taruhan/Bet: changeSaldo(-1000)
         */
        async function changeSaldo(amount) {
            // Update lokal dulu agar responsif
            currentBalance += amount;
            if (currentBalance < 0) currentBalance = 0;
            
            localStorage.setItem('saldo', currentBalance);
            updateDisplay();

            // Kirim ke server agar tersimpan di Google Sheets
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateSaldo',
                        username: user,
                        saldo: currentBalance
                    })
                });
            } catch (e) {
                console.error("Gagal sinkron server, tersimpan lokal.");
            }
        }

        // 4. Notifikasi sederhana
        function showNotif(msg, type = "win") {
            const notif = document.getElementById('notif-container');
            notif.innerText = msg;
            notif.style.display = "block";
            notif.style.backgroundColor = type === "win" ? "#00ff88" : "#ff0077";
            notif.style.color = type === "win" ? "#000" : "#fff";
            
            setTimeout(() => { notif.style.display = "none"; }, 2000);
        }

        // Jalankan saat load
        window.onload = initGameBalance;

        // Auto-Sync Saldo setiap 10 detik untuk menangkap approve dari admin
        setInterval(initGameBalance, 10000);

    </script>
</body>
</html>
