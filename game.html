<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plinko Pro - Cyber Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-pink: #ff007b;
            --bg-dark: #0a0b1e;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #1a1c3d 0%, var(--bg-dark) 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER: Saldo & Profil (Clean Look) */
        .game-header {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .balance-display {
            text-align: center;
            background: var(--glass);
            padding: 5px 20px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            position: relative;
            padding: 10px;
        }

        /* SIDEBAR KIRI: Navigasi Cepat */
        .side-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 65px;
            justify-content: center;
        }

        .nav-item {
            width: 55px;
            height: 55px;
            background: var(--glass);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #00d4ff;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:active { transform: scale(0.9); background: var(--neon-blue); color: black; }

        /* CENTER: Arena Plinko (Focus) */
        .game-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        #plinko-canvas-container {
            width: 100%;
            max-width: 380px;
            height: 420px;
            position: relative;
            margin-top: 10px;
        }

        /* BUCKET / MULTIPLIER LABELS (Glow Look) */
        #bucket-labels {
            display: flex;
            width: 100%;
            justify-content: space-around;
            position: absolute;
            bottom: 5px;
            padding: 0 10px;
        }

        .m-badge {
            font-size: 10px;
            font-weight: bold;
            color: #fbff00;
            padding: 2px 4px;
            background: rgba(251, 255, 0, 0.1);
            border-radius: 4px;
        }

        /* SIDEBAR KANAN: Risk Level */
        .side-risk {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 65px;
            justify-content: center;
        }

        .risk-btn {
            padding: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: #777;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .risk-btn.active { border-color: var(--neon-pink); color: white; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        /* BOTTOM: Play Controls (Sesuai Referensi) */
        .footer-controls {
            padding: 20px;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .bet-adjuster {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.4);
            padding: 5px 20px;
            border-radius: 30px;
            border: 1px solid #333;
        }

        .btn-play {
            width: 200px;
            padding: 15px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(to right, #00d4ff, #0055ff);
            color: white;
            font-size: 20px;
            font-weight: 900;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-play:active { transform: scale(0.95); }
    </style>
</head>
<body onload="initPlinko()">

    <div class="game-header">
        <div class="nav-item" style="border:none" onclick="window.location.href='profile.html'">👤</div>
        <div class="balance-display">
            <span style="font-size: 10px; color: #aaa; display:block">CREDITS</span>
            <span id="user-balance" style="font-weight: bold; font-size: 16px; color: var(--neon-blue);">IDR 0</span>
        </div>
        <div class="nav-item" style="border:none; color: #fbff00" onclick="window.location.href='deposit.html'">💰</div>
    </div>

    <div class="main-content">
        <div class="side-nav">
            <div class="nav-item" onclick="window.location.href='deposit.html'">➕<br>TOPUP</div>
            <div class="nav-item" onclick="window.location.href='withdraw.html'">💸<br>TARIK</div>
            <div class="nav-item">🏆<br>RANK</div>
        </div>

        <div class="game-arena">
            <div id="plinko-canvas-container">
                <div id="bucket-labels"></div>
            </div>
        </div>

        <div class="side-risk">
            <button class="risk-btn active" id="risk-low" onclick="setRisk('low')">LOW</button>
            <button class="risk-btn" id="risk-med" onclick="setRisk('med')">MED</button>
            <button class="risk-btn" id="risk-high" onclick="setRisk('high')">HIGH</button>
        </div>
    </div>

    <div class="footer-controls">
        <div class="bet-adjuster">
            <button onclick="adjustBet(-5000)" style="background:none; border:none; color:var(--neon-blue); font-size:24px; font-weight:bold">-</button>
            <div style="text-align:center">
                <span style="font-size:9px; color:#888; display:block">BET AMOUNT</span>
                <span id="current-bet" style="font-weight:bold; font-size:16px">5,000</span>
            </div>
            <button onclick="adjustBet(5000)" style="background:none; border:none; color:var(--neon-blue); font-size:24px; font-weight:bold">+</button>
        </div>
        <button class="btn-play" onclick="dropBall()">PLAY BALL</button>
    </div>

    <script>
        const multipliers = {
            low: [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5],
            med: [15, 8, 3, 0.2, 0.1, 0.2, 3, 8, 15],
            high: [100, 25, 5, 0, 0, 0, 5, 25, 100]
        };
        let currentRisk = 'low';
        let betAmount = 5000;
        let engine, world, render;

        function initPlinko() {
            const container = document.getElementById('plinko-canvas-container');
            engine = Matter.Engine.create();
            world = engine.world;
            render = Matter.Render.create({
                element: container,
                engine: engine,
                options: { width: container.clientWidth, height: 420, wireframes: false, background: 'transparent' }
            });
            createPins(container.clientWidth);
            updateBuckets();
            updateUI();
            Matter.Render.run(render);
            Matter.Runner.run(Matter.Runner.create(), engine);
        }

        function createPins(cw) {
            const rows = 10;
            const spacing = cw / 11;
            for (let r = 0; r < rows; r++) {
                const pinsInRow = r + 2;
                for (let i = 0; i < pinsInRow; i++) {
                    const x = (cw / 2) + (i - (pinsInRow - 1) / 2) * spacing;
                    const y = 50 + r * 35;
                    Matter.World.add(world, Matter.Bodies.circle(x, y, 3.5, { isStatic: true, render: { fillStyle: '#ffffff' } }));
                }
            }
        }

        function updateBuckets() {
            const container = document.getElementById('bucket-labels');
            container.innerHTML = '';
            multipliers[currentRisk].forEach(m => {
                const d = document.createElement('div');
                d.className = 'm-badge'; d.innerText = m + 'x';
                container.appendChild(d);
            });
        }

        function dropBall() {
            let saldo = parseInt(localStorage.getItem('user_balance') || 0);
            if (saldo < betAmount) return alert("Saldo IDR 0! Top Up dulu.");
            localStorage.setItem('user_balance', saldo - betAmount);
            updateUI();

            const ball = Matter.Bodies.circle(document.getElementById('plinko-canvas-container').clientWidth/2, 10, 8, {
                restitution: 0.5, render: { fillStyle: '#ff007b', shadowBlur: 10, shadowColor: '#ff007b' }
            });
            Matter.World.add(world, ball);

            setTimeout(() => {
                Matter.World.remove(world, ball);
                const res = multipliers[currentRisk][Math.floor(Math.random() * 9)];
                const win = betAmount * res;
                localStorage.setItem('user_balance', parseInt(localStorage.getItem('user_balance')) + win);
                updateUI();
                if(res > 1) alert("WIN! " + res + "x");
            }, 3500);
        }

        function setRisk(level) {
            currentRisk = level;
            document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('risk-' + level).classList.add('active');
            updateBuckets();
        }

        function adjustBet(v) { betAmount = Math.max(5000, betAmount + v); updateUI(); }
        
        function updateUI() {
            document.getElementById('user-balance').innerText = "IDR " + parseInt(localStorage.getItem('user_balance') || 0).toLocaleString();
            document.getElementById('current-bet').innerText = betAmount.toLocaleString();
        }
    </script>
</body>
</html>
