<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816;
        }

        body, html {
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HEADER */
        .header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box; z-index: 100;
        }
        .nav-btn-top {
            width: 50px; height: 50px; background: rgba(255,255,255,0.1);
            border: 2px solid var(--neon-pink); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 10px var(--neon-pink);
        }
        .nav-btn-top i { font-size: 20px; color: white; }
        
        .saldo-display { 
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); 
            border-radius: 20px; padding: 5px 20px; text-align: center;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        /* AREA PIRAMIDA PAKU */
        .game-container { position: relative; width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        canvas { background: transparent; margin-top: 10px; }

        /* PERKALIAN (SLOTS) */
        .multiplier-bar { display: flex; justify-content: center; gap: 4px; width: 90%; margin: 10px 0; }
        .m-slot { 
            flex: 1; padding: 8px 0; font-size: 10px; font-weight: 900; 
            text-align: center; border-radius: 6px; color: white;
        }
        .pink { background: var(--neon-pink); box-shadow: 0 0 8px var(--neon-pink); }
        .gold { background: var(--neon-gold); color: black; box-shadow: 0 0 8px var(--neon-gold); }
        .blue { background: var(--neon-blue); color: black; box-shadow: 0 0 8px var(--neon-blue); }

        /* NAVIGASI BAWAH (DEPOSIT, WD, RANK) */
        .action-nav { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; width: 90%; margin-bottom: 15px; 
        }
        .nav-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 12px 0; text-align: center;
            cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .nav-box:active { background: rgba(255,255,255,0.2); }
        .nav-box i { font-size: 22px; margin-bottom: 5px; display: block; }
        .nav-box span { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        /* KONTROL TARUHAN & MULAI */
        .bet-area { 
            background: rgba(0,0,0,0.6); border-radius: 30px; display: flex; 
            align-items: center; padding: 5px 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); 
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 25px; cursor: pointer; font-weight: bold; }
        
        .btn-spin { 
            width: 85%; padding: 16px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); 
            border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 900; 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5); cursor: pointer; text-transform: uppercase;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="nav-btn-top" onclick="location.href='profile.html'">
            <i class="fa-solid fa-user"></i>
        </div>
        <div class="saldo-display">
            <small style="color: var(--neon-blue); font-size: 8px; font-weight: bold; display: block;">SALDO VIP</small>
            <div id="display-saldo" style="font-size: 18px; font-weight: 900;">IDR 91.200</div>
        </div>
        <div class="nav-btn-top" style="border-color: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold);" onclick="location.href='reward.html'">
            <i class="fa-solid fa-gift" style="color: var(--neon-gold);"></i>
        </div>
    </div>

    <div class="game-container">
        <canvas id="plinkoCanvas"></canvas>

        <div class="multiplier-bar">
            <div class="m-slot pink">5x</div>
            <div class="m-slot gold">2x</div>
            <div class="m-slot gold">1.2x</div>
            <div class="m-slot blue">0.2x</div>
            <div class="m-slot gold">1.2x</div>
            <div class="m-slot gold">2x</div>
            <div class="m-slot pink">5x</div>
        </div>

        <div class="action-nav">
            <a href="withdraw.html" class="nav-box">
                <i class="fa-solid fa-hand-holding-dollar" style="color: var(--neon-gold);"></i>
                <span style="color: var(--neon-pink);">Tarik</span>
            </a>
            <a href="deposit.html" class="nav-box">
                <i class="fa-solid fa-building-columns" style="color: var(--neon-blue);"></i>
                <span style="color: var(--neon-pink);">Deposit</span>
            </a>
            <a href="rank.html" class="nav-box">
                <i class="fa-solid fa-crown" style="color: var(--neon-gold);"></i>
                <span style="color: var(--neon-pink);">Rank</span>
            </a>
        </div>

        <div class="bet-area">
            <button class="bet-btn" onclick="adjustBet(-100)">-</button>
            <div style="text-align: center; min-width: 100px;">
                <small style="color:#666; display:block; font-size: 8px;">TARUHAN</small>
                <span id="bet-amount" style="font-size: 18px; font-weight: 900; color: var(--neon-gold);">400</span>
            </div>
            <button class="bet-btn" onclick="adjustBet(100)">+</button>
        </div>

        <button class="btn-spin" onclick="dropBall()">MULAI MAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 300;

        // Gambar piramida paku statis
        function drawPins() {
            ctx.fillStyle = "white";
            for (let r = 2; r <= 10; r++) {
                for (let c = 0; c < r; c++) {
                    let x = canvas.width / 2 + (c - (r - 1) / 2) * 30;
                    let y = r * 25;
                    ctx.beginPath();
                    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        drawPins();

        function adjustBet(val) {
            let current = parseInt(document.getElementById('bet-amount').innerText);
            document.getElementById('bet-amount').innerText = Math.max(100, current + val);
        }

        function dropBall() {
            // Logika jatuhkan bola neon biru
            console.log("Bola dilepaskan...");
        }
    </script>
</body>
</html>
