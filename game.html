<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko VIP - Pro Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --gold: #fbff00;
            --bg-dark: #0a0b1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #1a1c3d 0%, var(--bg-dark) 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER: Perbaikan Posisi Saldo Agar Sempurna di Tengah */
        .game-header {
            width: 100%;
            padding: 10px 15px;
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Memastikan saldo benar-benar di tengah */
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-left { display: flex; align-items: center; gap: 15px; justify-self: start; }

        .profile-img {
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink);
            object-fit: cover;
        }

        .gift-container { text-align: center; cursor: pointer; animation: pulse 1.5s infinite; }

        .balance-display {
            text-align: center;
            min-width: 120px;
            padding: 5px 10px;
            border-radius: 20px;
            border: 2px solid var(--neon-blue);
            background: rgba(0, 212, 255, 0.05);
            justify-self: center; /* Presisi di tengah */
        }

        .header-right { justify-self: end; text-align: center; cursor: pointer; }

        .menu-text {
            font-size: 8px; font-weight: 900; color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink); text-transform: uppercase; margin-top: 2px;
        }

        /* ARENA PLINKO */
        .game-arena { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #plinko-canvas-container { width: 100%; max-width: 380px; height: 380px; position: relative; }

        /* KOTAK PERKALIAN WARNA-WARNI */
        #bucket-labels { display: flex; justify-content: center; gap: 4px; width: 100%; position: absolute; bottom: 0; }
        .m-badge {
            font-size: 9px; font-weight: bold; color: #fff; padding: 6px 0; border-radius: 4px;
            min-width: 35px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .m-high { background: #ff0033; }
        .m-mid { background: #ff9900; }
        .m-low { background: #00cc66; }
        .m-zero { background: #444; }

        /* MENU GRID BAWAH */
        .bottom-menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 92%; margin: 15px auto; }
        .menu-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 0, 119, 0.2);
            border-radius: 12px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* FOOTER */
        .footer-controls { padding: 10px 20px 25px; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-play {
            width: 100%; max-width: 300px; padding: 15px; border-radius: 40px; border: none;
            background: linear-gradient(to right, #00d4ff, #0055ff); color: white;
            font-size: 18px; font-weight: 900; box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }
    </style>
</head>
<body onload="initPlinko()">

    <div class="game-header">
        <div class="header-left">
            <div onclick="window.location.href='profile.html'" style="text-align:center">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Lucky" class="profile-img">
                <div class="menu-text">PROFILE</div>
            </div>
            <div class="gift-container" onclick="window.location.href='rewards.html'">
                <div style="font-size:28px">🎁</div>
                <div class="menu-text">HADIAH</div>
            </div>
        </div>

        <div class="balance-display">
            <span style="font-size: 8px; color: #00d4ff; display:block; letter-spacing: 1px;">CREDITS</span>
            <span id="user-balance" style="font-weight: bold; font-size: 16px; color: white;">IDR 0</span>
        </div>

        <div class="header-right" onclick="window.location.href='deposit.html'">
            <div style="font-size:28px; filter: drop-shadow(0 0 5px gold);">💰</div>
            <div class="menu-text">DEPOSIT</div>
        </div>
    </div>

    <div class="game-arena">
        <div id="plinko-canvas-container">
            <div id="bucket-labels"></div>
        </div>
    </div>

    <div class="bottom-menu-grid">
        <div class="menu-box" onclick="window.location.href='deposit.html'">
            <span style="font-size:24px">➕</span><span class="menu-text">TOP UP</span>
        </div>
        <div class="menu-box" onclick="window.location.href='withdraw.html'">
            <span style="font-size:24px">💱</span><span class="menu-text">TARIK</span>
        </div>
        <div class="menu-box" onclick="window.location.href='deposit.html'">
            <span style="font-size:24px; color:#00ff88">💲</span><span class="menu-text">DEPOSIT</span>
        </div>
        <div class="menu-box" onclick="alert('Ranking Segera Tersedia!')">
            <span style="font-size:24px">🏆</span><span class="menu-text" style="font-size:6px">SEGERA TERSEDIA</span>
        </div>
    </div>

    <div class="footer-controls">
        <div style="display:flex; align-items:center; gap:20px; background:rgba(0,0,0,0.3); padding:5px 20px; border-radius:20px;">
            <button onclick="adjustBet(-5000)" style="background:none; border:none; color:var(--neon-blue); font-size:24px;">-</button>
            <div style="text-align:center"><span id="current-bet" style="font-weight:bold; font-size:16px">5.000</span></div>
            <button onclick="adjustBet(5000)" style="background:none; border:none; color:var(--neon-blue); font-size:24px;">+</button>
        </div>
        <button class="btn-play" onclick="dropBall()">PLAY BALL</button>
    </div>

    <script>
        let saldo = parseInt(localStorage.getItem('user_balance') || 0);
        let betAmount = 5000;
        const multipliers = { low: [5, 2, 1.2, 0.5, 0.2, 0.5, 1.2, 2, 5] };
        let engine, world, render;

        function initPlinko() {
            const container = document.getElementById('plinko-canvas-container');
            engine = Matter.Engine.create(); world = engine.world;
            render = Matter.Render.create({ element: container, engine: engine, options: { width: container.clientWidth, height: 380, wireframes: false, background: 'transparent' } });
            createPins(container.clientWidth); updateBuckets(); updateUI();
            Matter.Render.run(render); Matter.Runner.run(Matter.Runner.create(), engine);
        }

        function createPins(cw) {
            const rows = 10; const spacing = cw / 11;
            for (let r = 0; r < rows; r++) {
                const pinsInRow = r + 2;
                for (let i = 0; i < pinsInRow; i++) {
                    const x = (cw / 2) + (i - (pinsInRow - 1) / 2) * spacing;
                    const y = 40 + r * 30;
                    Matter.World.add(world, Matter.Bodies.circle(x, y, 3, { isStatic: true, render: { fillStyle: '#ffffff' } }));
                }
            }
        }

        function updateBuckets() {
            const container = document.getElementById('bucket-labels'); container.innerHTML = '';
            multipliers.low.forEach(m => {
                const d = document.createElement('div');
                d.className = 'm-badge ' + (m >= 5 ? 'm-high' : m >= 2 ? 'm-mid' : m >= 1 ? 'm-low' : 'm-zero');
                d.innerText = m + 'x'; container.appendChild(d);
            });
        }

        function dropBall() {
            if (saldo < betAmount) return alert("Saldo IDR 0! Silakan Klaim Hadiah Harian.");
            saldo -= betAmount; localStorage.setItem('user_balance', saldo); updateUI();
            const b = Matter.Bodies.circle(document.getElementById('plinko-canvas-container').clientWidth/2, 5, 8, { restitution: 0.5, render: { fillStyle: '#ff0077' } });
            Matter.World.add(world, b);
            setTimeout(() => {
                Matter.World.remove(world, b);
                const res = multipliers.low[Math.floor(Math.random() * 9)];
                saldo += Math.floor(betAmount * res);
                localStorage.setItem('user_balance', saldo); updateUI();
            }, 3000);
        }

        function adjustBet(v) { betAmount = Math.max(5000, betAmount + v); updateUI(); }
        function updateUI() {
            document.getElementById('user-balance').innerText = "IDR " + saldo.toLocaleString();
            document.getElementById('current-bet').innerText = betAmount.toLocaleString();
        }

        // Sinkronisasi saldo otomatis jika ada klaim dari halaman lain
        window.addEventListener('storage', () => {
            saldo = parseInt(localStorage.getItem('user_balance') || 0);
            updateUI();
        });
    </script>
</body>
</html>
