<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .header { display: flex; justify-content: center; align-items: center; padding: 15px; position: relative; }
        .prof-link { position: absolute; left: 20px; font-size: 24px; color: var(--pink); cursor: pointer; }
        .balance-box { background: #000; border: 2px solid var(--blue); border-radius: 20px; padding: 5px 25px; text-align: center; min-width: 150px; box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        #tier-name { font-size: 8px; font-weight: 900; display: block; }
        #display-saldo { font-size: 18px; font-weight: 900; }

        /* Plinko Board */
        #game-container { position: relative; width: 100%; height: 350px; margin-top: 20px; }
        .peg { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; }

        /* Multipliers */
        .multipliers { display: flex; justify-content: center; gap: 4px; padding: 10px; }
        .slot { flex: 1; padding: 10px 0; border-radius: 6px; text-align: center; font-size: 10px; font-weight: 900; }
        .m-pink { background: var(--pink); box-shadow: 0 0 10px var(--pink); }
        .m-yellow { background: var(--yellow); color: black; box-shadow: 0 0 10px var(--yellow); }
        .m-blue { background: var(--blue); color: black; box-shadow: 0 0 10px var(--blue); }

        /* Nav Buttons */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px; margin-top: 15px; }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .btn-nav i { display: block; font-size: 20px; margin-bottom: 5px; }
        .c-pink { color: var(--pink); border-color: var(--pink); }
        .c-blue { color: var(--blue); border-color: var(--blue); }
        .c-yellow { color: var(--yellow); border-color: var(--yellow); }

        .play-area { text-align: center; margin-top: 20px; }
        .btn-main { width: 85%; padding: 18px; border-radius: 50px; border: none; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; background: linear-gradient(90deg, var(--pink), var(--blue)); box-shadow: 0 0 20px var(--pink); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-circle-user prof-link" onclick="location.href='profil.html'"></i>
        <div class="balance-box">
            <span id="tier-name">BRONZE</span>
            <span id="display-saldo">IDR 0</span>
        </div>
    </div>

    <div id="game-container"></div>

    <div class="multipliers">
        <div class="slot m-pink">5x</div>
        <div class="slot m-yellow">2x</div>
        <div class="slot m-blue">1.2x</div>
        <div class="slot m-blue" style="background:#fff">0.2x</div>
        <div class="slot m-blue">1.2x</div>
        <div class="slot m-yellow">2x</div>
        <div class="slot m-pink">5x</div>
    </div>

    <div class="nav-grid">
        <div class="btn-nav c-pink" onclick="location.href='withdraw.html'">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span style="font-size: 9px; font-weight: 900;">WITHDRAW</span>
        </div>
        <div class="btn-nav c-blue" onclick="location.href='deposit.html'">
            <i class="fa-solid fa-building-columns"></i>
            <span style="font-size: 9px; font-weight: 900;">DEPOSIT</span>
        </div>
        <div class="btn-nav c-yellow" onclick="location.href='reward.html'">
            <i class="fa-solid fa-trophy"></i>
            <span style="font-size: 9px; font-weight: 900;">REWARD</span>
        </div>
    </div>

    <div class="play-area">
        <div style="color: var(--yellow); font-weight: 900; margin-bottom: 10px; font-size: 14px;">BET: IDR 1,000</div>
        <button class="btn-main" onclick="dropBall()">MULAI MAIN</button>
    </div>

    <script src="global.js"></script>
    <script>
        // Logika Board Plinko
        const container = document.getElementById('game-container');
        for (let r = 2; r <= 8; r++) {
            for (let i = 0; i < r; i++) {
                const peg = document.createElement('div');
                peg.className = 'peg';
                peg.style.top = (r * 40) + 'px';
                peg.style.left = `calc(50% + ${(i - (r - 1) / 2) * 36}px)`;
                container.appendChild(peg);
            }
        }
        function dropBall() { if(updateSaldo(-1000)) { alert("Bola Meluncur!"); updateSaldo(Math.random() > 0.5 ? 2000 : 0); } else { alert("Saldo Habis!"); } }
    </script>
</body>
</html>
