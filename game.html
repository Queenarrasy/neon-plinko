<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - TRANSACTION READY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816;
        }
        body {
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 40%, rgba(255, 0, 119, 0.12) 0%, transparent 60%);
        }
        .top-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-sizing: border-box; }
        .saldo-badge { background: rgba(0, 0, 0, 0.8); border: 2px solid var(--neon-blue); border-radius: 20px; padding: 6px 20px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); text-align: center; }
        
        .multiplier-wrap { display: flex; justify-content: center; gap: 4px; margin-top: 20px; width: 95%; }
        .slot { flex: 1; padding: 10px 0; font-size: 11px; font-weight: 900; text-align: center; border-radius: 6px; }
        .high { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
        .mid  { background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); color: #000; }
        .low  { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); color: #000; }

        .bet-bar { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; display: flex; align-items: center; padding: 5px 25px; margin-bottom: 15px; }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 28px; cursor: pointer; font-weight: bold; }
        
        .btn-main { width: 88%; padding: 20px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); border: none; border-radius: 40px; color: white; font-size: 22px; font-weight: 900; box-shadow: 0 0 30px rgba(0, 212, 255, 0.5); cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" style="width:55px; border-radius:50%; border:3px solid var(--neon-pink);">
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block;">SALDO VIP</span>
            <div id="balanceDisplay" style="font-size: 18px; font-weight: 900;">IDR 0</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" style="width:50px; filter: drop-shadow(0 0 10px var(--neon-pink));">
    </div>

    <div style="margin-top: 10px;">
        <canvas id="plinkoCanvas"></canvas>
        <div class="multiplier-wrap">
            <div class="slot high">5x</div>
            <div class="slot mid">2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot low">0.2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot mid">2x</div>
            <div class="slot high">5x</div>
        </div>
    </div>

    <div class="bet-bar" style="margin-top: 25px;">
        <button class="bet-btn" onclick="changeBet(-1)">-</button>
        <div style="margin: 0 30px; text-align: center; min-width: 100px;">
            <span style="font-size: 8px; color:#555; display:block; font-weight:bold;">TARUHAN</span>
            <span id="betDisplay" style="font-size: 18px; font-weight:900; color: var(--neon-gold);">400</span>
        </div>
        <button class="bet-btn" onclick="changeBet(1)">+</button>
    </div>

    <button class="btn-main" onclick="playGame()">MULAI MAIN</button>

    <script>
        // --- KONFIGURASI BET & ADMIN ---
        const betList = [400, 800, 1000, 1200, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 15000, 20000, 25000, 30000];
        let betIndex = 0;
        const multipliers = [5, 2, 1.2, 0.2, 1.2, 2, 5];
        
        let balance = parseInt(localStorage.getItem('user_balance')) || 50000;
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360; canvas.height = 300;
        
        const pins = [];
        const activeBalls = [];
        const rows = 9;

        // Init Pins
        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({ x: canvas.width / 2 + (j - (i - 1) / 2) * 35, y: i * 32 });
            }
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = "IDR " + balance.toLocaleString();
            document.getElementById('betDisplay').innerText = betList[betIndex].toLocaleString();
            localStorage.setItem('user_balance', balance);
        }

        function changeBet(dir) {
            betIndex += dir;
            if (betIndex < 0) betIndex = 0;
            if (betIndex >= betList.length) betIndex = betList.length - 1;
            updateUI();
        }

        function playGame() {
            const currentBet = betList[betIndex];
            if (balance < currentBet) return alert("Saldo tidak cukup!");

            // Potong Saldo Saat Klik
            balance -= currentBet;
            updateUI();

            // Tentukan target kemenangan (Setting Admin dibaca di sini)
            const admin = JSON.parse(localStorage.getItem('admin_plinko_settings')) || { winRate: 0.3 };
            let targetIdx = Math.random() < admin.winRate ? (Math.random() > 0.5 ? 0 : 6) : 3;
            
            spawnBall(targetIdx, currentBet);
        }

        function spawnBall(targetIdx, betAmount) {
            const targetX = 30 + (targetIdx * 50); // Estimasi posisi slot
            activeBalls.push({
                x: canvas.width / 2, y: 20,
                vx: (targetX - canvas.width / 2) / 60, vy: 2,
                bet: betAmount, targetIdx: targetIdx
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            pins.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); });

            activeBalls.forEach((ball, i) => {
                ball.y += ball.vy; ball.x += ball.vx; ball.vy += 0.2;
                
                pins.forEach(p => {
                    if (Math.hypot(ball.x - p.x, ball.y - p.y) < 8) {
                        ball.vy *= -0.4; ball.vx += (ball.x - p.x) * 0.1;
                    }
                });

                ctx.fillStyle = "var(--neon-blue)";
                ctx.shadowBlur = 10; ctx.shadowColor = "var(--neon-blue)";
                ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;

                // Saat bola masuk ke slot
                if (ball.y > canvas.height) {
                    const winAmount = ball.bet * multipliers[ball.targetIdx];
                    balance += winAmount;
                    updateUI();
                    activeBalls.splice(i, 1);
                }
            });
            requestAnimationFrame(draw);
        }

        window.onload = () => { updateUI(); draw(); };
    </script>
</body>
</html>
