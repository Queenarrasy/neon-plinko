<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - Official Arena</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --gold: #fbff00;
            --bg-dark: #0a0b1e;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* TOP NAVIGATION */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .nav-item { text-align: center; cursor: pointer; text-decoration: none; }
        .nav-icon { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); margin-bottom: 5px; }
        .gift-icon { width: 45px; height: 45px; filter: drop-shadow(0 0 10px var(--neon-pink)); }
        .nav-label { font-size: 9px; font-weight: 900; color: var(--neon-pink); text-transform: uppercase; }

        .saldo-box {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--neon-blue);
            border-radius: 25px;
            padding: 8px 25px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            text-align: center;
        }
        .saldo-label { font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block; }
        .saldo-amount { font-size: 16px; font-weight: 900; }

        /* GAME CANVAS AREA */
        #game-container {
            flex: 1;
            width: 100%;
            max-width: 450px;
            position: relative;
            display: flex;
            justify-content: center;
        }
        canvas { width: 100%; height: auto; max-height: 400px; }

        /* MULTIPLIER SLOTS VISUAL */
        .slot-row { display: flex; justify-content: space-around; width: 90%; margin-top: -30px; }
        .slot { padding: 4px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; color: white; }
        .s5x { background: #ff0044; box-shadow: 0 0 10px #ff0044; }
        .s2x { background: #ff4400; }
        .s1x { background: #ffaa00; }
        .s0x { background: #00ff88; color: #000; }

        /* ACTION GRID */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%;
            margin: 20px 0;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
        }
        .icon-mewah { font-size: 24px; margin-bottom: 8px; display: block; }
        .gold-txt { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .pink-txt { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .blue-txt { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* BET CONTROL */
        .bet-bar {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 20px;
            gap: 20px;
            margin-bottom: 15px;
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 24px; font-weight: bold; cursor: pointer; }
        .bet-display { text-align: center; min-width: 80px; }
        .bet-val { font-size: 14px; font-weight: 900; color: var(--gold); }

        .btn-play-neon {
            width: 85%;
            padding: 18px;
            background: linear-gradient(180deg, var(--neon-blue), #0077ff);
            border: none;
            border-radius: 35px;
            color: white;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5);
            cursor: pointer;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="profile.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="nav-icon">
            <span class="nav-label">PROFILE</span>
        </a>

        <div class="saldo-box">
            <span class="saldo-label">SALDO VIP</span>
            <span class="saldo-amount" id="balanceDisplay">IDR 0</span>
        </div>

        <a href="hadiah.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="gift-icon">
            <span class="nav-label">HADIAH</span>
        </a>
    </div>

    <div id="game-container">
        <canvas id="plinkoCanvas"></canvas>
    </div>

    <div class="slot-row">
        <div class="slot s5x">5x</div>
        <div class="slot s2x">2x</div>
        <div class="slot s1x">1.2x</div>
        <div class="slot s0x">0.2x</div>
        <div class="slot s1x">1.2x</div>
        <div class="slot s2x">2x</div>
        <div class="slot s5x">5x</div>
    </div>

    <div class="action-grid">
        <div class="action-card" onclick="window.location.href='tarik.html'">
            <i class="fa-solid fa-hand-holding-dollar icon-mewah gold-txt"></i>
            <span class="nav-label">TARIK</span>
        </div>
        <div class="action-card" onclick="window.location.href='deposit.html'">
            <i class="fa-solid fa-building-columns icon-mewah blue-txt"></i>
            <span class="nav-label">DEPOSIT</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-crown icon-mewah gold-txt"></i>
            <span class="nav-label">RANK</span>
        </div>
    </div>

    <div class="bet-bar">
        <button class="bet-btn" onclick="adjustBet(-100)">-</button>
        <div class="bet-display">
            <span style="font-size: 7px; color:#555; display:block">TARUHAN</span>
            <span class="bet-val" id="betDisplay">400</span>
        </div>
        <button class="bet-btn" onclick="adjustBet(100)">+</button>
    </div>

    <button class="btn-play-neon" onclick="dropBall()">MULAI MAIN</button>

    <script>
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 450;

        let bet = 400;
        let balance = parseInt(localStorage.getItem('user_balance')) || 0;
        let balls = [];
        const pins = [];
        const rows = 10;

        // Inisialisasi Pasak (Pins)
        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({
                    x: canvas.width / 2 + (j - (i - 1) / 2) * 35,
                    y: i * 35 + 20
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gambar Pasak
            ctx.fillStyle = "white";
            pins.forEach(pin => {
                ctx.beginPath();
                ctx.arc(pin.x, pin.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Update & Gambar Bola
            balls.forEach((ball, index) => {
                ball.y += 4;
                ball.x += ball.vx;
                
                // Pantulan Pasak (Simulasi Sederhana)
                pins.forEach(pin => {
                    const dist = Math.hypot(ball.x - pin.x, ball.y - pin.y);
                    if (dist < 8) {
                        ball.vx = (Math.random() - 0.5) * 6;
                        ball.y += 2;
                    }
                });

                ctx.fillStyle = "var(--neon-blue)";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "var(--neon-blue)";
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                if (ball.y > canvas.height) balls.splice(index, 1);
            });

            requestAnimationFrame(draw);
        }

        function dropBall() {
            if (balance < bet) return alert("Saldo tidak cukup!");
            balance -= bet;
            updateBalance();
            balls.push({ x: canvas.width / 2, y: 30, vx: 0 });
        }

        function adjustBet(val) {
            bet += val;
            if (bet < 400) bet = 400;
            document.getElementById('betDisplay').innerText = bet;
        }

        function updateBalance() {
            document.getElementById('balanceDisplay').innerText = "IDR " + balance.toLocaleString();
            localStorage.setItem('user_balance', balance);
        }

        window.onload = () => {
            updateBalance();
            draw();
        };
    </script>
</body>
</html>
