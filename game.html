<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .profile-btn { width: 45px; height: 45px; background: var(--neon-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .balance-box { background: #000; border: 2px solid var(--neon-blue); border-radius: 30px; padding: 5px 20px; text-align: center; }
        .balance-label { font-size: 8px; color: var(--neon-blue); font-weight: 900; display: block; }
        .balance-value { font-size: 16px; font-weight: 900; }
        .multiplier-container { display: flex; justify-content: center; gap: 5px; margin-top: 50px; }
        .slot { flex: 1; padding: 8px 0; border-radius: 5px; text-align: center; font-size: 10px; font-weight: bold; background: var(--neon-pink); }
        .nav-menu { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .nav-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; width: 80px; text-align: center; cursor: pointer; font-size: 10px; }
        .btn-play { width: 80%; padding: 15px; border-radius: 50px; border: none; background: var(--neon-blue); color: black; font-weight: 900; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="profile-btn" onclick="location.href='profil.html'"><i class="fa-solid fa-user"></i></div>
        <div class="balance-box">
            <span class="balance-label">SALDO PERMAINAN</span>
            <span class="balance-value" id="display-saldo">IDR 0</span>
        </div>
        <div class="profile-btn" style="background:var(--neon-gold)" onclick="location.href='reward.html'"><i class="fa-solid fa-gift" style="color:black"></i></div>
    </div>

    <div class="multiplier-container">
        <div class="slot">5x</div><div class="slot" style="background:var(--neon-gold); color:black">2x</div><div class="slot" style="background:var(--neon-blue); color:black">0.2x</div><div class="slot" style="background:var(--neon-gold); color:black">2x</div><div class="slot">5x</div>
    </div>

    <div class="nav-menu">
        <div class="nav-item" onclick="location.href='tarik.html'">TARIK</div>
        <div class="nav-item" onclick="location.href='deposit.html'">DEPOSIT</div>
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <div style="color:var(--neon-gold); font-weight: bold; margin-bottom: 10px;">TARUHAN: 400</div>
        <button class="btn-play" onclick="main()">MULAI MAIN</button>
    </div>

    <script src="global.js"></script>
    <script>
        function main() {
            if(updateSaldo(-400)) {
                setTimeout(() => {
                    let win = Math.random() > 0.5 ? 800 : 0;
                    updateSaldo(win);
                    alert(win > 0 ? "MENANG IDR 800!" : "ZONK!");
                }, 1000);
            } else {
                alert("Saldo tidak cukup!");
            }
        }
    </script>
</body>
</html>
