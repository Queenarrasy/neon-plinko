<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* HEADER */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 100; }
        .nav-btn-top { width: 42px; height: 42px; background: rgba(255,255,255,0.1); border: 2px solid var(--neon-pink); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .saldo-display { background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); border-radius: 20px; padding: 5px 15px; text-align: center; box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); }

        /* PAPAN SKOR KEMENANGAN (BARU) */
        #score-board {
            position: absolute; top: 75px; right: 20px; width: 100px; max-height: 150px;
            overflow: hidden; display: flex; flex-direction: column-reverse; gap: 5px; z-index: 50;
        }
        .score-item {
            background: rgba(0, 212, 255, 0.2); border-left: 3px solid var(--neon-blue);
            padding: 4px 8px; font-size: 11px; font-weight: 900; border-radius: 4px;
            animation: slideIn 0.3s ease-out; color: var(--neon-gold);
        }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .game-container { position: relative; width: 100%; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        canvas { background: transparent; cursor: pointer; }

        /* MULTIPLIER SLOTS */
        .multiplier-bar { display: flex; justify-content: center; gap: 3px; width: 95%; margin: 5px 0; }
        .m-slot { flex: 1; padding: 6px 0; font-size: 10px; font-weight: 900; text-align: center; border-radius: 5px; color: white; transition: 0.2s; }
        .pink { background: var(--neon-pink); }
        .gold { background: var(--neon-gold); color: black; }
        .blue { background: var(--neon-blue); color: black; }
        .active-slot { transform: translateY(5px); filter: brightness(1.5); box-shadow: 0 0 15px white; }

        /* NAVIGATION */
        .action-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 90%; margin: 10px 0; }
        .nav-box { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px 0; text-align: center; text-decoration: none; border: 1px solid rgba(255,255,255,0.1); }
        .nav-box span { font-size: 8px; font-weight: 900; color: var(--neon-pink); text-transform: uppercase; }

        /* CONTROLS */
        .bet-area { background: rgba(0,0,0,0.6); border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-spin { width: 85%; padding: 15px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 900; box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="nav-btn-top" onclick="location.href='profile.html'"><i class="fa-solid fa-user"></i></div>
        <div class="saldo-display">
            <small style="color: var(--neon-blue); font-size: 8px; font-weight: bold; display: block;">SALDO VIP</small>
            <div id="balance" style="font-size: 18px; font-weight: 900;">91200</div>
        </div>
        <div class="nav-btn-top" style="border-color: var(--neon-gold);"><i class="fa-solid fa-gift" style="color: var(--neon-gold);"></i></div>
    </div>

    <div id="score-board"></div>

    <div class="game-container">
        <canvas id="plinkoCanvas"></canvas>

        <div class="multiplier-bar">
            <div class="m-slot pink">5x</div>
            <div class="m-slot gold">2x</div>
            <div class="m-slot gold">1.2x</div>
            <div class="m-slot blue">0.2x</div>
            <div class="m-slot gold">1.2x</div>
            <div class="m-slot gold">2x</div>
            <div class="m-slot pink">5x</div>
        </div>

        <div class="action-nav">
            <a href="withdraw.html" class="nav-box"><i class="fa-solid fa-money-bill" style="color: var(--neon-gold); font-size: 18px;"></i><span>Tarik</span></a>
            <a href="deposit.html" class="nav-box"><i class="fa-solid fa-wallet" style="color: var(--neon-blue); font-size: 18px;"></i><span>Deposit</span></a>
            <a href="rank.html" class="nav-box"><i class="fa-solid fa-crown" style="color: var(--neon-gold); font-size: 18px;"></i><span>Rank</span></a>
        </div>

        <div class="bet-area">
            <button onclick="adjustBet(-100)" style="background:none; border:none; color:var(--neon-blue); font-size:25px; cursor:pointer;">-</button>
            <div style="text-align: center; min-width: 100px;">
                <small style="color:#666; display:block; font-size: 8px;">TARUHAN</small>
                <span id="bet-amount" style="font-size: 18px; font-weight: 900; color: var(--neon-gold);">400</span>
            </div>
            <button onclick="adjustBet(100)" style="background:none; border:none; color:var(--neon-blue); font-size:25px; cursor:pointer;">+</button>
        </div>

        <button class="btn-spin" onclick="spawnBall()">MULAI MAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 320;

        let balance = 91200;
        let bet = 400;
        const multipliers = [5, 2, 1.2, 0.2, 1.2, 2, 5];
        const balls = [];
        const pins = [];
        const pinRows = 9;
        const spacing = 30;

        // Inisialisasi Paku
        for (let l = 2; l <= pinRows; l++) {
            for (let i = 0; i < l; i++) {
                pins.push({ x: canvas.width / 2 + (i - (l - 1) / 2) * spacing, y: l * 28 + 10 });
            }
        }

        function spawnBall() {
            if (balance < bet) return alert("Saldo tidak cukup!");
            balance -= bet; // Saldo berkurang setiap klik
            updateUI();

            // Tambahkan bola ke array (Multi-Ball)
            balls.push({
                x: canvas.width / 2 + (Math.random() * 10 - 5),
                y: 20,
                vx: 0,
                vy: 2,
                radius: 6,
                color: "#00d4ff"
            });
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gambar Paku
            ctx.fillStyle = "white";
            pins.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2); ctx.fill();
            });

            // Update & Gambar Bola
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                b.vy += 0.15; // Gravitas
                b.y += b.vy;
                b.x += b.vx;

                // Tabrakan Paku
                pins.forEach(p => {
                    let dx = b.x - p.x;
                    let dy = b.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < b.radius + 3) {
                        b.vx = (dx / dist) * 2.5;
                        b.vy *= -0.5;
                        b.y = p.y + b.radius + 2;
                    }
                });

                // Gambar Bola dengan Glow
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 10; ctx.shadowColor = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;

                // Cek jika bola masuk slot
                if (b.y > canvas.height - 5) {
                    handleWin(b.x);
                    balls.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function handleWin(finalX) {
            let slotWidth = canvas.width / 7;
            let index = Math.floor(finalX / slotWidth);
            index = Math.max(0, Math.min(6, index));

            let winValue = bet * multipliers[index];
            balance += winValue; // Saldo bertambah sesuai perkalian
            
            // Tampilkan Skor di Papan Skor
            const sb = document.getElementById('score-board');
            const item = document.createElement('div');
            item.className = 'score-item';
            item.innerHTML = `+IDR ${winValue.toLocaleString()}`;
            sb.appendChild(item);
            setTimeout(() => item.remove(), 3000);

            // Efek Visual Slot
            const slots = document.querySelectorAll('.m-slot');
            slots[index].classList.add('active-slot');
            setTimeout(() => slots[index].classList.remove('active-slot'), 500);

            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance).toLocaleString();
            document.getElementById('bet-amount').innerText = bet;
        }

        function adjustBet(val) {
            bet = Math.max(100, bet + val);
            updateUI();
        }

        update();
        updateUI();
    </script>
</body>
</html>
