<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816;
        }

        body, html {
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
        }

        /* HEADER & TOMBOL ATAS */
        .top-nav {
            position: relative; z-index: 1000; /* Memastikan tombol di atas canvas */
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box;
        }
        
        /* Tombol Profil */
        .profile-btn { 
            width: 55px; height: 55px; border-radius: 50%; 
            border: 3px solid var(--neon-pink); cursor: pointer; 
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .saldo-badge {
            background: rgba(0, 0, 0, 0.8); border: 2px solid var(--neon-blue);
            border-radius: 20px; padding: 5px 20px; text-align: center;
        }

        /* Tombol Hadiah */
        .gift-btn { width: 50px; cursor: pointer; transition: 0.3s; }
        .gift-btn:active { transform: scale(0.9); }

        /* AREA GAME */
        .game-zone { position: relative; width: 100%; height: 320px; display: flex; justify-content: center; }
        canvas { position: absolute; top: 0; z-index: 1; pointer-events: none; }

        /* TOMBOL NAVIGASI BARU (Deposit, Withdraw, Rank) */
        .action-row { 
            position: relative; z-index: 1000;
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; width: 90%; margin: 15px auto; 
        }
        .nav-card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; padding: 12px 0; text-align: center; cursor: pointer;
            text-decoration: none; color: white; transition: 0.3s;
        }
        .nav-card:active { background: rgba(255, 255, 255, 0.2); }
        .nav-card i { font-size: 20px; margin-bottom: 5px; display: block; }
        .nav-label { font-size: 9px; font-weight: 900; color: var(--neon-pink); letter-spacing: 1px; }

        /* KONTROL TARUHAN & MULAI */
        .controls { position: relative; z-index: 1000; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .bet-bar {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; display: flex; align-items: center; padding: 5px 25px; margin-bottom: 15px;
        }
        .btn-main {
            width: 85%; padding: 18px; background: linear-gradient(180deg, var(--neon-blue), #0055ff);
            border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 900;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5); cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="profile-btn" onclick="location.href='profile.html'">
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block;">SALDO VIP</span>
            <div id="balance" style="font-size: 18px; font-weight: 900;">IDR 50.000</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="gift-btn" onclick="location.href='hadiah.html'">
    </div>

    <div class="game-zone">
        <canvas id="plinkoCanvas"></canvas>
        </div>

    <div class="action-row">
        <a href="withdraw.html" class="nav-card">
            <i class="fa-solid fa-money-bill-transfer" style="color: var(--neon-gold);"></i>
            <span class="nav-label">WITHDRAW</span>
        </a>
        <a href="deposit.html" class="nav-card">
            <i class="fa-solid fa-wallet" style="color: var(--neon-blue);"></i>
            <span class="nav-label">DEPOSIT</span>
        </a>
        <a href="rank.html" class="nav-card">
            <i class="fa-solid fa-crown" style="color: var(--neon-gold);"></i>
            <span class="nav-label">RANK</span>
        </a>
    </div>

    <div class="controls">
        <div class="bet-bar">
            <button style="background:none; border:none; color:var(--neon-blue); font-size:25px; cursor:pointer;" onclick="changeBet(-1)">-</button>
            <div style="margin: 0 30px; text-align: center;">
                <span style="font-size: 8px; color:#777; display:block;">TARUHAN</span>
                <span id="betDisplay" style="font-size: 18px; font-weight:900; color: var(--neon-gold);">400</span>
            </div>
            <button style="background:none; border:none; color:var(--neon-blue); font-size:25px; cursor:pointer;" onclick="changeBet(1)">+</button>
        </div>
        <button class="btn-main" onclick="dropBall()">MULAI MAIN</button>
    </div>

    <script>
        // Memastikan link GitHub terbaca, tambahkan logika script Anda di sini
        function changeBet(val) {
            // Logika ubah taruhan
        }
        function dropBall() {
            // Logika jatuhkan bola neon
        }
    </script>
</body>
</html>
