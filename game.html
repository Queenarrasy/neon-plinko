<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; 
            --pink-neon: 0 0 5px var(--pink), 0 0 10px var(--pink);
            --blue-neon: 0 0 5px var(--blue), 0 0 10px var(--blue);
            --yellow-neon: 0 0 5px var(--yellow), 0 0 10px var(--yellow);
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        .neon-p { color: var(--pink); text-shadow: var(--pink-neon); }
        .neon-b { color: var(--blue); text-shadow: var(--blue-neon); }
        .neon-y { color: var(--yellow); text-shadow: var(--yellow-neon); }
        
        .header { display: flex; justify-content: center; align-items: center; padding: 15px 10px; position: relative; z-index: 100; background: var(--bg); }
        .prof-container { position: absolute; left: 20px; display: flex; flex-direction: column; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .prof-link { font-size: 28px; color: var(--pink); text-shadow: var(--pink-neon); }
        .prof-text { font-size: 8px; font-weight: 900; margin-top: 2px; color: var(--blue); text-shadow: var(--blue-neon); }
        .balance-box { background: #000; border: 2px solid var(--blue); border-radius: 20px; padding: 5px 20px; text-align: center; min-width: 140px; }
        #display-saldo { font-size: 18px; font-weight: 900; }

        #game-container { position: relative; width: 100%; height: 350px; flex-shrink: 0; margin-top: 5px; overflow: hidden; }
        .peg { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px #fff; z-index: 5; }
        .ball { position: absolute; width: 14px; height: 14px; background: var(--pink); border-radius: 50%; box-shadow: 0 0 15px var(--pink); z-index: 10; transform: translate(-50%, -50%); pointer-events: none; will-change: left, top; }

        .multipliers { display: flex; justify-content: center; gap: 3px; padding: 0; margin-top: 5px; z-index: 80; }
        .slot { flex: 0 0 38px; padding: 10px 0; border-radius: 6px; text-align: center; font-size: 9px; font-weight: 900; border: 1px solid rgba(255,255,255,0.2); }
        .m-pink { background: var(--pink); box-shadow: var(--pink-neon); }
        .m-yellow { background: var(--yellow); color: black; box-shadow: var(--yellow-neon); }
        .m-blue { background: var(--blue); color: black; box-shadow: var(--blue-neon); }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 0 20px; margin-top: 20px; }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-nav i { font-size: 24px; margin-bottom: 5px; display: block; }
        .btn-nav span { font-size: 9px; font-weight: 900; }

        .play-area { text-align: center; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 30px; }
        .mode-toggles { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .toggle { padding: 10px 25px; border-radius: 20px; font-size: 10px; font-weight: 900; cursor: pointer; border: 1px solid #333; background: #000; color: #555; -webkit-tap-highlight-color: transparent; }
        .toggle.active { border-color: var(--pink); color: var(--yellow); text-shadow: var(--yellow-neon); box-shadow: inset 0 0 10px var(--pink); }
        .btn-main { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: 900; font-size: 18px; text-transform: uppercase; cursor: pointer; background: linear-gradient(90deg, var(--pink), var(--blue)); color: white; -webkit-tap-highlight-color: transparent; box-shadow: 0 0 20px var(--pink); }

        #score-board { position: absolute; left: 10px; top: 120px; width: 85px; display: flex; flex-direction: column; gap: 6px; z-index: 50; }
        .score-item { background: rgba(0,0,0,0.85); border: 1px solid var(--blue); font-size: 9px; padding: 6px; border-radius: 6px; text-align: center; font-weight: 900; color: var(--yellow); text-shadow: var(--yellow-neon); animation: popupIn 0.3s ease-out; }
        @keyframes popupIn { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .win-popup { position: absolute; font-weight: 900; color: var(--yellow); text-shadow: var(--yellow-neon); pointer-events: none; z-index: 1000; animation: floatUp 1s ease-out forwards; font-size: 22px; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-70px); opacity: 0; } }

        #neon-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .neon-modal { background: #0d0f26; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; width: 80%; text-align: center; box-shadow: 0 0 30px var(--pink); }
        .neon-btn { background: var(--blue); border: none; padding: 12px; width: 100%; border-radius: 50px; font-weight: 900; margin-top: 15px; color: #000; }
    </style>
</head>
<body>

    <div id="score-board"></div>
    
    <div id="neon-overlay">
        <div class="neon-modal">
            <h2 id="modal-title" class="neon-p">INFO</h2>
            <p id="modal-msg" class="neon-b"></p>
            <button class="neon-btn" onclick="closeNeonModal()">OK</button>
        </div>
    </div>

    <div class="header">
        <div class="prof-container" onclick="location.href='profil.html'">
            <i class="fa-solid fa-circle-user prof-link"></i>
            <span class="prof-text">PROFIL</span>
        </div>
        <div class="balance-box">
            <span id="tier-name" class="neon-y" style="font-size: 9px; font-weight: 900; display: block;">VIP PLAYER</span>
            <span id="display-saldo" class="neon-b">IDR 0</span>
        </div>
    </div>

    <div id="game-container"></div>

    <div class="multipliers">
        <div class="slot m-pink">5x</div>
        <div class="slot m-yellow">2x</div>
        <div class="slot m-blue">1.2x</div>
        <div class="slot m-blue" style="background:#fff; box-shadow: 0 0 10px #fff; color: #000;">0.2x</div>
        <div class="slot m-blue">1.2x</div>
        <div class="slot m-yellow">2x</div>
        <div class="slot m-pink">5x</div>
    </div>

    <div class="nav-grid">
        <div class="btn-nav" onclick="location.href='withdraw.html'"><i class="fa-solid fa-wallet neon-p"></i><span class="neon-y">WITHDRAW</span></div>
        <div class="btn-nav" onclick="location.href='deposit.html'"><i class="fa-solid fa-building-columns neon-b"></i><span class="neon-p">DEPOSIT</span></div>
        <div class="btn-nav" onclick="location.href='reward.html'"><i class="fa-solid fa-gift neon-y"></i><span class="neon-b">REWARD</span></div>
    </div>

    <div class="play-area">
        <div class="mode-toggles">
            <div id="btn-normal" class="toggle active" onclick="setMode('normal')">NORMAL</div>
            <div id="btn-auto" class="toggle" onclick="setMode('auto')">AUTO</div>
        </div>
        <div class="bet-selector" style="display: flex; align-items: center; justify-content: center; gap: 20px; background: #000; border-radius: 50px; padding: 8px; margin-bottom: 20px; border: 1px solid #444; width: 85%; margin: 0 auto 20px auto;">
            <button style="background:none; border:none; color:var(--pink); font-size: 24px; font-weight: 900; cursor:pointer;" onclick="changeBet(-1)">-</button>
            <div id="current-bet" class="neon-y" style="font-size: 18px; font-weight: 900; color:var(--blue);">1,000</div>
            <button style="background:none; border:none; color:var(--pink); font-size: 24px; font-weight: 900; cursor:pointer;" onclick="changeBet(1)">+</button>
        </div>
        <button class="btn-main" id="play-btn" onclick="handlePlay()">MULAI MAIN</button>
    </div>

    <script src="global.js"></script>
    <script>
        // --- ADMIN SETTING ---
        let winChance = 0.4; // 0.4 = 40% kemungkinan menang besar, sisanya ke arah tengah (0.2x)
        
        const container = document.getElementById('game-container');
        const bets = [400, 1000, 2000, 5000, 10000, 20000];
        let betIdx = 1;
        let isAuto = false;
        let autoInterval = null;
        let pegLocations = [];
        const slots = [5, 2, 1.2, 0.2, 1.2, 2, 5];

        // Init Pegs
        function initPegs() {
            container.innerHTML = '';
            pegLocations = [];
            const rows = 8;
            for (let r = 2; r <= rows; r++) {
                for (let i = 0; i < r; i++) {
                    const peg = document.createElement('div');
                    peg.className = 'peg';
                    const x = (i - (r - 1) / 2) * 42; 
                    const y = r * 38; 
                    const leftPos = container.offsetWidth / 2 + x;
                    peg.style.left = leftPos + 'px';
                    peg.style.top = y + 'px';
                    container.appendChild(peg);
                    pegLocations.push({ x: leftPos, y: y });
                }
            }
        }
        window.addEventListener('load', initPegs);

        function showNeonModal(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-overlay').style.display = 'flex';
        }
        function closeNeonModal() { document.getElementById('neon-overlay').style.display = 'none'; }

        function changeBet(d) {
            betIdx = Math.max(0, Math.min(bets.length-1, betIdx+d));
            document.getElementById('current-bet').innerText = bets[betIdx].toLocaleString();
        }

        function setMode(m) {
            if (m === 'normal') {
                isAuto = false;
                clearInterval(autoInterval);
                document.getElementById('btn-normal').classList.add('active');
                document.getElementById('btn-auto').classList.remove('active');
                document.getElementById('play-btn').innerText = "MULAI MAIN";
            } else {
                isAuto = true;
                document.getElementById('btn-auto').classList.add('active');
                document.getElementById('btn-normal').classList.remove('active');
                document.getElementById('play-btn').innerText = "STOP AUTO";
                startAuto();
            }
        }

        function handlePlay() {
            if (isAuto) {
                setMode('normal');
            } else {
                dropBall();
            }
        }

        function startAuto() {
            dropBall();
            autoInterval = setInterval(() => {
                if(isAuto) dropBall();
            }, 1000);
        }

        function addScoreBoard(amount) {
            const board = document.getElementById('score-board');
            const item = document.createElement('div');
            item.className = 'score-item';
            item.innerText = 'WIN IDR ' + amount.toLocaleString();
            board.prepend(item);
            if (board.children.length > 5) {
                board.removeChild(board.lastChild);
            }
        }

        function dropBall() {
            const bet = bets[betIdx];
            if (typeof updateSaldo === 'function') {
                if (!updateSaldo(-bet)) {
                    setMode('normal');
                    showNeonModal("Saldo Tidak Cukup!");
                    return;
                }
            }

            const ballEl = document.createElement('div');
            ballEl.className = 'ball';
            container.appendChild(ballEl);

            // Admin Logic: Arahkan bola sedikit ke kiri/kanan jika winChance tinggi
            let startOffset = (Math.random() - 0.5) * 10;
            if (Math.random() < winChance) {
                startOffset = Math.random() > 0.5 ? 20 : -20;
            }

            let ball = {
                el: ballEl,
                x: container.offsetWidth / 2 + startOffset,
                y: 10,
                vx: (Math.random() - 0.5) * 2,
                vy: 0
            };

            const gravity = 0.4;
            const bounce = 0.5;

            const moveBall = setInterval(() => {
                ball.vy += gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Peg Collision
                pegLocations.forEach(p => {
                    const dx = ball.x - p.x;
                    const dy = ball.y - p.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 10) {
                        const angle = Math.atan2(dy, dx);
                        const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
                        ball.vx = Math.cos(angle) * speed * bounce + (Math.random()-0.5);
                        ball.vy = Math.sin(angle) * speed * bounce;
                    }
                });

                // Wall Collision
                if (ball.x < 10 || ball.x > container.offsetWidth - 10) ball.vx *= -1;

                ball.el.style.left = ball.x + 'px';
                ball.el.style.top = ball.y + 'px';

                // End Game
                if (ball.y > 340) {
                    clearInterval(moveBall);
                    const centerX = container.offsetWidth / 2;
                    const slotIdx = Math.min(6, Math.max(0, Math.round((ball.x - centerX) / 42 + 3)));
                    const win = Math.floor(bet * slots[slotIdx]);

                    if (typeof updateSaldo === 'function') updateSaldo(win);
                    
                    if (win > 0) {
                        addScoreBoard(win);
                        const p = document.createElement('div');
                        p.className = 'win-popup';
                        p.innerText = `+${win.toLocaleString()}`;
                        p.style.left = ball.x + 'px'; 
                        p.style.top = '300px';
                        document.body.appendChild(p);
                        setTimeout(() => p.remove(), 1000);
                    }
                    ball.el.remove();
                }
            }, 20);
        }
    </script>
</body>
</html>
