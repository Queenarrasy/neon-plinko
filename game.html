<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        
        /* UI Components */
        .header { display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; z-index: 100; background: var(--bg); }
        .prof-link { position: absolute; left: 20px; font-size: 24px; color: var(--pink); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .balance-box { background: #000; border: 2px solid var(--blue); border-radius: 20px; padding: 5px 20px; text-align: center; min-width: 140px; }
        #display-saldo { font-size: 16px; font-weight: 900; }

        /* Score Sidebar */
        #score-board {
            position: absolute; left: 10px; top: 80px; width: 50px; 
            display: flex; flex-direction: column; gap: 5px; z-index: 50;
        }
        .score-item { 
            background: rgba(0,0,0,0.6); border: 1px solid var(--blue); 
            font-size: 9px; padding: 4px; border-radius: 4px; text-align: center;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Game Elements */
        #game-container { position: relative; width: 100%; height: 300px; flex-shrink: 0; margin-top: -10px; }
        .peg { position: absolute; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px #fff; }
        .ball { position: absolute; width: 12px; height: 12px; background: var(--pink); border-radius: 50%; box-shadow: 0 0 10px var(--pink); z-index: 10; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.2s; }

        .multipliers { display: flex; justify-content: center; gap: 4px; padding: 0 15px; margin-top: 10px; z-index: 80; }
        .slot { flex: 1; padding: 8px 0; border-radius: 6px; text-align: center; font-size: 9px; font-weight: 900; max-width: 45px; border: 1px solid rgba(255,255,255,0.1); }
        .m-pink { background: var(--pink); }
        .m-yellow { background: var(--yellow); color: black; }
        .m-blue { background: var(--blue); color: black; }

        /* Controls */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 20px; margin-top: 20px; }
        .btn-nav { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .play-area { text-align: center; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .mode-toggles { display: flex; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .toggle { padding: 8px 12px; border-radius: 20px; font-size: 9px; font-weight: 900; cursor: pointer; border: 1px solid #333; background: #000; color: #555; outline: none !important; -webkit-tap-highlight-color: transparent; }
        .toggle.active { color: #fff; border-color: var(--pink); box-shadow: 0 0 10px var(--pink); }
        .bet-selector { display: flex; align-items: center; justify-content: center; gap: 15px; background: #000; border-radius: 50px; padding: 6px; margin-bottom: 20px; border: 1px solid #333; width: 85%; margin-left: auto; margin-right: auto; }
        .bet-btn { background: none; border: none; color: var(--blue); font-size: 20px; font-weight: 900; cursor: pointer; outline: none !important; -webkit-tap-highlight-color: transparent; }
        .btn-main { width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; background: linear-gradient(90deg, var(--pink), var(--blue)); color: white; outline: none !important; -webkit-tap-highlight-color: transparent; box-shadow: 0 0 15px var(--pink); }
        .btn-main.auto-active { background: var(--yellow); color: #000; box-shadow: 0 0 15px var(--yellow); }

        .win-popup { position: absolute; font-weight: 900; color: var(--yellow); text-shadow: 0 0 10px #000; pointer-events: none; z-index: 1000; animation: floatUp 1s ease-out forwards; font-size: 20px; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }

        /* Modal Custom */
        #neon-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .neon-modal { background: #0d0f26; border: 2px solid var(--pink); border-radius: 20px; padding: 25px; width: 80%; text-align: center; }
        .neon-btn { background: var(--blue); border: none; padding: 10px; width: 100%; border-radius: 50px; font-weight: 900; margin-top: 15px; outline: none !important; }
    </style>
</head>
<body>

    <div id="score-board"></div>

    <div id="neon-overlay">
        <div class="neon-modal">
            <h2 id="modal-title" style="color:var(--pink)">INFO</h2>
            <p id="modal-msg"></p>
            <button class="neon-btn" onclick="closeNeonModal()">OK</button>
        </div>
    </div>

    <div class="header">
        <i class="fa-solid fa-circle-user prof-link" onclick="location.href='profil.html'"></i>
        <div class="balance-box">
            <span id="tier-name" style="font-size: 8px; font-weight: 900; display: block;">VIP PLAYER</span>
            <span id="display-saldo">IDR 0</span>
        </div>
    </div>

    <div id="game-container"></div>

    <div class="multipliers">
        <div class="slot m-pink">5x</div>
        <div class="slot m-yellow">2x</div>
        <div class="slot m-blue">1.2x</div>
        <div class="slot m-blue" style="background:#fff">0.2x</div>
        <div class="slot m-blue">1.2x</div>
        <div class="slot m-yellow">2x</div>
        <div class="slot m-pink">5x</div>
    </div>

    <div class="nav-grid">
        <div class="btn-nav" onclick="location.href='withdraw.html'"><i class="fa-solid fa-wallet" style="color:var(--pink)"></i><div style="font-size:8px">WD</div></div>
        <div class="btn-nav" onclick="location.href='deposit.html'"><i class="fa-solid fa-plus" style="color:var(--blue)"></i><div style="font-size:8px">DEPOT</div></div>
        <div class="btn-nav" onclick="location.href='reward.html'"><i class="fa-solid fa-gift" style="color:var(--yellow)"></i><div style="font-size:8px">REWARD</div></div>
    </div>

    <div class="play-area">
        <div class="mode-toggles">
            <div id="btn-normal" class="toggle active" onclick="setSpeed('normal')">NORMAL</div>
            <div id="btn-turbo" class="toggle" onclick="setSpeed('turbo')">TURBO</div>
            <div id="btn-auto" class="toggle" onclick="toggleAuto()">AUTO</div>
        </div>
        <div class="bet-selector">
            <button class="bet-btn" onclick="changeBet(-1)">-</button>
            <div id="current-bet" style="font-weight:900; color:var(--yellow)">1,000</div>
            <button class="bet-btn" onclick="changeBet(1)">+</button>
        </div>
        <button class="btn-main" id="play-text" onclick="handlePlay()">MULAI MAIN</button>
    </div>

    <script src="global.js"></script>
    <script>
        function showNeonModal(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-overlay').style.display = 'flex';
        }
        function closeNeonModal() { document.getElementById('neon-overlay').style.display = 'none'; }

        const bets = [400,1000,2000,5000,10000,20000];
        let betIdx = 1;
        let isTurbo = false, isAuto = false, autoInterval = null;
        let activeBalls = [], pegLocations = [];
        const container = document.getElementById('game-container');
        const slots = [5, 2, 1.2, 0.2, 1.2, 2, 5];

        // Init Pegs
        for (let r = 2; r <= 8; r++) {
            for (let i = 0; i < r; i++) {
                const peg = document.createElement('div');
                peg.className = 'peg';
                const x = (i - (r - 1) / 2) * 35;
                const y = r * 35;
                peg.style.left = `calc(50% + ${x}px)`;
                peg.style.top = y + 'px';
                container.appendChild(peg);
                setTimeout(() => {
                    const rect = peg.getBoundingClientRect();
                    const cRect = container.getBoundingClientRect();
                    pegLocations.push({ x: rect.left - cRect.left + 3, y: rect.top - cRect.top + 3 });
                }, 500);
            }
        }

        function changeBet(d) {
            betIdx = Math.max(0, Math.min(bets.length-1, betIdx+d));
            document.getElementById('current-bet').innerText = bets[betIdx].toLocaleString();
        }

        function setSpeed(m) {
            isTurbo = (m === 'turbo');
            document.getElementById('btn-normal').classList.toggle('active', !isTurbo);
            document.getElementById('btn-turbo').classList.toggle('active', isTurbo);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('play-text');
            document.getElementById('btn-auto').classList.toggle('active', isAuto);
            if(isAuto) { btn.innerText = "STOP"; btn.classList.add('auto-active'); startAuto(); }
            else { btn.innerText = "MULAI MAIN"; btn.classList.remove('auto-active'); stopAuto(); }
        }
        function startAuto() { dropBall(); autoInterval = setInterval(dropBall, isTurbo ? 300 : 800); }
        function stopAuto() { clearInterval(autoInterval); }

        function handlePlay() { if(isAuto) toggleAuto(); else dropBall(); }

        function updateScoreBoard(mult) {
            const board = document.getElementById('score-board');
            const item = document.createElement('div');
            item.className = 'score-item';
            item.innerText = mult + 'x';
            item.style.color = mult >= 2 ? 'var(--yellow)' : 'white';
            board.prepend(item);
            if(board.children.length > 8) board.lastChild.remove();
        }

        function dropBall() {
            const bet = bets[betIdx];
            if (!updateSaldo(-bet)) { 
                if(isAuto) toggleAuto(); 
                showNeonModal("Saldo Habis!"); 
                return; 
            }

            const ballEl = document.createElement('div');
            ballEl.className = 'ball';
            container.appendChild(ballEl);

            const ball = {
                el: ballEl,
                x: container.offsetWidth / 2 + (Math.random()*4-2),
                y: -10, // Spawn di luar area pandang
                vx: (Math.random()-0.5)*1.5,
                vy: 0,
                radius: 6,
                isFinished: false
            };
            activeBalls.push(ball);

            let grav = isTurbo ? 0.45 : 0.28;
            let bounce = 0.45;
            let step = isTurbo ? 3 : 1;

            const move = setInterval(() => {
                if(ball.isFinished) { clearInterval(move); return; }

                for(let s=0; s<step; s++){
                    ball.vy += grav/step;
                    ball.x += ball.vx/step;
                    ball.y += ball.vy/step;

                    // Fade in bola setelah keluar dari header
                    if(ball.y > 20) ball.el.style.opacity = 1;

                    pegLocations.forEach(p => {
                        const dx = ball.x - p.x, dy = ball.y - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 9) { // Collision
                            const angle = Math.atan2(dy, dx);
                            // Logika bergulir: Jika pelan, ikuti sisi paku
                            ball.vx = Math.cos(angle) * 2.5 + (Math.random()-0.5);
                            ball.vy = Math.sin(angle) * 2.5;
                            ball.x = p.x + Math.cos(angle) * 9.1;
                            ball.y = p.y + Math.sin(angle) * 9.1;
                        }
                    });

                    if(ball.x < 15 || ball.x > container.offsetWidth-15) ball.vx *= -0.5;
                }

                // Anti Stuck
                if(Math.abs(ball.vx) < 0.1 && ball.y < 280) ball.vx = (Math.random()-0.5)*2;

                ball.el.style.left = ball.x + 'px';
                ball.el.style.top = ball.y + 'px';

                if(ball.y > 320) {
                    ball.isFinished = true;
                    const idx = Math.min(6, Math.max(0, Math.round((ball.x - (container.offsetWidth/2))/35 + 3)));
                    ball.el.style.transition = "all 0.2s";
                    ball.el.style.top = "340px";
                    
                    setTimeout(() => {
                        const mult = slots[idx];
                        updateSaldo(bet * mult);
                        updateScoreBoard(mult);
                        if(mult >= 1) {
                            const p = document.createElement('div');
                            p.className = 'win-popup';
                            p.innerText = `+${(bet*mult).toLocaleString()}`;
                            p.style.left = ball.x + 'px'; p.style.top = '280px';
                            document.body.appendChild(p);
                            setTimeout(() => p.remove(), 1000);
                        }
                        ball.el.remove();
                        activeBalls = activeBalls.filter(b => b !== ball);
                    }, 100);
                }
            }, 16);
        }
    </script>
</body>
</html>
