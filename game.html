<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --neon-gold: #fbff00;
            --bg-dark: #070816;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Latar Belakang Neon Minimalis */
            background-image: radial-gradient(circle at 50% 40%, rgba(255, 0, 119, 0.12) 0%, transparent 60%);
        }

        /* HEADER NAV */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }
        .profile-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .gift-btn { width: 50px; height: 50px; filter: drop-shadow(0 0 12px var(--neon-pink)); }
        .saldo-badge {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 6px 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            text-align: center;
        }

        /* AREA PERMAINAN */
        .game-zone {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
        }

        /* MULTIPLIER SLOTS (Diturunkan Sesuai Instruksi) */
        .multiplier-wrap {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 15px; 
            width: 100%;
            padding: 0 10px;
        }
        .slot {
            flex: 1;
            padding: 8px 0;
            font-size: 11px;
            font-weight: 900;
            text-align: center;
            border-radius: 6px;
        }
        .high { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); color: white; }
        .mid  { background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); color: #000; }
        .low  { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); color: #000; }

        /* ACTION AREA MEWAH */
        .action-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90%;
            margin: 20px 0;
        }
        .action-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 12px 0;
            text-align: center;
        }
        .icon-glow { font-size: 26px; margin-bottom: 5px; display: block; filter: drop-shadow(0 0 8px currentColor); }

        /* BET CONTROL */
        .bet-bar {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 25px;
            margin-bottom: 15px;
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 28px; cursor: pointer; }

        .btn-main {
            width: 88%;
            padding: 18px;
            background: linear-gradient(180deg, var(--neon-blue), #0055ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            cursor: pointer;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="profile-btn" onclick="location.href='profile.html'">
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold;">SALDO VIP</span>
            <div id="balance" style="font-size: 18px; font-weight: 900;">IDR 27.480</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="gift-btn" onclick="location.href='hadiah.html'">
    </div>

    <div class="game-zone">
        <canvas id="plinkoCanvas"></canvas>
        <div class="multiplier-wrap">
            <div class="slot high">5x</div>
            <div class="slot mid">2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot low">0.2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot mid">2x</div>
            <div class="slot high">5x</div>
        </div>
    </div>

    <div class="action-row">
        <div class="action-card" onclick="location.href='tarik.html'">
            <i class="fa-solid fa-hand-holding-dollar icon-glow" style="color: var(--neon-gold);"></i>
            <span style="font-size: 10px; font-weight: 900; color: var(--neon-pink);">TARIK</span>
        </div>
        <div class="action-card" onclick="location.href='deposit.html'">
            <i class="fa-solid fa-building-columns icon-glow" style="color: var(--neon-blue);"></i>
            <span style="font-size: 10px; font-weight: 900; color: var(--neon-pink);">DEPOSIT</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-crown icon-glow" style="color: var(--neon-gold);"></i>
            <span style="font-size: 10px; font-weight: 900; color: var(--neon-pink);">RANK</span>
        </div>
    </div>

    <div class="bet-bar">
        <button class="bet-btn" onclick="changeBet(-100)">-</button>
        <div style="margin: 0 30px; text-align: center;">
            <span style="font-size: 8px; color:#555; display:block; font-weight:bold;">TARUHAN</span>
            <span id="betVal" style="font-size: 18px; font-weight:900; color: var(--neon-gold);">400</span>
        </div>
        <button class="bet-btn" onclick="changeBet(100)">+</button>
    </div>

    <button class="btn-main" onclick="dropBall()">MULAI MAIN</button>

    <script>
        // --- KONTROL ADMIN ---
        const ADMIN_SETTINGS = {
            winRate: 0.3, // Peluang menang 30%
            forceResult: null 
        };

        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360;
        canvas.height = 340;

        const pins = [];
        const balls = [];
        const rows = 10;
        const spacing = 32;

        // Inisialisasi Pasak
        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({
                    x: canvas.width / 2 + (j - (i - 1) / 2) * spacing,
                    y: i * spacing
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gambar Pasak Piramida
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            pins.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Update & Gambar Bola (Fisika Smooth)
            balls.forEach((ball, index) => {
                ball.y += ball.vy;
                ball.x += ball.vx;
                ball.vy += 0.2; // Gravitas Lembut

                pins.forEach(pin => {
                    const dist = Math.hypot(ball.x - pin.x, ball.y - pin.y);
                    if (dist < 8) {
                        ball.vy *= -0.4; // Pantulan Balik Lembut
                        ball.vx += (ball.x - pin.x) * 0.1; // Arah Pantulan
                    }
                });

                // Gambar Bola Neon
                ctx.fillStyle = "var(--neon-blue)";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "var(--neon-blue)";
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                if (ball.y > canvas.height) balls.splice(index, 1);
            });
            requestAnimationFrame(draw);
        }

        function dropBall() {
            // Tentukan Target Berdasarkan Setting Admin
            let targetX = canvas.width / 2;
            const rand = Math.random();
            if (rand < ADMIN_SETTINGS.winRate) {
                targetX = Math.random() > 0.5 ? 20 : 340; // Ke arah 5x (Tepi)
            }

            balls.push({
                x: canvas.width / 2 + (Math.random() - 0.5) * 5,
                y: 30,
                vx: (targetX - canvas.width / 2) / 60, 
                vy: 2
            });
        }

        function changeBet(v) {
            let val = parseInt(document.getElementById('betVal').innerText);
            val += v;
            if (val < 400) val = 400;
            document.getElementById('betVal').innerText = val;
        }

        window.onload = draw;
    </script>
</body>
</html>
