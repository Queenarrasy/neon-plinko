<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { 
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; 
        }
        
        /* HEADER */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-sizing: border-box; }
        .nav-icon { 
            width: 45px; height: 45px; border: 2px solid var(--neon-pink); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; background: rgba(255,0,119,0.1);
            animation: pulsePink 2s infinite; cursor: pointer;
        }
        @keyframes pulsePink { 0% { box-shadow: 0 0 5px var(--neon-pink); } 50% { box-shadow: 0 0 15px var(--neon-pink); } 100% { box-shadow: 0 0 5px var(--neon-pink); } }
        
        .saldo-display { 
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); border-radius: 20px; 
            padding: 5px 15px; text-align: center; box-shadow: 0 0 15px var(--neon-blue);
        }

        /* GAME BOARD */
        #game-area { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; flex-grow: 1; }
        canvas { background: transparent; max-width: 100%; }

        /* SLOTS */
        .multiplier-bar { display: flex; justify-content: center; gap: 4px; width: 95%; margin: 5px 0; }
        .m-slot { 
            flex: 1; padding: 8px 0; font-size: 10px; font-weight: 900; text-align: center; 
            border-radius: 6px; color: white; text-shadow: 0 0 5px black;
        }
        .pink { background: var(--neon-pink); } .gold { background: var(--neon-gold); color: black; } .blue { background: var(--neon-blue); color: black; }

        /* TOMBOL NAVIGASI */
        .action-nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 92%; margin: 15px 0; }
        .nav-card { 
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px 5px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
        }
        .nav-card i { font-size: 24px; margin-bottom: 8px; display: block; filter: drop-shadow(0 0 5px var(--neon-blue)); }
        .nav-card span { 
            font-size: 10px; font-weight: 900; color: var(--neon-pink); 
            text-transform: uppercase; text-shadow: 0 0 8px var(--neon-pink);
        }

        /* CONTROLS */
        .bet-area { 
            background: rgba(0,0,0,0.6); border-radius: 30px; display: flex; 
            align-items: center; padding: 5px 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); 
        }
        .btn-spin { 
            width: 85%; padding: 18px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); 
            border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: 900; 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.5); cursor: pointer; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="nav-icon" onclick="location.href='profile.html'"><i class="fa-solid fa-user-ninja" style="color:white; font-size:22px;"></i></div>
        <div class="saldo-display">
            <small style="color: var(--neon-blue); font-size: 8px; font-weight: bold; display: block;">SALDO VIP</small>
            <div id="balance-display" style="font-size: 18px; font-weight: 900;">100.000</div>
        </div>
        <div class="nav-icon" style="border-color:var(--neon-gold);" onclick="location.href='reward.html'"><i class="fa-solid fa-gift" style="color:var(--neon-gold); font-size:22px;"></i></div>
    </div>

    <div id="game-area">
        <canvas id="plinkoCanvas"></canvas>

        <div class="multiplier-bar">
            <div class="m-slot pink">5x</div><div class="m-slot gold">2x</div><div class="m-slot gold">1.2x</div>
            <div class="m-slot blue">0.2x</div>
            <div class="m-slot gold">1.2x</div><div class="m-slot gold">2x</div><div class="m-slot pink">5x</div>
        </div>

        <div class="action-nav">
            <div class="nav-card" onclick="location.href='withdraw.html'">
                <i class="fa-solid fa-money-bill-trend-up" style="color:var(--neon-gold);"></i>
                <span>Tarik</span>
            </div>
            <div class="nav-card" onclick="location.href='deposit.html'">
                <i class="fa-solid fa-wallet" style="color:var(--neon-blue);"></i>
                <span>Deposit</span>
            </div>
            <div class="nav-card" onclick="location.href='rank.html'">
                <i class="fa-solid fa-trophy" style="color:var(--neon-gold);"></i>
                <span>Rank</span>
            </div>
        </div>

        <div class="bet-area">
            <button onclick="changeBet(-1)" style="background:none; border:none; color:var(--neon-blue); font-size:30px; cursor:pointer;">-</button>
            <div style="text-align: center; min-width: 140px;">
                <small style="color:#666; display:block; font-size: 8px;">TARUHAN</small>
                <span id="bet-display" style="font-size: 20px; font-weight: 900; color: var(--neon-gold);">400</span>
            </div>
            <button onclick="changeBet(1)" style="background:none; border:none; color:var(--neon-blue); font-size:30px; cursor:pointer;">+</button>
        </div>

        <button class="btn-spin" onclick="dropBall()">MULAI MAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 340; canvas.height = 360;

        const betLevels = [400, 600, 800, 1000, 1200, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 12000, 16000, 18000, 20000];
        let betIdx = 0;
        let balance = 100000;
        const balls = [];
        const pins = [];
        const multipliers = [5, 2, 1.2, 0.2, 1.2, 2, 5];

        // Paku Board
        for (let r = 2; r <= 10; r++) {
            for (let i = 0; i < r; i++) {
                pins.push({ x: canvas.width/2 + (i - (r-1)/2)*28, y: r*28 + 20 });
            }
        }

        function changeBet(dir) {
            betIdx = Math.max(0, Math.min(betLevels.length - 1, betIdx + dir));
            document.getElementById('bet-display').innerText = betLevels[betIdx].toLocaleString();
        }

        function dropBall() {
            if (balance < betLevels[betIdx]) return alert("Saldo Kurang!");
            balance -= betLevels[betIdx];
            updateUI();
            
            balls.push({
                x: canvas.width / 2 + (Math.random() * 4 - 2),
                y: 20, vx: 0, vy: 1.5, radius: 7
            });
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Pins
            ctx.fillStyle = "white";
            pins.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
            });

            // Physics Bola
            for (let i = balls.length - 1; i >= 0; i--) {
                let b = balls[i];
                b.vy += 0.15; b.y += b.vy; b.x += b.vx;

                pins.forEach(p => {
                    let dx = b.x - p.x; let dy = b.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 10) {
                        b.vx = (dx / dist) * 2;
                        b.vy *= -0.5; b.y = p.y + 10;
                    }
                });

                // Render Bola Neon
                ctx.fillStyle = "#00d4ff";
                ctx.shadowBlur = 15; ctx.shadowColor = "#00d4ff";
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;

                if (b.y > canvas.height) {
                    let idx = Math.floor(b.x / (canvas.width / 7));
                    idx = Math.max(0, Math.min(6, idx));
                    balance += betLevels[betIdx] * multipliers[idx];
                    updateUI();
                    balls.splice(i, 1);
                }
            }
            requestAnimationFrame(update);
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = Math.floor(balance).toLocaleString();
        }

        update();
    </script>
</body>
</html>
