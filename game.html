<!DOCTYPE html>
<html lang="id">
<head>
    <style>
        /* CSS ASLI ANDA TETAP DI SINI */
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --neon-gold: #fbff00;
            --bg-dark: #070816;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 40%, rgba(255, 0, 119, 0.12) 0%, transparent 60%);
        }

        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }
        .profile-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .saldo-badge {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 6px 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .game-zone {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
        }

        .multiplier-wrap {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 20px; 
            width: 95%;
        }
        .slot {
            flex: 1;
            padding: 10px 0;
            font-size: 11px;
            font-weight: 900;
            text-align: center;
            border-radius: 6px;
        }
        .high { background: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink); color: white; }
        .mid  { background: var(--neon-gold); box-shadow: 0 0 12px var(--neon-gold); color: #000; }
        .low  { background: var(--neon-blue); box-shadow: 0 0 12px var(--neon-blue); color: #000; }

        .action-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90%;
            margin: 15px 0;
        }
        .action-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 12px 0;
            text-align: center;
        }

        .bet-bar {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 25px;
            margin-bottom: 15px;
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 28px; cursor: pointer; }

        .btn-main {
            width: 88%;
            padding: 20px;
            background: linear-gradient(180deg, var(--neon-blue), #0055ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* TAMBAHAN UNTUK ANIMASI KEMENANGAN NEON */
        #win-notif {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: 900;
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-gold), 0 0 40px var(--neon-pink);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes winSlide {
            0% { opacity: 0; transform: translate(-50%, 0%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -100%); }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="profile-btn">
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block; text-align: center;">SALDO VIP</span>
            <div id="balance" style="font-size: 18px; font-weight: 900;">IDR 27.480</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" style="width:50px; filter: drop-shadow(0 0 10px var(--neon-pink));">
    </div>

    <div class="game-zone">
        <div id="win-notif">MENANG IDR 0</div>
        <canvas id="plinkoCanvas"></canvas>
        <div class="multiplier-wrap">
            <div class="slot high">5x</div>
            <div class="slot mid">2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot low">0.2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot mid">2x</div>
            <div class="slot high">5x</div>
        </div>
    </div>

    <div class="action-row">
        <div class="action-card">
            <i class="fa-solid fa-hand-holding-dollar" style="color: var(--neon-gold); font-size: 24px;"></i>
            <div style="font-size: 10px; font-weight: 900; color: var(--neon-pink); margin-top:5px;">TARIK</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-building-columns" style="color: var(--neon-blue); font-size: 24px;"></i>
            <div style="font-size: 10px; font-weight: 900; color: var(--neon-pink); margin-top:5px;">DEPOSIT</div>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-crown" style="color: var(--neon-gold); font-size: 24px;"></i>
            <div style="font-size: 10px; font-weight: 900; color: var(--neon-pink); margin-top:5px;">RANK</div>
        </div>
    </div>

    <div class="bet-bar">
        <button class="bet-btn" onclick="updateBet(-1)">-</button>
        <div style="margin: 0 30px; text-align: center; min-width: 100px;">
            <span style="font-size: 8px; color:#555; display:block; font-weight:bold;">TARUHAN</span>
            <span id="betVal" style="font-size: 18px; font-weight:900; color: var(--neon-gold);">400</span>
        </div>
        <button class="bet-btn" onclick="updateBet(1)">+</button>
    </div>

    <button class="btn-main" onclick="spawnBall()">MULAI MAIN</button>

    <script>
        // --- KONFIGURASI BET LIST & SALDO ---
        const betList = [400, 600, 800, 1000, 1200, 1600, 1800, 2000, 4000, 8000, 10000, 15000, 20000, 25000, 30000];
        let currentBetIndex = 0;
        let saldoVIP = parseInt(localStorage.getItem('user_balance')) || 27480;
        const multipliers = [5, 2, 1.2, 0.2, 1.2, 2, 5];

        // --- LOGIKA ADMIN ---
        const savedSettings = JSON.parse(localStorage.getItem('admin_plinko_settings'));
        const ADMIN_CONTROL = savedSettings || { winRate: 0.3, forceIndex: null };

        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360;
        canvas.height = 350;

        const pins = [];
        const activeBalls = [];
        const rows = 10;
        const spacing = 32;

        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({ x: canvas.width / 2 + (j - (i - 1) / 2) * spacing, y: i * spacing + 10 });
            }
        }

        function refreshBalance() {
            document.getElementById('balance').innerText = "IDR " + saldoVIP.toLocaleString();
            localStorage.setItem('user_balance', saldoVIP);
        }

        function updateBet(dir) {
            currentBetIndex += dir;
            if (currentBetIndex < 0) currentBetIndex = 0;
            if (currentBetIndex >= betList.length) currentBetIndex = betList.length - 1;
            document.getElementById('betVal').innerText = betList[currentBetIndex];
        }

        function showWinAnim(amount) {
            const notif = document.getElementById('win-notif');
            notif.innerText = "MENANG IDR " + amount.toLocaleString();
            notif.style.animation = 'none';
            notif.offsetHeight; // trigger reflow
            notif.style.animation = 'winSlide 2s forwards';
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            pins.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); });

            activeBalls.forEach((ball, i) => {
                ball.y += ball.vy;
                ball.x += ball.vx;
                ball.vy += 0.35;

                pins.forEach(p => {
                    const dist = Math.hypot(ball.x - p.x, ball.y - p.y);
                    if (dist < 8) {
                        ball.vy *= -0.3;
                        ball.vx += (ball.x - p.x) * 0.15 + (ball.targetMove * 0.05);
                    }
                });

                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = varColor(ball.color);
                ctx.fillStyle = varColor(ball.color);
                ctx.beginPath(); ctx.arc(ball.x, ball.y, 7, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                // LOGIKA SAAT BOLA MASUK SLOT
                if (ball.y > canvas.height) {
                    const slotIndex = Math.floor(ball.x / (canvas.width / 7));
                    const safeIndex = Math.max(0, Math.min(6, slotIndex));
                    const winAmount = ball.betAmount * multipliers[safeIndex];
                    
                    saldoVIP += winAmount;
                    refreshBalance();
                    if(winAmount > 0) showWinAnim(winAmount);
                    
                    activeBalls.splice(i, 1);
                }
            });
            requestAnimationFrame(draw);
        }

        function spawnBall() {
            const currentBet = betList[currentBetIndex];
            if (saldoVIP < currentBet) {
                alert("Saldo tidak cukup!");
                return;
            }

            // Kurangi Saldo Saat Bermain
            saldoVIP -= currentBet;
            refreshBalance();

            let moveDir = (Math.random() - 0.5) * 2;
            if (Math.random() < ADMIN_CONTROL.winRate) {
                moveDir = Math.random() > 0.5 ? 4 : -4;
            }

            activeBalls.push({
                x: canvas.width / 2 + (Math.random() - 0.5) * 10,
                y: 10,
                vx: moveDir * 0.5,
                vy: 3,
                targetMove: moveDir,
                color: '--neon-blue',
                betAmount: currentBet
            });
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }
        
        window.onload = () => {
            refreshBalance();
            draw();
        };
    </script>
</body>
</html>
