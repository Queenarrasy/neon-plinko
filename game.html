<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --neon-gold: #fbff00;
            --bg-dark: #070816;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 0, 119, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 212, 255, 0.08) 0%, transparent 50%);
        }

        /* HEADER & SALDO */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }
        .profile-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .gift-btn { width: 50px; height: 50px; filter: drop-shadow(0 0 12px var(--neon-pink)); }
        .saldo-badge {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 6px 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            text-align: center;
        }

        /* GAME ZONE: PIRAMIDA & MULTIPLIER */
        .game-zone {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
        }
        canvas { display: block; }

        /* MULTIPLIER: JARAK PRESISI & WARNA UNTUNG-RUGI */
        .multiplier-wrap {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: -10px; /* Jarak menempel presisi */
            width: 95%;
            padding: 0 5px;
        }
        .slot {
            flex: 1;
            padding: 8px 0;
            font-size: 11px;
            font-weight: 900;
            text-align: center;
            border-radius: 6px;
        }
        .high { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); color: white; }
        .mid  { background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); color: #000; }
        .low  { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); color: #000; }

        /* ACTION BUTTONS MEWAH */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90%;
            margin: 15px 0;
        }
        .action-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 12px 0;
            text-align: center;
            cursor: pointer;
        }
        .icon-vip { font-size: 24px; margin-bottom: 5px; display: block; filter: drop-shadow(0 0 8px currentColor); }
        .label-vip { font-size: 10px; font-weight: 900; color: var(--neon-pink); }

        /* BET CONTROL */
        .bet-bar {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 20px;
            margin-bottom: 15px;
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 25px; cursor: pointer; font-weight: bold; }
        .bet-display { margin: 0 30px; text-align: center; }

        .btn-play-now {
            width: 88%;
            padding: 18px;
            background: linear-gradient(180deg, var(--neon-blue), #0055ff);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 22px;
            font-weight: 900;
            box-shadow: 0 5px 25px rgba(0, 212, 255, 0.5);
            cursor: pointer;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="profile-btn" onclick="location.href='profile.html'">
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold;">SALDO VIP</span>
            <div id="balance" style="font-size: 18px; font-weight: 900;">IDR 0</div>
        </div>
        <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="gift-btn" onclick="location.href='hadiah.html'">
    </div>

    <div class="game-zone">
        <canvas id="plinkoCanvas"></canvas>
        <div class="multiplier-wrap">
            <div class="slot high">5x</div>
            <div class="slot mid">2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot low">0.2x</div>
            <div class="slot mid">1.2x</div>
            <div class="slot mid">2x</div>
            <div class="slot high">5x</div>
        </div>
    </div>

    <div class="action-grid">
        <div class="action-card" onclick="location.href='tarik.html'">
            <i class="fa-solid fa-hand-holding-dollar icon-vip" style="color: var(--neon-gold);"></i>
            <span class="label-vip">TARIK</span>
        </div>
        <div class="action-card" onclick="location.href='deposit.html'">
            <i class="fa-solid fa-building-columns icon-vip" style="color: var(--neon-blue);"></i>
            <span class="label-vip">DEPOSIT</span>
        </div>
        <div class="action-card">
            <i class="fa-solid fa-crown icon-vip" style="color: var(--neon-gold);"></i>
            <span class="label-vip">RANK</span>
        </div>
    </div>

    <div class="bet-bar">
        <button class="bet-btn" onclick="adjustBet(-100)">-</button>
        <div class="bet-display">
            <span style="font-size: 7px; color:#555; display:block; font-weight:bold;">TARUHAN</span>
            <span id="betVal" style="font-size: 16px; font-weight:900; color: var(--neon-gold);">400</span>
        </div>
        <button class="bet-btn" onclick="adjustBet(100)">+</button>
    </div>

    <button class="btn-play-now" onclick="startBall()">MULAI MAIN</button>

    <script>
        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360;
        canvas.height = 350; 

        const pins = [];
        const rows = 10;
        
        // Membangun Piramida Pasak
        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({
                    x: canvas.width / 2 + (j - (i - 1) / 2) * 32,
                    y: i * 32 + 10
                });
            }
        }

        function drawPins() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            pins.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 5;
                ctx.shadowColor = "white";
            });
        }

        function adjustBet(v) {
            let current = parseInt(document.getElementById('betVal').innerText);
            current += v;
            if(current < 400) current = 400;
            document.getElementById('betVal').innerText = current;
        }

        window.onload = () => {
            drawPins();
            const bal = localStorage.getItem('user_balance') || 27480;
            document.getElementById('balance').innerText = "IDR " + parseInt(bal).toLocaleString();
        };

        function startBall() {
            console.log("Bola dilepaskan...");
        }
    </script>
</body>
</html>
