<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO PRO - STABLE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816;
        }
        body {
            background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 40%, rgba(255, 0, 119, 0.15) 0%, transparent 60%);
        }

        /* Navigasi Atas - Aktif */
        .top-nav { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; box-sizing: border-box; }
        .nav-link { cursor: pointer; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        .nav-link:active { transform: scale(0.9); }
        .profile-btn { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .gift-btn { width: 50px; height: 50px; filter: drop-shadow(0 0 10px var(--neon-pink)); }
        
        .saldo-badge { 
            background: rgba(0, 0, 0, 0.8); border: 2px solid var(--neon-blue); border-radius: 20px; 
            padding: 6px 20px; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); text-align: center; 
        }

        /* Area Game & Multiplier */
        .multiplier-wrap { display: flex; justify-content: center; gap: 4px; margin-top: 25px; width: 95%; }
        .slot { flex: 1; padding: 10px 0; font-size: 11px; font-weight: 900; text-align: center; border-radius: 6px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .pink { background: var(--neon-pink); color: white; }
        .gold { background: var(--neon-gold); color: #000; }
        .blue { background: var(--neon-blue); color: #000; }

        /* Row Aksi: Tarik & Deposit */
        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 90%; margin: 20px 0; }
        .action-card { 
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 18px; padding: 15px 0; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .action-card:active { background: rgba(255, 255, 255, 0.1); }
        .icon-v { font-size: 24px; margin-bottom: 5px; display: block; filter: drop-shadow(0 0 5px currentColor); }

        /* Kontrol Taruhan */
        .bet-bar { 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; 
            display: flex; align-items: center; padding: 5px 25px; margin-bottom: 15px; 
        }
        .bet-btn { background: none; border: none; color: var(--neon-blue); font-size: 28px; cursor: pointer; font-weight: bold; padding: 0 15px; }

        .btn-play { 
            width: 88%; padding: 20px; background: linear-gradient(180deg, var(--neon-blue), #0055ff); 
            border: none; border-radius: 40px; color: white; font-size: 22px; font-weight: 900; 
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5); cursor: pointer; margin-bottom: 30px; 
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-link" onclick="location.href='profile.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="profile-btn">
        </div>
        <div class="saldo-badge">
            <span style="font-size: 8px; color: var(--neon-blue); font-weight: bold; display: block;">SALDO VIP</span>
            <div id="balanceDisplay" style="font-size: 18px; font-weight: 900;">IDR 0</div>
        </div>
        <div class="nav-link" onclick="location.href='hadiah.html'">
            <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="gift-btn">
        </div>
    </div>

    <div style="position: relative;">
        <canvas id="plinkoCanvas"></canvas>
        <div class="multiplier-wrap">
            <div class="slot pink">5x</div>
            <div class="slot gold">2x</div>
            <div class="slot gold">1.2x</div>
            <div class="slot blue">0.2x</div>
            <div class="slot gold">1.2x</div>
            <div class="slot gold">2x</div>
            <div class="slot pink">5x</div>
        </div>
    </div>

    <div class="action-row">
        <div class="action-card" onclick="location.href='tarik.html'">
            <i class="fa-solid fa-hand-holding-dollar icon-v" style="color: var(--neon-gold);"></i>
            <span style="font-size: 10px; font-weight: 900; color: var(--neon-pink);">TARIK</span>
        </div>
        <div class="action-card" onclick="location.href='deposit.html'">
            <i class="fa-solid fa-building-columns icon-v" style="color: var(--neon-blue);"></i>
            <span style="font-size: 10px; font-weight: 900; color: var(--neon-pink);">DEPOSIT</span>
        </div>
        <div class="action-card" onclick="location.href='rank.html'">
            <i class="fa-solid fa-crown icon-v" style="color: var(--neon-gold);"></i>
            <span style="font-size: 10px; font-weight: 900; color: var(--neon-pink);">RANK</span>
        </div>
    </div>

    <div class="bet-bar">
        <button class="bet-btn" onclick="changeBet(-1)">-</button>
        <div style="margin: 0 20px; text-align: center; min-width: 100px;">
            <span style="font-size: 8px; color:#555; display:block; font-weight:bold;">TARUHAN</span>
            <span id="betDisplay" style="font-size: 18px; font-weight:900; color: var(--neon-gold);">400</span>
        </div>
        <button class="bet-btn" onclick="changeBet(1)">+</button>
    </div>

    <button class="btn-play" onclick="playGame()">MULAI MAIN</button>

    <script>
        const betList = [400, 800, 1000, 1200, 1600, 1800, 2000, 4000, 6000, 8000, 10000, 15000, 20000, 25000, 30000];
        let betIndex = 0;
        const multipliers = [5, 2, 1.2, 0.2, 1.2, 2, 5];
        let balance = parseInt(localStorage.getItem('user_balance')) || 27480;

        const canvas = document.getElementById('plinkoCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 360; canvas.height = 320;

        const pins = [];
        const activeBalls = [];
        const rows = 9;

        // Init Pins
        for (let i = 2; i <= rows; i++) {
            for (let j = 0; j < i; j++) {
                pins.push({ x: canvas.width/2 + (j - (i-1)/2) * 35, y: i * 32 });
            }
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = "IDR " + balance.toLocaleString();
            document.getElementById('betDisplay').innerText = betList[betIndex].toLocaleString();
            localStorage.setItem('user_balance', balance);
        }

        function changeBet(dir) {
            betIndex = Math.max(0, Math.min(betList.length - 1, betIndex + dir));
            updateUI();
        }

        function playGame() {
            const currentBet = betList[betIndex];
            if (balance < currentBet) return alert("Saldo tidak cukup!");
            balance -= currentBet;
            updateUI();

            const admin = JSON.parse(localStorage.getItem('admin_plinko_settings')) || { winRate: 0.3 };
            let targetIdx = Math.random() < admin.winRate ? (Math.random() > 0.5 ? 0 : 6) : 3;
            
            activeBalls.push({
                x: canvas.width/2 + (Math.random()-0.5)*10, y: 10,
                vx: (targetIdx - 3) * 0.4, vy: 2,
                bet: currentBet, targetIdx: targetIdx,
                radius: 7
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gambar Paku
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            pins.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });

            // Fisika Bola Smooth (Tidak Tersangkut)
            activeBalls.forEach((ball, i) => {
                ball.vy += 0.35; // Gravitasi Berat
                ball.x += ball.vx;
                ball.y += ball.vy;

                pins.forEach(p => {
                    const dx = ball.x - p.x;
                    const dy = ball.y - p.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < ball.radius + 3) {
                        // Respon Tabrakan yang Mendorong Bola (Anti-Sangkut)
                        const angle = Math.atan2(dy, dx);
                        ball.vx = Math.cos(angle) * 2.5;
                        ball.vy = Math.abs(Math.sin(angle) * 2.5);
                    }
                });

                // Visual Bola Neon
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = "#00d4ff";
                ctx.fillStyle = "#00d4ff";
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
                ctx.restore();

                if (ball.y > canvas.height) {
                    balance += ball.bet * multipliers[ball.targetIdx];
                    updateUI();
                    activeBalls.splice(i, 1);
                }
            });
            requestAnimationFrame(draw);
        }

        window.onload = () => { updateUI(); draw(); };
    </script>
</body>
</html>
