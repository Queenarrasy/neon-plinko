<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko VIP - Pro Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --gold: #fbff00;
            --bg-dark: #0a0b1e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #1a1c3d 0%, var(--bg-dark) 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER: Profile & Hadiah Berdenyut */
        .game-header {
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .profile-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
            object-fit: cover;
            background: #222;
        }

        .gift-box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 10px var(--neon-pink)); }
            100% { transform: scale(1); }
        }

        .balance-display {
            text-align: center;
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
        }

        .menu-text {
            font-size: 8px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 5px var(--neon-pink);
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* ARENA PLINKO */
        .game-arena {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #plinko-canvas-container {
            width: 100%;
            max-width: 380px;
            height: 380px;
            position: relative;
        }

        /* KOTAK PERKALIAN BERWARNA */
        #bucket-labels {
            display: flex;
            justify-content: center;
            gap: 3px;
            width: 100%;
            position: absolute;
            bottom: -5px;
        }

        .m-badge {
            font-size: 9px;
            font-weight: bold;
            color: #fff;
            padding: 6px 2px;
            border-radius: 4px;
            min-width: 34px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
