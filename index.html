<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko Ultra</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gui">
        <div class="header">
            <div class="stat-box"><span id="balance">USDT 100.00</span></div>
        </div>

        <div class="footer-controls">
            <div class="bet-container">
                <button class="bet-btn" onclick="changeBet(-0.5)">−</button>
                <div class="bet-info"><small>TARUHAN</small><div id="bet-amount">1.00</div></div>
                <button class="bet-btn" onclick="changeBet(0.5)">+</button>
            </div>
            <div class="action-buttons" style="display:flex; width:92%; gap:8px;">
                <button class="btn-side" onclick="openDepo()" style="background:#1a1a3a; color:#00f7ff; border:1px solid #00f7ff; flex:1; border-radius:10px;">DEPOSIT</button>
                <button id="drop-btn" class="btn-main">MAIN</button>
                <button class="btn-side" style="background:#1a1a3a; color:#00f7ff; border:1px solid #00f7ff; flex:1; border-radius:10px;">WITHDRAW</button>
            </div>
        </div>
    </div>

    <div id="depoModal" class="modal">
        <div class="modal-content">
            <h3>Pilih Metode Deposit</h3>
            <div class="depo-item" onclick="alert('DANA: 0812xxxx\nGOPAY: 0812xxxx')">E-Wallet (DANA, GOPAY)</div>
            <div class="depo-item" onclick="alert('Mandiri: 123xxx\nBRI: 456xxx')">Rekening Bank</div>
            <div class="depo-item" onclick="alert('Tampilkan Gambar QRIS Disini')">QRIS</div>
            <button onclick="closeDepo()" style="margin-top:15px; background:none; color:red; border:none;">Batal</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
