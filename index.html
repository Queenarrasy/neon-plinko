<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="auth-overlay">
        <div class="auth-card">
            <h1 class="neon-title">NEON PLINKO <span class="vip-tag">VIP</span></h1>
            
            <div id="auth-form">
                <input type="text" id="reg-username" class="neon-input" placeholder="USERNAME (Untuk User ID)">
                <input type="password" id="reg-password" class="neon-input" placeholder="PASSWORD">
                <input type="text" id="reg-wallet" class="neon-input" placeholder="NO REKENING / E-WALLET">
                <p class="warning">*Data akan dikunci & tidak dapat diubah!</p>
                <button onclick="simpanDanMasuk()" class="btn-main">DAFTAR & AKTIVASI ID</button>
            </div>
        </div>
    </div>

    <script>
        function simpanDanMasuk() {
            const u = document.getElementById('reg-username').value;
            const p = document.getElementById('reg-password').value;
            const w = document.getElementById('reg-wallet').value;

            if (!u || !p || !w) return alert("Lengkapi semua data!");

            const userData = { username: u, password: p, wallet: w, balance: 0 };
            localStorage.setItem('plinko_user_data', JSON.stringify(userData));
            
            alert("ID Berhasil Diaktivasi!");
            window.location.href = "game.html"; // Perintah pindah rumah
        }
    </script>
</body>
</html>
