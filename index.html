<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #070816; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .reg-card { width: 85%; max-width: 380px; padding: 35px 20px; background: #0d0e21; border: 2px solid #ff0077; border-radius: 25px; box-shadow: 0 0 25px rgba(255, 0, 119, 0.4); text-align: center; }
        
        /* JUDUL SANGAT TEBAL & NEON */
        .neon-title { font-size: 32px; font-weight: 900; color: #00d4ff; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 10px #00d4ff, 0 0 30px #00d4ff; }
        .sub-title { font-size: 11px; color: #888; letter-spacing: 2px; margin-bottom: 30px; font-weight: bold; }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #ff0077; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; box-sizing: border-box; outline: none; border-color: #333; }
        
        .btn-daftar { width: 100%; padding: 18px; background: #ff0077; border: none; border-radius: 15px; color: white; font-size: 16px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px rgba(255, 0, 119, 0.5); }
    </style>
</head>
<body>
    <div class="reg-card">
        <h1 class="neon-title">NEON PLINKO VIP</h1>
        <div class="sub-title">REGISTRASI AKUN VIP</div>
        <div class="form-group">
            <label>USERNAME GAME</label>
            <input type="text" placeholder="Contoh: ABCD">
        </div>
        <div class="form-group">
            <label>NAMA LENGKAP (SESUAI REKENING)</label>
            <input type="text" placeholder="Nama asli Anda">
        </div>
        <div class="form-group">
            <label>NOMOR REKENING / E-WALLET</label>
            <input type="text" placeholder="Untuk pencairan saldo">
        </div>
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" placeholder="******">
        </div>
        <button class="btn-daftar" onclick="tg.close()">DAFTAR SEKARANG</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Layar penuh otomatis
    </script>
</body>
</html>
