<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - AR.GAMING</title>
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --bg-dark: #0a0b1e;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-box {
            width: 90%;
            max-width: 380px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid var(--neon-pink);
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2);
            text-align: center;
        }

        h2 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 10px; color: var(--neon-pink); font-weight: bold; margin-left: 10px; text-transform: uppercase; }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 5px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }

        .btn-regis {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(45deg, var(--neon-pink), #ff0055);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 119, 0.3);
        }

        .footer-text { font-size: 10px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>AR.GAMING</h2>
        <p style="font-size: 11px; color: #888; margin-top: -15px; margin-bottom: 25px;">REGISTRASI AKUN VIP</p>

        <div class="input-group">
            <label>Username Game</label>
            <input type="text" id="regUser" placeholder="Contoh: ABCD">
        </div>

        <div class="input-group">
            <label>Nama Lengkap (Sesuai Rekening)</label>
            <input type="text" id="regFullName" placeholder="Nama asli Anda">
        </div>

        <div class="input-group">
            <label>Nomor Rekening / E-Wallet</label>
            <input type="number" id="regBankAcc" placeholder="Untuk pencairan saldo">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="regPass" placeholder="******">
        </div>

        <button class="btn-regis" onclick="handleRegister()">DAFTAR SEKARANG</button>

        <div class="footer-text">
            Dengan mendaftar, data rekening Anda akan terkunci <br> demi keamanan pencairan dana.
        </div>
    </div>

    <script>
        function handleRegister() {
            const user = document.getElementById('regUser').value;
            const name = document.getElementById('regFullName').value;
            const bank = document.getElementById('regBankAcc').value;
            const pass = document.getElementById('regPass').value;

            if(!user || !name || !bank || !pass) {
                alert("Mohon isi semua data dengan benar!");
                return;
            }

            // Menyimpan Data User Secara Permanen
            const userData = {
                username: user,
                fullName: name,
                accountNumber: bank,
                password: pass
            };

            localStorage.setItem('plinko_user', JSON.stringify(userData));
            
            // Inisialisasi Saldo Awal & Akumulasi Depo
            if(!localStorage.getItem('user_balance')) {
                localStorage.setItem('user_balance', '0');
            }
            if(!localStorage.getItem('total_deposit_accumulated')) {
                localStorage.setItem('total_deposit_accumulated', '0');
            }

            // Set Status Login
            localStorage.setItem('is_logged_in', 'true');

            alert("Registrasi Berhasil! Selamat Datang di AR.GAMING.");
            window.location.href = 'game.html';
        }

        // Cek jika sudah login
        window.onload = function() {
            if(localStorage.getItem('is_logged_in') === 'true') {
                window.location.href = 'game.html';
            }
        }
    </script>
</body>
</html>
