<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-layer" class="auth-overlay">
        <div class="auth-glass-card">
            <h1 class="neon-title">NEON PLINKO <span class="vip-tag">VIP</span></h1>
            
            <div id="reg-container" style="display: none;">
                <p class="auth-instruction">Daftar untuk Aktivasi USER ID</p>
                <input type="text" id="reg-username" class="neon-input" placeholder="Username">
                <input type="password" id="reg-password" class="neon-input" placeholder="Password">
                <input type="text" id="reg-wallet" class="neon-input" placeholder="DANA/BANK/GOPAY">
                <button onclick="handleAuth('register')" class="btn-glow-blue">DAFTAR & KUNCI ID</button>
            </div>

            <div id="login-container" style="display: none;">
                <div class="user-preview">
                    <img id="user-avatar" src="" alt="Avatar">
                    <h3 id="display-greet"></h3>
                </div>
                <input type="password" id="login-password" class="neon-input" placeholder="Password">
                <button onclick="handleAuth('login')" class="btn-glow-pink">MASUK GAME</button>
            </div>
        </div>
    </div>

    <div id="game-layer" style="display: none;">
    <div id="ui-top">
        <div class="profile-btn" onclick="toggleProfile()">
            <img id="main-avatar" src="" alt="Avatar">
        </div>
        <div class="balance-container">
            <div class="bal-item">💵 <span id="bal-usdt">0.00</span> USDT</div>
            <div class="bal-item">🇮🇩 <span id="bal-idr">0</span> IDR</div>
        </div>
    </div>

    <div id="plinko-canvas-container"></div>

    <div class="multiplier-row">
        <div class="m-box">5.0</div>
        <div class="m-box">2.0</div>
        <div class="m-box">0.5</div>
        <div class="m-box">2.0</div>
        <div class="m-box">5.0</div>
    </div>

    <div class="footer-controls">
        <div class="bet-control">
            <button onclick="changeBet(-1)">−</button>
            <div class="bet-info">
                <small>TARUHAN</small>
                <div id="bet-amount">1.00</div>
            </div>
            <button onclick="changeBet(1)">+</button>
        </div>
        <div class="main-buttons">
            <button class="btn-side">DEPO</button>
            <button id="drop-btn" onclick="spawnBall()" class="btn-play">PLAY</button>
            <button class="btn-side" onclick="toggleProfile()">WD</button>
        </div>
    </div>
</div>
