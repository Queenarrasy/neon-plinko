<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nebula"></div>
    
    <div id="gui">
        <div class="header">
            <div class="bal-box">💵 <span id="bal-usdt">0.00</span> USDT</div>
            <div class="bal-box">🇮🇩 <span id="bal-idr">0</span> IDR</div>
        </div>

        <div class="footer-controls">
            <div class="bet-container">
                <button onclick="changeBet(-1)" style="background:none; border:none; color:white; font-size:20px;">−</button>
                <div style="text-align:center;">
                    <small style="font-size:9px; color:#888;">TARUHAN</small>
                    <div id="bet-amount" style="font-weight:bold; color:var(--neon-blue);">1.00</div>
                </div>
                <button onclick="changeBet(1)" style="background:none; border:none; color:white; font-size:20px;">+</button>
            </div>

            <div class="action-buttons">
                <button class="btn-side" onclick="openDepo()">DEPOSIT</button>
                <button id="drop-btn" class="btn-main">MAIN</button>
                <button class="btn-side">WITHDRAW</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
