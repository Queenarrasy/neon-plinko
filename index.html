<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816;
        }
        body { 
            background: var(--bg-dark); margin: 0; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; color: white;
        }
        .container {
            width: 88%; max-width: 400px; background: #0d0e21; border: 2px solid var(--neon-pink);
            border-radius: 25px; padding: 30px 20px; box-shadow: 0 0 20px rgba(255, 0, 119, 0.3); text-align: center;
        }

        /* JUDUL BERWARNA-WARNI NEON */
        .neon-title {
            font-size: 30px; font-weight: 900; text-transform: uppercase; margin: 0;
            background: linear-gradient(to right, #ff0077, #00d4ff, #fbff00, #ff0077);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.8));
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        .sub-title { font-size: 10px; color: #888; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }

        /* FORM STYLING */
        .form-group { text-align: left; margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 9px; font-weight: 900; color: var(--neon-pink); margin-bottom: 5px; }
        input {
            width: 100%; background: #000; border: 1px solid #333; border-radius: 12px;
            padding: 12px; color: white; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--neon-blue); }

        /* FITUR MATA PASSWORD */
        .eye-icon {
            position: absolute; right: 15px; top: 32px; color: #555; cursor: pointer; z-index: 10;
        }

        .btn-main {
            width: 100%; padding: 15px; background: var(--neon-pink); border: none;
            border-radius: 15px; color: white; font-size: 16px; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 119, 0.4); margin-top: 10px;
        }

        .toggle-link {
            margin-top: 20px; font-size: 11px; color: var(--neon-blue); cursor: pointer; text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container" id="auth-box">
        <h1 class="neon-title">NEON PLINKO VIP</h1>
        <div id="auth-header" class="sub-title">REGISTRASI AKUN VIP</div>

        <form id="auth-form">
            <div class="form-group">
                <label>USERNAME GAME</label>
                <input type="text" id="username" placeholder="Contoh: ABCD" required>
            </div>

            <div id="reg-fields">
                <div class="form-group">
                    <label>NAMA LENGKAP (SESUAI REKENING)</label>
                    <input type="text" id="fullname" placeholder="Nama asli Anda">
                </div>
                <div class="form-group">
                    <label>NAMA BANK / E-WALLET</label>
                    <input type="text" id="bank" placeholder="Contoh: DANA / BCA">
                </div>
                <div class="form-group">
                    <label>NOMOR REKENING / E-WALLET</label>
                    <input type="text" id="account" placeholder="Nomor akun Anda">
                </div>
            </div>

            <div class="form-group">
                <label>PASSWORD (MIN. 6 KARAKTER)</label>
                <input type="password" id="password" placeholder="******" required>
                <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
            </div>

            <button type="button" class="btn-main" onclick="handleAuth()">MASUK KE GAME</button>
        </form>

        <div class="toggle-link" id="toggle-auth" onclick="switchAuth()">SUDAH PUNYA AKUN? LOGIN DISINI</div>
    </div>

    <script>
        let isLogin = false;

        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function switchAuth() {
            isLogin = !isLogin;
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-header').innerText = isLogin ? 'LOGIN AKUN VIP' : 'REGISTRASI AKUN VIP';
            document.getElementById('toggle-auth').innerText = isLogin ? 'BELUM PUNYA AKUN? DAFTAR DISINI' : 'SUDAH PUNYA AKUN? LOGIN DISINI';
        }

        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Validasi Password Minimal 6 Karakter
            if (pass.length < 6) {
                alert("Password minimal harus 6 karakter!");
                return;
            }

            if (user === "") {
                alert("Username tidak boleh kosong!");

    </script>
</body>
</html>
