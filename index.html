<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PLINKO VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .auth-container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--neon-pink); border-radius: 25px; padding: 35px 25px; box-shadow: 0 0 30px rgba(255, 0, 119, 0.3); text-align: center; }

        /* JUDUL 1 BARIS LURUS WARNA-WARNI */
        h1 { 
            font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; white-space: nowrap;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue), var(--neon-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }
        
        .input-group { margin-bottom: 15px; position: relative; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        /* ICON MATA PASSWORD */
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; font-size: 18px; }
        .toggle-password:hover { color: var(--neon-blue); }

        .btn-main { width: 100%; padding: 16px; background: linear-gradient(90deg, #ff0077, #aa0055); border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 20px var(--neon-pink); margin-top: 15px; font-size: 16px; }
        
        .toggle-link { margin-top: 20px; font-size: 13px; color: #aaa; cursor: pointer; display: block; }
        .toggle-link span { color: var(--neon-blue); font-weight: bold; }

        /* NEON POPUP */
        #custom-alert { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 320px; background: #000; border: 2px solid var(--neon-blue); 
            border-radius: 20px; padding: 20px; z-index: 9999; text-align: center;
            box-shadow: 0 0 40px var(--neon-blue); animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { top: -150px; } to { top: 20px; } }
        .alert-btn { margin-top: 15px; padding: 8px 25px; background: var(--neon-blue); border: none; border-radius: 8px; color: black; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div id="alert-msg" style="font-weight: bold; color: white;">Pesan</div>
        <button class="alert-btn" onclick="closeAlert()">OKE</button>
    </div>

    <div class="auth-container">
        <h1>NEON PLINKO VIP</h1>
        
        <h3 id="form-title" style="color: var(--neon-gold); margin-bottom: 20px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Pendaftaran Member</h3>

        <form id="auth-form">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>

            <div id="reg-only-fields">
                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Nama Lengkap">
                </div>
                <div class="input-group">
                    <select id="bank">
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="BANK BCA">BANK BCA</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="number" id="rekening" placeholder="Nomor Rekening/E-Wallet">
                </div>
            </div>

            <div class="input-group password-container">
                <input type="password" id="password" placeholder="Password (Min. 6 Karakter)" required>
                <i class="fa-solid fa-eye-slash toggle-password" id="togglePass" onclick="togglePasswordVisibility()"></i>
            </div>

            <button type="button" class="btn-main" id="submit-btn" onclick="handleAuth()">Daftar Sekarang</button>
        </form>

        <div class="toggle-link" id="auth-toggle" onclick="toggleAuth()">
            Sudah punya akun? <span>Login di sini</span>
        </div>
    </div>

    <script>
        let isLoginMode = false;

        function showAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        // FUNGSI LIHAT/SEMBUNYIKAN PASSWORD
        function togglePasswordVisibility() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('togglePass');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            const regFields = document.getElementById('reg-only-fields');
            const title = document.getElementById('form-title');
            const btn = document.getElementById('submit-btn');
            const toggleText = document.getElementById('auth-toggle');

            if (isLoginMode) {
                regFields.style.display = 'none';
                title.innerText = "LOGIN MEMBER VIP";
                btn.innerText = "Masuk Sekarang";
                toggleText.innerHTML = "Belum punya akun? <span>Daftar di sini</span>";
            } else {
                regFields.style.display = 'block';
                title.innerText = "PENDAFTARAN MEMBER";
                btn.innerText = "Daftar Sekarang";
                toggleText.innerHTML = "Sudah punya akun? <span>Login di sini</span>";
            }
        }

        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const existingUsers = JSON.parse(localStorage.getItem('database_users') || "[]");

            if (!user || pass.length < 6) {
                showAlert("INPUT TIDAK VALID / PASSWORD MIN. 6 KARAKTER!");
                return;
            }

            if (isLoginMode) {
                // LOGIKA LOGIN
                const foundUser = existingUsers.find(u => u.username === user && u.password === pass);
                if (foundUser) {
                    // Hubungkan Sesi ke Profile
                    localStorage.setItem('user_vip', foundUser.username);
                    localStorage.setItem('full_name', foundUser.fullname);
                    localStorage.setItem('bank_name', foundUser.bank);
                    localStorage.setItem('acc_number', foundUser.rekening);
                    
                    showAlert("LOGIN BERHASIL!");
                    setTimeout(() => { window.location.href = 'game.html'; }, 1000);
                } else {
                    showAlert("USERNAME ATAU PASSWORD SALAH!");
                }
            } else {
                // LOGIKA DAFTAR DENGAN VALIDASI GANDA
                const full = document.getElementById('fullname').value.trim();
                const bank = document.getElementById('bank').value;
                const rek = document.getElementById('rekening').value.trim();

                if (!full || !rek) { showAlert("LENGKAPI SEMUA DATA!"); return; }
                
                // Aturan: Username atau Rekening tidak boleh sama
                if (existingUsers.some(u => u.username === user)) { 
                    showAlert("GAGAL: USERNAME SUDAH TERDAFTAR!"); 
                    return; 
                }
                if (existingUsers.some(u => u.rekening === rek)) { 
                    showAlert("GAGAL: NOMOR REKENING SUDAH DIGUNAKAN!"); 
                    return; 
                }

                // Simpan User Baru ke Database
                const newUser = { username: user, password: pass, fullname: full, bank: bank, rekening: rek };
                existingUsers.push(newUser);
                localStorage.setItem('database_users', JSON.stringify(existingUsers));

                // Set Sesi Aktif untuk Profile
                localStorage.setItem('user_vip', user);
                localStorage.setItem('full_name', full);
                localStorage.setItem('bank_name', bank);
                localStorage.setItem('acc_number', rek);
                localStorage.setItem('total_deposit', 0);

                showAlert("PENDAFTARAN BERHASIL!");
                setTimeout(() => { window.location.href = 'game.html'; }, 1000);
            }
        }
    </script>
</body>
</html>
