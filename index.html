<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko Premium USDT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gui">
        <div class="header">
            <div class="stat-box">
                <span id="balance">USDT 100.00</span>
            </div>
        </div>

        <div id="admin-panel">
            <small>MODE:</small>
            <button onclick="setMode('win')">WIN</button>
            <button onclick="setMode('lose')">LOSE</button>
            <button onclick="setMode('normal')">NORM</button>
        </div>

        <div class="footer-controls">
            <div class="bet-container">
                <button class="bet-btn" onclick="changeBet(-0.5)">-</button>
                <div class="bet-info">
                    <small>BET</small>
                    <div id="bet-amount">1.00</div>
                </div>
                <button class="bet-btn" onclick="changeBet(0.5)">+</button>
            </div>

            <div class="action-buttons">
                <button id="deposit-btn" class="btn-side">DEPOSIT</button>
                <button id="drop-btn" class="btn-main">JATUHKAN BOLA</button>
                <button id="wd-btn" class="btn-side">WITHDRAW</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
