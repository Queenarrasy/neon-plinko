<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Plinko VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box">
            <h2 class="neon-text">NEON PLINKO</h2>
            <div id="loading-spinner"></div>
            <div id="auth-form" style="display: none;">
                <p id="user-info">ID Telegram Terdeteksi...</p>
                <input type="text" id="reg-username" placeholder="Buat Username">
                <input type="password" id="reg-password" placeholder="Buat Password">
                <button onclick="handleAuth('register')" class="btn-main">DAFTAR AKUN</button>
            </div>
            <div id="login-form" style="display: none;">
                <input type="password" id="login-password" placeholder="Masukkan Password">
                <button onclick="handleAuth('login')" class="btn-main">MASUK GAME</button>
            </div>
        </div>
    </div>

    <div id="gui" style="display: none;">
        <div class="header">
            <div class="multi-balance">
                <div class="bal-box">💵 <span id="bal-usdt">0.00</span> USDT</div>
                <div class="bal-box">🇮🇩 <span id="bal-idr">0</span> IDR</div>
            </div>
        </div>

        <div class="footer-controls">
            <div class="currency-selector">
                <button id="use-usdt" class="active" onclick="switchCurrency('USDT')">USDT</button>
                <button id="use-idr" onclick="switchCurrency('IDR')">IDR</button>
            </div>
            
            <div class="bet-container">
                <button class="bet-btn" onclick="changeBet(-1)">−</button>
                <div class="bet-info"><small>TARUHAN</small><div id="bet-amount">1.00</div></div>
                <button class="bet-btn" onclick="changeBet(1)">+</button>
            </div>

            <div class="action-buttons">
                <button class="btn-side" onclick="openDepo()">DEPOSIT</button>
                <button id="drop-btn" class="btn-main">MAIN</button>
                <button class="btn-side" onclick="alert('Penarikan Sedang Diproses')">WD</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
