<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - Official Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff0077;
            --neon-blue: #00d4ff;
            --gold: #fbff00;
            --bg-dark: #0a0b1e;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            width: 90%;
            max-width: 400px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--neon-pink);
            border-radius: 30px;
            box-shadow: 0 0 25px rgba(255, 0, 119, 0.3);
            text-align: center;
        }

        .game-title { font-size: 28px; font-weight: 900; margin-bottom: 20px; }
        .neon-pink { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }
        .neon-blue { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .neon-gold { color: var(--gold); text-shadow: 0 0 15px var(--gold); font-style: italic; }

        .auth-tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: 15px; margin-bottom: 15px; padding: 5px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; font-size: 11px; font-weight: bold; border-radius: 10px; color: #555; }
        .tab.active { background: rgba(0, 212, 255, 0.1); color: var(--neon-blue); }

        .input-group { text-align: left; margin-bottom: 12px; position: relative; }
        label { font-size: 9px; color: var(--neon-pink); font-weight: bold; margin-left: 10px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 12px; margin-top: 5px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px; color: white; box-sizing: border-box; outline: none; font-size: 13px;
        }
        input:focus { border-color: var(--neon-blue); }

        /* Icon Mata Password */
        .toggle-password {
            position: absolute; right: 15px; top: 32px;
            color: var(--neon-blue); cursor: pointer; font-size: 14px;
        }

        .btn-action {
            width: 100%; padding: 15px; background: linear-gradient(45deg, var(--neon-pink), #ff0055);
            border: none; border-radius: 15px; color: white; font-weight: 900; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 119, 0.4); margin-top: 10px;
        }

        /* POPUP NOTIFIKASI NEON */
        .neon-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 300px; background: var(--bg-dark);
            border: 2px solid var(--neon-blue); border-radius: 20px;
            padding: 25px; text-align: center; z-index: 1000;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }

        .footer-note { font-size: 9px; color: #444; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="game-title">
            <span class="neon-pink">NEON</span> <span class="neon-blue">PLINKO</span> <span class="neon-gold">VIP</span>
        </div>

        <div class="auth-tabs">
            <div id="tabReg" class="tab active" onclick="switchMode('register')">DAFTAR BARU</div>
            <div id="tabLog" class="tab" onclick="switchMode('login')">MASUK AKUN</div>
        </div>

        <div class="input-group">
            <label>Username Game</label>
            <input type="text" id="userInput" placeholder="Contoh: ABCD">
        </div>

        <div id="extra-fields">
            <div class="input-group">
                <label>Nama Lengkap (Sesuai Rekening)</label>
                <input type="text" id="nameInput" placeholder="Nama asli Anda">
            </div>
            <div class="input-group">
                <label>Nama Bank / E-Wallet</label>
                <input type="text" id="bankNameInput" placeholder="Contoh: BCA / DANA">
            </div>
            <div class="input-group">
                <label>Nomor Rekening / E-Wallet</label>
                <input type="number" id="bankAccInput" placeholder="Untuk pencairan saldo">
            </div>
        </div>

        <div class="input-group">
            <label>Password (Min. 6 Karakter)</label>
            <input type="password" id="passInput" placeholder="******">
            <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePass()"></i>
        </div>

        <button class="btn-action" id="btnSubmit" onclick="handleAuth()">DAFTAR SEKARANG</button>

        <div class="footer-note">
            Data pendaftaran Anda akan terkunci secara otomatis demi keamanan pencairan dana.
        </div>
    </div>

    <div class="popup-overlay" id="overlay"></div>
    <div class="neon-popup" id="popup">
        <i class="fa-solid fa-circle-check" style="color: var(--neon-blue); font-size: 40px; margin-bottom: 15px;"></i>
        <h3 style="color: #fff; margin: 0;">BERHASIL!</h3>
        <p id="popupMsg" style="color: #888; font-size: 12px; margin: 10px 0 20px;">Akun Anda telah aktif.</p>
        <button class="btn-action" style="padding: 10px;" onclick="closePopup()">OK, MASUK GAME</button>
    </div>

    <script>
        let currentMode = 'register';

        function togglePass() {
            const passField = document.getElementById('passInput');
            const icon = document.querySelector('.toggle-password');
            if (passField.type === "password") {
                passField.type = "text";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                passField.type = "password";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('extra-fields').style.display = (mode === 'login') ? 'none' : 'block';
            document.getElementById('btnSubmit').innerText = (mode === 'login') ? 'MASUK SEKARANG' : 'DAFTAR SEKARANG';
            document.getElementById('tabLog').classList.toggle('active', mode === 'login');
            document.getElementById('tabReg').classList.toggle('active', mode === 'register');
        }

        function handleAuth() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if (pass.length < 6) return alert("Password harus minimal 6 karakter!");

            if (currentMode === 'register') {
                const name = document.getElementById('nameInput').value;
                const bank = document.getElementById('bankNameInput').value;
                const acc = document.getElementById('bankAccInput').value;

                if (!user || !name || !bank || !acc) return alert("Mohon lengkapi semua data!");

                localStorage.setItem('plinko_user', JSON.stringify({ 
                    username: user, fullName: name, bankName: bank, accountNumber: acc, password: pass 
                }));
                localStorage.setItem('user_balance', '0');
                showPopup("Registrasi Berhasil! Selamat datang di NEON PLINKO VIP.");
            } else {
                const saved = JSON.parse(localStorage.getItem('plinko_user'));
                if (saved && user === saved.username && pass === saved.password) {
                    localStorage.setItem('is_logged_in', 'true');
                    window.location.href = 'game.html';
                } else {
                    alert("Username atau Password salah!");
                }
            }
        }

        function showPopup(msg) {
            document.getElementById('popupMsg').innerText = msg;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('popup').style.display = 'block';
        }

        function closePopup() {
            localStorage.setItem('is_logged_in', 'true');
            window.location.href = 'game.html';
        }

        window.onload = () => {
            if(localStorage.getItem('is_logged_in') === 'true') window.location.href = 'game.html';
        };
    </script>
</body>
</html>
