<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAFTAR VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --bg-dark: #070816; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .auth-container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.05); border: 2px solid var(--neon-pink); border-radius: 20px; padding: 30px; box-shadow: 0 0 20px rgba(255, 0, 119, 0.2); text-align: center; }
        h2 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .btn-main { width: 100%; padding: 15px; background: var(--neon-pink); border: none; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px var(--neon-pink); margin-top: 10px; }

        /* NEON POPUP STYLE */
        #custom-alert { 
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 80%; max-width: 300px; background: #000; border: 2px solid var(--neon-blue); 
            border-radius: 15px; padding: 15px; z-index: 9999; text-align: center;
            box-shadow: 0 0 30px var(--neon-blue); animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }
        .alert-content { color: white; font-size: 14px; font-weight: bold; }
        .alert-btn { margin-top: 10px; padding: 5px 20px; background: var(--neon-blue); border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="custom-alert">
        <div class="alert-content" id="alert-msg">Pesan Kesalahan</div>
        <button class="alert-btn" onclick="closeAlert()">OKE</button>
    </div>

    <div class="auth-container">
        <h2 id="auth-header">Pendaftaran VIP</h2>
        <form id="reg-form">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username (Untuk Login)" required>
            </div>
            <div class="input-group">
                <input type="text" id="fullname" placeholder="Nama Lengkap Sesuai Rekening" required>
            </div>
            <div class="input-group">
                <select id="bank">
                    <option value="DANA">DANA</option>
                    <option value="OVO">OVO</option>
                    <option value="GOPAY">GOPAY</option>
                    <option value="BANK BCA">BANK BCA</option>
                    <option value="BANK MANDIRI">BANK MANDIRI</option>
                </select>
            </div>
            <div class="input-group">
                <input type="number" id="rekening" placeholder="Nomor Rekening/E-Wallet" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password (Min. 6 Karakter)" required>
            </div>
            <button type="button" class="btn-main" onclick="handleAuth()">DAFTAR SEKARANG</button>
        </form>
    </div>

    <script>
        function showAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        function handleAuth() {
            // Ambil Nilai Input
            const user = document.getElementById('username').value.trim();
            const full = document.getElementById('fullname').value.trim();
            const bank = document.getElementById('bank').value;
            const rek = document.getElementById('rekening').value.trim();
            const pass = document.getElementById('password').value;

            // 1. Validasi Password
            if (pass.length < 6) {
                showAlert("PASSWORD MINIMAL 6 KARAKTER!");
                return;
            }

            // 2. Cek Data Kosong
            if (!user || !full || !rek) {
                showAlert("SEMUA DATA WAJIB DIISI!");
                return;
            }

            // 3. Validasi Data Ganda (Anti-Double)
            // Kita ambil data lama jika ada untuk pengecekan
            const existingUsers = JSON.parse(localStorage.getItem('registered_users') || "[]");

            const isUserTaken = existingUsers.some(u => u.username === user);
            const isRekTaken = existingUsers.some(u => u.rekening === rek);

            if (isUserTaken) {
                showAlert("USERNAME SUDAH TERDAFTAR!");
                return;
            }

            if (isRekTaken) {
                showAlert("NOMOR REKENING SUDAH DIGUNAKAN!");
                return;
            }

            // 4. SIMPAN DATA UNTUK PROFILE & SISTEM LOGIN
            // Simpan data user aktif saat ini
            localStorage.setItem('user_vip', user);
            localStorage.setItem('full_name', full);
            localStorage.setItem('bank_name', bank);
            localStorage.setItem('acc_number', rek);
            localStorage.setItem('total_deposit', 0); // Akumulasi depo awal
            localStorage.setItem('saldo_vip', 0); // Saldo awal

            // Simpan ke database lokal untuk cek ganda di pendaftaran berikutnya
            existingUsers.push({ username: user, rekening: rek });
            localStorage.setItem('registered_users', JSON.stringify(existingUsers));

            // 5. REDIRECT KE GAME
            showAlert("PENDAFTARAN BERHASIL! SELAMAT BERMAIN.");
            setTimeout(() => {
                window.location.href = 'game.html';
            }, 1500);
        }
    </script>
</body>
</html>
