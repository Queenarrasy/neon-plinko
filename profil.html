<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFIL VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #070816; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.05); border: 2px solid #00d4ff; border-radius: 20px; padding: 25px; margin-top: 30px; }
        .tier-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; border: 1px solid; }
        .info { text-align: left; margin-top: 20px; font-size: 14px; }
        .info div { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <i id="tier-icon" class="fa-solid fa-crown fa-3x"></i>
        <h2 id="prof-fullname">-</h2>
        <div id="tier-name" class="tier-badge">BRONZE</div>

        <div style="background:#000; padding:15px; border-radius:15px;">
            <small>SALDO PERMAINAN</small>
            <h1 id="display-saldo">IDR 0</h1>
        </div>

        <div class="info">
            <div><small>Username:</small> <br><b id="prof-user">-</b></div>
            <div><small>Rekening:</small> <br><b id="prof-rek">-</b></div>
            <div><small>Bank:</small> <br><b id="prof-bank">-</b></div>
        </div>

        <button onclick="location.href='game.html'" style="width:100%; padding:15px; background:#00d4ff; border:none; border-radius:10px; margin-top:20px; font-weight:bold;">KEMBALI MAIN</button>
    </div>

    <script src="global.js"></script>
    <script>
        document.getElementById('prof-fullname').innerText = localStorage.getItem('full_name') || "User VIP";
        document.getElementById('prof-user').innerText = "@" + (localStorage.getItem('user_vip') || "user");
        document.getElementById('prof-bank').innerText = localStorage.getItem('bank_name') || "-";
        document.getElementById('prof-rek').innerText = localStorage.getItem('acc_number') || "-";
    </script>
</body>
</html>
