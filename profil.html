<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFIL NEON VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; 
            --blue: #00d4ff; 
            --yellow: #fbff00; 
            --bg: #070816; 
        }
        
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 0, 119, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 212, 255, 0.12) 0%, transparent 40%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }
        
        .card { 
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--blue); border-radius: 35px; padding: 35px 25px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); text-align: center;
            backdrop-filter: blur(15px);
            margin-top: 10px;
        }

        /* TIER AREA */
        .tier-header { margin-bottom: 30px; }
        #tier-name { 
            font-weight: 900; letter-spacing: 5px; font-size: 22px; 
            display: block; margin-bottom: 12px; 
            color: var(--yellow); text-shadow: 0 0 15px var(--yellow);
            text-transform: uppercase;
        }
        
        .progress-container { 
            background: #000; height: 14px; border-radius: 20px; border: 1px solid #333; 
            overflow: hidden; margin: 12px 0; position: relative; box-shadow: inset 0 0 10px #000;
        }
        .progress-bar { 
            width: 0%; height: 100%; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
            background: linear-gradient(90deg, var(--pink), var(--yellow));
            box-shadow: 0 0 20px var(--pink);
        }
        .tier-info-text { font-size: 11px; color: var(--blue); display: flex; justify-content: space-between; font-weight: 900; letter-spacing: 1px; }

        /* SALDO BOX */
        .balance-card { 
            background: rgba(0, 0, 0, 0.6); border: 2px solid var(--pink);
            border-radius: 25px; padding: 25px; margin-bottom: 30px; 
            box-shadow: 0 0 25px rgba(255, 0, 119, 0.3);
            position: relative;
        }
        .balance-card small { color: #fff; text-transform: uppercase; font-size: 11px; letter-spacing: 3px; }
        .balance-card h1 { margin: 15px 0 0; font-size: 32px; color: var(--yellow); text-shadow: 0 0 15px var(--yellow); }

        /* DATA LIST */
        .data-list { text-align: left; }
        .data-item { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; 
            margin-bottom: 12px; border-right: 4px solid var(--blue);
            transition: 0.3s;
        }
        .data-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .label { font-size: 10px; color: var(--blue); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 16px; color: #fff; margin-top: 5px; font-weight: 500; text-shadow: 0 0 5px rgba(255,255,255,0.2); }

        /* BUTTONS */
        .btn { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s;
            font-size: 14px; letter-spacing: 2px;
        }
        .btn-game { 
            background: linear-gradient(90deg, var(--blue), #0088ff); color: #000; 
            box-shadow: 0 0 20px var(--blue);
        }
        .btn-logout { background: transparent; border: 2px solid var(--pink); color: var(--pink); box-shadow: 0 0 10px var(--pink); }
        .btn:hover { transform: scale(1.03); filter: brightness(1.2); }

        /* NEON MODAL POPUP */
        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 10000;
            backdrop-filter: blur(10px);
        }
        .neon-modal {
            background: #050612; border: 2px solid var(--yellow); border-radius: 30px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 40px var(--yellow);
        }
        .neon-modal h2 { color: var(--pink); text-shadow: 0 0 10px var(--pink); margin-bottom: 15px; text-transform: uppercase; font-weight: 900; }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .m-btn { flex: 1; padding: 14px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-confirm { background: var(--blue); color: #000; }
        .btn-cancel { background: #222; color: #fff; }
    </style>
</head>
<body>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title">KONFIRMASI</h2>
            <p id="modal-msg">Apakah Anda yakin ingin keluar dari akun VIP?</p>
            <div class="modal-btns">
                <button class="m-btn btn-cancel" onclick="closeModal()">Batal</button>
                <button class="m-btn btn-confirm" onclick="executeLogout()">Ya, Logout</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="tier-header">
            <span id="tier-name">LOADING VIP...</span>
            <div class="progress-container">
                <div id="tier-progress-bar" class="progress-bar"></div>
            </div>
            <div class="tier-info-text">
                <span>XP PROGRESS</span>
                <span id="tier-persen">0%</span>
            </div>
        </div>

        <div class="balance-card">
            <small>Saldo Utama VIP</small>
            <h1 id="display-saldo">IDR 0</h1>
        </div>

        <div class="data-list">
            <div class="data-item">
                <div class="label">ID Member (Username)</div>
                <div class="val" id="p-user">-</div>
            </div>
            <div class="data-item">
                <div class="label">Nama Lengkap</div>
                <div class="val" id="p-full">-</div>
            </div>
            <div class="data-item">
                <div class="label">Metode Pembayaran</div>
                <div class="val" id="p-bank">-</div>
            </div>
            <div class="data-item">
                <div class="label">Nomor Rekening</div>
                <div class="val" id="p-rek">-</div>
            </div>
            <div class="data-item">
                <div class="label">Status Keanggotaan</div>
                <div class="val" id="p-status">-</div>
            </div>
        </div>

        <button class="btn btn-game" onclick="location.href='game.html'">
            <i class="fas fa-play-circle"></i> Mulai Bermain
        </button>
        <button class="btn btn-logout" onclick="showLogoutModal()">
            <i class="fas fa-sign-out-alt"></i> Logout Akun
        </button>
    </div>

    <script src="global.js"></script>
    <script>
        function showLogoutModal() {
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('neon-modal-overlay').style.display = 'none';
        }

        async function executeLogout() {
            try {
                // Update status ke Offline di Database jika fungsi tersedia
                if(typeof updateOnlineStatus === 'function') {
                    await updateOnlineStatus("Offline");
                }
            } catch (e) {
                console.log("Status update skipped");
            }
            localStorage.clear();
            location.href = 'auth.html';
        }

        function loadProfileData() {
            const sessionUser = localStorage.getItem('user_session');
            
            if (sessionUser) {
                // 1. Username
                document.getElementById('p-user').innerText = sessionUser;
                
                // 2. Nama Lengkap (Kunci: fullname)
                const name = localStorage.getItem('fullname');
                document.getElementById('p-full').innerText = (name && name !== "undefined" && name !== "null") ? name : "-";
                
                // 3. Bank / E-Wallet (Kunci: bank_name)
                const bank = localStorage.getItem('bank_name');
                document.getElementById('p-bank').innerText = (bank && bank !== "undefined" && bank !== "null") ? bank : "-";
                
                // 4. Nomor Rekening (Kunci: account_no)
                const rek = localStorage.getItem('account_no');
                document.getElementById('p-rek').innerText = (rek && rek !== "undefined" && rek !== "null") ? rek : "-";
                
                // 5. Status Keanggotaan
                const status = localStorage.getItem('user_status');
                document.getElementById('p-status').innerText = (status && status !== "undefined") ? status : "ACTIVE";
                
                // 6. Saldo & Tier
                const saldoRaw = localStorage.getItem('saldo_permainan');
                const saldo = parseInt(saldoRaw) || 0;
                const tier = localStorage.getItem('user_tier') || "BRONZE";
                
                document.getElementById('display-saldo').innerText = "IDR " + saldo.toLocaleString('id-ID');
                document.getElementById('tier-name').innerText = tier + " MEMBER";

                // 7. Visual Progress Tier (Target XP: 1.000.000)
                let persen = (saldo / 1000000) * 100;
                if (persen > 100) persen = 100;
                if (persen < 2) persen = 2; // Biar bar tetap terlihat sedikit
                
                const bar = document.getElementById('tier-progress-bar');
                if(bar) {
                    bar.style.width = persen + "%";
                    document.getElementById('tier-persen').innerText = Math.floor(persen) + "%";
                }
            } else {
                // Jika tidak login, kembalikan ke auth
                location.href = 'auth.html';
            }
        }

        // Jalankan saat halaman dibuka
        window.onload = loadProfileData;
    </script>
</body>
</html>
