<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFIL NEON VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.02); border: 2px solid var(--pink); border-radius: 30px; padding: 30px 20px; box-shadow: 0 0 20px rgba(255, 0, 119, 0.2); text-align: center; }
        .tier-header { margin-bottom: 25px; }
        #tier-name { font-weight: 900; letter-spacing: 3px; font-size: 18px; display: block; margin-bottom: 10px; color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }
        .progress-container { background: #000; height: 12px; border-radius: 10px; border: 1px solid #333; overflow: hidden; margin: 10px 0; position: relative; }
        .progress-bar { width: 0%; height: 100%; transition: 1s ease-in-out; background: var(--pink); box-shadow: 0 0 10px var(--pink); }
        .tier-info-text { font-size: 10px; color: #888; display: flex; justify-content: space-between; font-weight: bold; }
        .balance-card { background: linear-gradient(145deg, #000, #111); border: 1px solid var(--blue); border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.1); }
        .balance-card small { color: var(--blue); text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        .balance-card h1 { margin: 10px 0 0; font-size: 28px; text-shadow: 0 0 10px var(--blue); color: var(--yellow); }
        .data-list { text-align: left; }
        .data-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--blue); transition: 0.3s; }
        .label { font-size: 9px; color: var(--blue); font-weight: 900; text-transform: uppercase; }
        .val { font-size: 14px; color: #eee; margin-top: 3px; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-game { background: var(--blue); color: #000; box-shadow: 0 0 20px var(--blue); }
        .btn-logout { background: transparent; border: 1px solid var(--pink); color: var(--pink); }
    </style>
</head>
<body>
    <div class="card">
        <div class="tier-header">
            <span id="tier-name">LOADING VIP...</span>
            <div class="progress-container"><div id="tier-progress-bar" class="progress-bar"></div></div>
            <div class="tier-info-text"><span>XP PROGRESS</span><span id="tier-persen">0%</span></div>
        </div>
        <div class="balance-card"><small>Saldo Utama VIP</small><h1 id="display-saldo">IDR 0</h1></div>
        <div class="data-list">
            <div class="data-item"><div class="label">ID Member</div><div class="val" id="p-user">-</div></div>
            <div class="data-item"><div class="label">Nama Lengkap</div><div class="val" id="p-full">-</div></div>
            <div class="data-item"><div class="label">Metode Pembayaran</div><div class="val" id="p-bank">-</div></div>
            <div class="data-item"><div class="label">Nomor Rekening</div><div class="val" id="p-rek">-</div></div>
            <div class="data-item"><div class="label">Status Keanggotaan</div><div class="val" id="p-status">-</div></div>
        </div>
        <button class="btn btn-game" onclick="location.href='game.html'">Mulai Bermain</button>
        <button class="btn btn-logout" onclick="logout()">Logout Akun</button>
    </div>

    <script src="global.js"></script>
    <script>
        function load() {
            const sessionUser = localStorage.getItem('user_session');
            if (sessionUser) {
                document.getElementById('p-user').innerText = sessionUser;
                // Pastikan menggunakan kunci 'fullname' dan 'account_no'
                const name = localStorage.getItem('fullname');
                document.getElementById('p-full').innerText = (name && name !== "undefined") ? name : "-";
                
                document.getElementById('p-bank').innerText = localStorage.getItem('bank_name') || "-";
                
                const rek = localStorage.getItem('account_no');
                document.getElementById('p-rek').innerText = (rek && rek !== "undefined") ? rek : "-";
                
                document.getElementById('p-status').innerText = localStorage.getItem('user_status') || "ACTIVE";
                
                const saldo = parseInt(localStorage.getItem('saldo_permainan')) || 0;
                const tier = localStorage.getItem('user_tier') || "BRONZE";
                document.getElementById('display-saldo').innerText = "IDR " + saldo.toLocaleString('id-ID');
                document.getElementById('tier-name').innerText = tier + " MEMBER";

                let persen = (saldo / 1000000) * 100;
                if (persen > 100) persen = 100;
                document.getElementById('tier-progress-bar').style.width = persen + "%";
                document.getElementById('tier-persen').innerText = Math.floor(persen) + "%";
            } else { location.href = 'auth.html'; }
        }

        function logout() {
            if (confirm("Apakah Anda yakin ingin keluar?")) {
                localStorage.clear();
                location.href='auth.html';
            }
        }
        window.onload = load;
    </script>
</body>
</html>
