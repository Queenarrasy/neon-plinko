<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFIL NEON VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .card { 
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--pink); border-radius: 30px; padding: 30px 20px;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2); text-align: center;
        }

        /* TIER PROGRESS AREA */
        .tier-header { margin-bottom: 25px; }
        #tier-name { font-weight: 900; letter-spacing: 3px; font-size: 18px; display: block; margin-bottom: 10px; }
        
        .progress-container { 
            background: #000; height: 12px; border-radius: 10px; border: 1px solid #333; 
            overflow: hidden; margin: 10px 0; position: relative;
        }
        .progress-bar { width: 0%; height: 100%; transition: 1s ease-in-out; }
        .tier-info-text { font-size: 10px; color: #888; display: flex; justify-content: space-between; font-weight: bold; }

        /* SALDO BOX */
        .balance-card { 
            background: linear-gradient(145deg, #000, #111); border: 1px solid var(--blue);
            border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        .balance-card small { color: var(--blue); text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        .balance-card h1 { margin: 10px 0 0; font-size: 28px; text-shadow: 0 0 10px var(--blue); }

        /* DATA LIST */
        .data-list { text-align: left; }
        .data-item { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; 
            margin-bottom: 10px; border-left: 4px solid var(--pink);
        }
        .label { font-size: 9px; color: var(--pink); font-weight: 900; text-transform: uppercase; }
        .val { font-size: 14px; color: #eee; margin-top: 3px; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-game { background: var(--blue); color: #000; box-shadow: 0 0 20px var(--blue); }
        .btn-logout { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
    </style>
</head>
<body>

    <div class="card">
        <div class="tier-header">
            <span id="tier-name">LOADING...</span>
            <div class="progress-container">
                <div id="tier-progress-bar" class="progress-bar"></div>
            </div>
            <div class="tier-info-text">
                <span>PROGRESS KE NEXT TIER</span>
                <span id="tier-persen">0%</span>
            </div>
        </div>

        <div class="balance-card">
            <small>Total Saldo Permainan</small>
            <h1 id="display-saldo">IDR 0</h1>
        </div>

        <div class="data-list">
            <div class="data-item"><div class="label">Username</div><div class="val" id="p-user">-</div></div>
            <div class="data-item"><div class="label">Nama Lengkap</div><div class="val" id="p-full">-</div></div>
            <div class="data-item"><div class="label">Bank/E-Wallet</div><div class="val" id="p-bank">-</div></div>
            <div class="data-item"><div class="label">No. Rekening</div><div class="val" id="p-rek">-</div></div>
        </div>

        <button class="btn btn-game" onclick="location.href='game.html'">Main Sekarang</button>
        <button class="btn btn-logout" onclick="logout()">Logout Akun</button>
    </div>

    <script src="global.js"></script>
    <script>
        function load() {
            document.getElementById('p-user').innerText = localStorage.getItem('user_vip') || "-";
            document.getElementById('p-full').innerText = localStorage.getItem('full_name') || "-";
            document.getElementById('p-bank').innerText = localStorage.getItem('bank_name') || "-";
            document.getElementById('p-rek').innerText = localStorage.getItem('acc_number') || "-";
        }
        function logout() {
            localStorage.clear();
            location.href='auth.html';
        }
        window.onload = load;
    </script>
</body>
</html>
