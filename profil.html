<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFIL NEON VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --bg: #070816; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .card { 
            width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--pink); border-radius: 30px; padding: 30px 20px;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.2); text-align: center;
        }

        /* TIER PROGRESS AREA */
        .tier-header { margin-bottom: 25px; }
        #tier-name { font-weight: 900; letter-spacing: 3px; font-size: 18px; display: block; margin-bottom: 10px; }
        
        .progress-container { 
            background: #000; height: 12px; border-radius: 10px; border: 1px solid #333; 
            overflow: hidden; margin: 10px 0; position: relative;
        }
        .progress-bar { width: 0%; height: 100%; transition: 1s ease-in-out; }
        .tier-info-text { font-size: 10px; color: #888; display: flex; justify-content: space-between; font-weight: bold; }

        /* SALDO BOX */
        .balance-card { 
            background: linear-gradient(145deg, #000, #111); border: 1px solid var(--blue);
            border-radius: 20px; padding: 20px; margin-bottom: 30px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        .balance-card small { color: var(--blue); text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        .balance-card h1 { margin: 10px 0 0; font-size: 28px; text-shadow: 0 0 10px var(--blue); }

        /* DATA LIST */
        .data-list { text-align: left; }
        .data-item { 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; 
            margin-bottom: 10px; border-left: 4px solid var(--pink);
        }
        .label { font-size: 9px; color: var(--pink); font-weight: 900; text-transform: uppercase; }
        .val { font-size: 14px; color: #eee; margin-top: 3px; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-game { background: var(--blue); color: #000; box-shadow: 0 0 20px var(--blue); }
        .btn-logout { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
    </style>
</head>
<body>

    <div class="card">
        <div class="tier-header">
            <span id="tier-name">LOADING...</span>
            <div class="progress-container">
                <div id="tier-progress-bar" class="progress-bar"></div>
            </div>
            <div class="tier-info-text">
                <span data-i18n="tier-progress">PROGRESS KE NEXT TIER</span>
                <span id="tier-persen">0%</span>
            </div>
        </div>

        <div class="balance-card">
            <small data-i18n="label-saldo-game">Total Saldo Permainan</small>
            <h1 id="display-saldo">IDR 0</h1>
        </div>

        <div class="data-list">
            <div class="data-item">
                <div class="label" data-i18n="label-user">Username</div>
                <div class="val" id="p-user">-</div>
            </div>
            <div class="data-item">
                <div class="label" data-i18n="label-fullname">Nama Lengkap</div>
                <div class="val" id="p-full">-</div>
            </div>
            <div class="data-item">
                <div class="label" data-i18n="label-bank">Bank/E-Wallet</div>
                <div class="val" id="p-bank">-</div>
            </div>
            <div class="data-item">
                <div class="label" data-i18n="label-acc">No. Rekening</div>
                <div class="val" id="p-rek">-</div>
            </div>
        </div>

        <button class="btn btn-game" onclick="location.href='game.html'" data-i18n="btn-play">Main Sekarang</button>
        <button class="btn btn-logout" onclick="logout()" data-i18n="btn-logout">Logout Akun</button>
    </div>

    <script src="global.js"></script>
    <script>
        function load() {
            // Ambil session username yang sedang login
            const sessionUser = localStorage.getItem('user_session');
            const userDB = JSON.parse(localStorage.getItem('database_users') || "[]");
            
            // Cari data lengkap user di database
            const userData = userDB.find(u => u.username === sessionUser);

            if (userData) {
                // Tampilkan data dari database pendaftaran
                document.getElementById('p-user').innerText = userData.username || "-";
                document.getElementById('p-full').innerText = userData.fullname || "-";
                document.getElementById('p-bank').innerText = userData.bank || "-";
                document.getElementById('p-rek').innerText = userData.rekening || "-";
            } else {
                // Fallback jika data database tidak ditemukan (untuk akun admin/manual)
                document.getElementById('p-user').innerText = sessionUser || "-";
                document.getElementById('p-full').innerText = localStorage.getItem('full_name') || "-";
                document.getElementById('p-bank').innerText = localStorage.getItem('bank_name') || "-";
                document.getElementById('p-rek').innerText = localStorage.getItem('acc_number') || "-";
            }

            // Update Saldo & Tier via Global System
            if (typeof updateSaldo === 'function') {
                updateSaldo(0); 
            }

            // Hitung Progress Bar Tier
            const saldo = parseInt(localStorage.getItem('saldo_permainan')) || 0;
            let persen = 0;
            let color = "var(--pink)";

            if (saldo >= 1000000) {
                persen = 100;
                color = "var(--blue)";
            } else if (saldo >= 500000) {
                persen = ((saldo - 500000) / 500000) * 100;
                color = "var(--blue)";
            } else {
                persen = (saldo / 500000) * 100;
                color = "var(--pink)";
            }

            const bar = document.getElementById('tier-progress-bar');
            if (bar) {
                bar.style.width = persen + "%";
                bar.style.background = color;
            }
            document.getElementById('tier-persen').innerText = Math.floor(persen) + "%";

            // Jalankan Sistem Bahasa
            if (typeof applyLanguage === 'function') {
                applyLanguage();
            }
        }

        function logout() {
            const lang = localStorage.getItem('appLang') || 'id';
            const msg = lang === 'id' ? "Apakah Anda yakin ingin keluar?" : "Are you sure you want to logout?";
            
            if (confirm(msg)) {
                const currentLang = localStorage.getItem('appLang');
                const userDB = localStorage.getItem('database_users'); // Simpan DB agar tidak terhapus
                
                localStorage.clear();
                
                localStorage.setItem('appLang', currentLang);
                localStorage.setItem('database_users', userDB); // Kembalikan DB
                location.href='auth.html';
            }
        }

        window.onload = load;
    </script>
</body>
</html>
