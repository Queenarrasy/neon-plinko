<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROFIL VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; 
            --pink-neon: 0 0 10px var(--pink);
            --blue-neon: 0 0 10px var(--blue);
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
        }

        .header-profil {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .header-profil i {
            font-size: 50px;
            color: var(--pink);
            text-shadow: var(--pink-neon);
        }

        .user-info h3 { margin: 0; color: var(--blue); text-shadow: var(--blue-neon); }
        .user-info p { margin: 0; font-size: 12px; color: #aaa; }

        /* Sesuai Permintaan: SALDO UTAMA VIP */
        .saldo-card {
            background: linear-gradient(135deg, #0d0f26, #1a1d40);
            border: 2px solid var(--blue);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--blue-neon);
            margin-bottom: 25px;
        }

        .saldo-card p {
            margin: 0;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--yellow);
        }

        .saldo-card h2 {
            margin: 10px 0 0 0;
            font-size: 32px;
            color: white;
            text-shadow: 0 0 15px var(--blue);
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
        }

        .menu-item i { color: var(--pink); }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--blue);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI</a>

    <div class="header-profil">
        <i class="fa-solid fa-circle-user"></i>
        <div class="user-info">
            <h3 id="display-username">PLAYER</h3>
            <p id="display-fullname">VIP Member</p>
        </div>
    </div>

    <div class="saldo-card">
        <p>SALDO UTAMA VIP</p>
        <h2 id="display-saldo">IDR 0</h2>
    </div>

    <div class="menu-list">
        <div class="menu-item">
            <span>Metode Bank</span>
            <span id="display-bank" style="color: var(--blue);">...</span>
        </div>
        <div class="menu-item">
            <span>Nomor Rekening</span>
            <span id="display-rekening">...</span>
        </div>
        <a href="deposit.html" class="menu-item">
            <span>Tambah Saldo</span>
            <i class="fa-solid fa-chevron-right"></i>
        </a>
        <a href="withdraw.html" class="menu-item">
            <span>Tarik Dana</span>
            <i class="fa-solid fa-chevron-right"></i>
        </a>
    </div>

    <script src="global.js"></script>
    <script>
        // Fungsi untuk mengambil data terbaru dari Google Sheets
        async function syncDataProfil() {
            const user = localStorage.getItem('user_session');
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Tampilkan data lokal dulu agar tidak kosong
            document.getElementById('display-username').innerText = user.toUpperCase();
            document.getElementById('display-fullname').innerText = localStorage.getItem('fullname') || 'VIP Player';
            document.getElementById('display-bank').innerText = localStorage.getItem('bank') || '-';
            document.getElementById('display-rekening').innerText = localStorage.getItem('rekening') || '-';
            
            const localSaldo = localStorage.getItem('saldo') || 0;
            document.getElementById('display-saldo').innerText = 'IDR ' + parseInt(localSaldo).toLocaleString();

            try {
                // Panggil action 'getUserData' yang ada di Apps Script terbaru Anda
                const response = await fetch(window.SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getUserData',
                        username: user
                    })
                });

                const data = await response.json();

                if (data.result === "SUCCESS") {
                    // Update LocalStorage dengan data terbaru dari server
                    localStorage.setItem('saldo', data.saldo);
                    localStorage.setItem('tier', data.tier);

                    // Update tampilan Saldo Utama VIP secara halus
                    document.getElementById('display-saldo').innerText = 'IDR ' + parseInt(data.saldo).toLocaleString();
                    console.log("Saldo disinkronkan dengan server.");
                }
            } catch (err) {
                console.error("Gagal sinkron saldo:", err);
            }
        }

        // Jalankan saat halaman dibuka
        window.onload = syncDataProfil;
    </script>
</body>
</html>
