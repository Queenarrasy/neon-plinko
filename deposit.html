<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEPOSIT VIP - NEON PLINKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff0077; --neon-blue: #00d4ff; --neon-gold: #fbff00; --bg-dark: #070816; }
        body, html { background: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        
        .btn-back { color: var(--neon-blue); text-decoration: none; font-weight: 900; font-size: 12px; display: flex; align-items: center; gap: 5px; margin-bottom: 25px; text-transform: uppercase; }

        /* DEPOSIT CARD */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .neon-title { color: var(--neon-blue); font-size: 18px; font-weight: 900; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        label { font-size: 11px; color: #888; display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="number"] { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: var(--neon-gold); font-size: 20px; font-weight: 900; outline: none; text-align: center; box-sizing: border-box;
        }

        /* METODE TABS */
        .method-tabs { display: flex; gap: 10px; margin: 20px 0; }
        .btn-tab { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px; color: white; cursor: pointer; font-size: 11px; font-weight: 900; transition: 0.3s; }
        .btn-tab.active { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); background: rgba(0, 212, 255, 0.1); }

        /* INSTRUCTION BOX */
        .instruksi-box { background: #000; border: 1px solid var(--neon-blue); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; min-height: 240px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* RIWAYAT TABLE (Senada dengan Withdraw) */
        .history-item { 
            background: rgba(255,255,255,0.02); border: 1px solid #1a1b2e; border-radius: 12px; 
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .hist-info b { font-size: 14px; color: #fff; display: block; }
        .hist-info small { font-size: 10px; color: #555; }
        .status-badge { font-size: 10px; font-weight: 900; padding: 5px 10px; border-radius: 50px; text-transform: uppercase; }
        
        .status-pending { background: rgba(251, 255, 0, 0.1); color: var(--neon-gold); border: 1px solid var(--neon-gold); }
        .status-sukses { background: rgba(0, 212, 255, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }

        .btn-primary { 
            width: 100%; padding: 16px; background: var(--neon-pink); border: none; border-radius: 12px; 
            color: white; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px var(--neon-pink);
        }

        /* POPUP */
        #neon-popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; max-width: 320px; background: #000; border: 2px solid var(--neon-blue); 
            border-radius: 20px; padding: 25px; z-index: 10000; text-align: center; box-shadow: 0 0 50px var(--neon-blue);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    <div id="neon-popup">
        <div id="popup-msg" style="font-weight: bold; margin-bottom: 20px; font-size: 14px;"></div>
        <button onclick="closePopup()" style="background: var(--neon-blue); border: none; padding: 10px 25px; border-radius: 8px; font-weight: 900; cursor: pointer; color: black;">OKE</button>
    </div>

    <div class="container">
        <a href="game.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE GAME</a>

        <div class="glass-card">
            <h2 class="neon-title">FORM SETOR DANA</h2>
            <p style="color: var(--neon-pink); font-size: 11px; text-align: center; margin-bottom: 20px; font-weight: bold;">⚠️ MINIMAL DEPOSIT: IDR 20,000</p>
            
            <label>NOMINAL DEPOSIT (IDR)</label>
            <input type="number" id="input-nominal" placeholder="0">

            <div class="method-tabs">
                <button id="tab-qris" onclick="pilihMetode('QRIS')" class="btn-tab active">QRIS RUPIAH</button>
                <button id="tab-crypto" onclick="pilihMetode('CRYPTO')" class="btn-tab">USDT CRYPTO</button>
            </div>

            <div id="box-instruksi" class="instruksi-box">
                <div id="konten-qris">
                    <h4 style="font-size: 12px; margin-bottom: 10px;">SILAKAN SCAN QRIS</h4>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=ID1024357689073" style="width: 160px; border-radius: 10px; border: 2px solid white;">
                    <p style="font-size: 10px; margin-top: 10px; color: #aaa;">NMID: ID1024357689073<br>ARRASHY STORE / SAXOPONE</p>
                </div>

                <div id="konten-crypto" style="display:none;">
                    <i class="fa-brands fa-bitcoin" style="font-size: 40px; color: var(--neon-gold); margin-bottom: 10px;"></i>
                    <h4 style="color:var(--neon-gold); font-size: 13px; margin: 0;">USDT PAYMENT (TRC20)</h4>
                    <p style="font-size: 10px; color: #888; margin: 5px 0 15px;">Fee Jaringan: 1.0 USDT (~IDR 16k)</p>
                    <p style="font-size: 11px; color: #fff; background: #111; padding: 10px; border-radius: 8px; border: 1px dashed #444;">Dapatkan Alamat Wallet via Admin</p>
                    <a href="https://wa.me/6289510249551?text=Halo%20Admin,%20saya%20ingin%20deposit%20via%20USDT" target="_blank" style="background:#25d366; color:white; text-decoration:none; display:inline-block; padding: 12px 20px; border-radius: 10px; font-size: 11px; margin-top: 10px; font-weight: bold;">
                        <i class="fa-brands fa-whatsapp"></i> HUBUNGI ADMIN WHATSAPP
                    </a>
                </div>
            </div>

            <button onclick="prosesDeposit()" class="btn-primary">KONFIRMASI TRANSFER</button>
        </div>

        <div class="history-section">
            <h3 style="font-size: 12px; color: var(--neon-blue); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;"><i class="fa-solid fa-clock-rotate-left"></i> RIWAYAT DEPOSIT</h3>
            <div id="list-riwayat">
                </div>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let metodeTerpilih = "QRIS";

        function showPopup(msg, isError = false) {
            const popup = document.getElementById('neon-popup');
            const text = document.getElementById('popup-msg');
            popup.style.borderColor = isError ? 'var(--neon-pink)' : 'var(--neon-blue)';
            text.innerText = msg;
            popup.style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('neon-popup').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function pilihMetode(tipe) {
            metodeTerpilih = tipe;
            // Reset Tab UI
            document.getElementById('tab-qris').classList.remove('active');
            document.getElementById('tab-crypto').classList.remove('active');
            
            // Konten Switch
            if(tipe === 'QRIS') {
                document.getElementById('tab-qris').classList.add('active');
                document.getElementById('konten-qris').style.display = 'block';
                document.getElementById('konten-crypto').style.display = 'none';
            } else {
                document.getElementById('tab-crypto').classList.add('active');
                document.getElementById('konten-qris').style.display = 'none';
                document.getElementById('konten-crypto').style.display = 'block';
            }
        }

        function prosesDeposit() {
            const nom = document.getElementById('input-nominal').value;
            if(!nom || nom < 20000) return showPopup("MINIMAL DEPOSIT IDR 20.000", true);

            const skrg = new Date();
            const waktu = `${skrg.getDate()}/${skrg.getMonth()+1} ${skrg.getHours()}:${skrg.getMinutes()}`;

            const data = { 
                id: "DEP" + Math.floor(1000 + Math.random() * 9000),
                waktu, 
                jumlah: parseInt(nom), 
                metode: metodeTerpilih, 
                status: "PENDING" 
            };

            let riwayat = JSON.parse(localStorage.getItem('riwayat_depo')) || [];
            riwayat.unshift(data);
            localStorage.setItem('riwayat_depo', JSON.stringify(riwayat));

            showPopup("KONFIRMASI TERKIRIM! HARAP TUNGGU VALIDASI ADMIN.");
            document.getElementById('input-nominal').value = "";
            muatRiwayat();

            // Simulasi Sukses otomatis setelah 15 detik (Bisa dihapus jika ingin full manual via Admin)
            setTimeout(() => {
                let current = JSON.parse(localStorage.getItem('riwayat_depo')) || [];
                let target = current.find(i => i.id === data.id);
                if(target && target.status === "PENDING") {
                    target.status = "SUKSES";
                    localStorage.setItem('riwayat_depo', JSON.stringify(current));
                    
                    // Update Saldo Permainan (global.js)
                    let saldoSkrg = parseInt(localStorage.getItem('saldo_permainan')) || 0;
                    localStorage.setItem('saldo_permainan', saldoSkrg + data.jumlah);
                    
                    muatRiwayat();
                }
            }, 15000);
        }

        function muatRiwayat() {
            const container = document.getElementById('list-riwayat');
            const riwayat = JSON.parse(localStorage.getItem('riwayat_depo')) || [];
            
            if(riwayat.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#444; font-size:12px;">Belum ada transaksi deposit.</p>';
                return;
            }

            container.innerHTML = riwayat.map(item => `
                <div class="history-item">
                    <div class="hist-info">
                        <b>IDR ${item.jumlah.toLocaleString()}</b>
                        <small>${item.waktu} • ${item.metode}</small>
                    </div>
                    <span class="status-badge ${item.status === 'SUKSES' ? 'status-sukses' : 'status-pending'}">
                        ${item.status}
                    </span>
                </div>
            `).join('');
        }

        window.onload = muatRiwayat;
    </script>

</body>
</html>
