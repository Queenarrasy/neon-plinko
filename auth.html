<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - AUTH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 0, 119, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 212, 255, 0.15) 0%, transparent 35%);
            color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
            overflow-x: hidden;
        }
        
        .auth-card { 
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--blue); border-radius: 30px; padding: 40px 25px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); text-align: center;
            backdrop-filter: blur(10px);
        }

        /* JUDUL NEON BOLD */
        .title { font-size: 38px; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; line-height: 1.1; }
        .t-pink { color: var(--pink); text-shadow: 0 0 15px var(--pink), 0 0 30px var(--pink); }
        .t-blue { color: var(--blue); text-shadow: 0 0 15px var(--blue), 0 0 30px var(--blue); }
        .t-yellow { color: var(--yellow); text-shadow: 0 0 15px var(--yellow), 0 0 30px var(--yellow); }

        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        label { font-size: 11px; font-weight: 900; color: var(--blue); letter-spacing: 1.5px; margin-left: 5px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: white; box-sizing: border-box; outline: none; 
            transition: 0.3s; font-size: 14px; margin-top: 5px;
        }
        input:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(255, 0, 119, 0.3); }

        /* PASSWORD EYE ICON */
        .pass-wrapper { position: relative; }
        .toggle-pass { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
            color: var(--blue); cursor: pointer; z-index: 10; font-size: 18px;
            text-shadow: 0 0 5px var(--blue);
        }

        .btn-submit { 
            width: 100%; padding: 16px; background: linear-gradient(90deg, var(--pink), #aa0055); 
            border: none; border-radius: 12px; color: white; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 20px; font-size: 16px;
            box-shadow: 0 0 20px var(--pink); transition: 0.3s;
        }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--pink); }

        .switch-link { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; }
        .switch-link b { color: var(--yellow); text-decoration: underline; text-shadow: 0 0 5px var(--yellow); }

        /* MODAL NEON */
        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .neon-modal {
            background: #050612; border: 2px solid var(--pink); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 40px var(--pink);
        }
        .neon-modal h2 { margin: 0 0 10px; font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .neon-modal-btn {
            background: transparent; border: 2px solid var(--blue); color: var(--blue);
            padding: 12px 0; width: 100%; border-radius: 50px; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 15px var(--blue); text-transform: uppercase; margin-top: 15px;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 11000;
        }
        .spinner {
            width: 45px; height: 45px; border: 4px solid var(--blue);
            border-top: 4px solid transparent; border-radius: 50%;
            animation: spin 1s linear infinite; box-shadow: 0 0 10px var(--blue);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color: var(--blue); margin-top: 15px; font-weight: 900; letter-spacing: 2px;">SYNCING DATABASE...</p>
    </div>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title" class="t-yellow">INFO</h2>
            <p id="modal-msg"></p>
            <button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>
        </div>
    </div>

    <div class="auth-card">
        <div class="title">
            <span class="t-pink">NEON</span> <br>
            <span class="t-blue">PLINKO</span> <br>
            <span class="t-yellow">VIP</span>
        </div>

        <h3 id="form-label" class="t-blue" style="margin-bottom: 25px; letter-spacing: 2px; font-weight: 900;">PENDAFTARAN</h3>

        <form id="main-form">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Masukkan Username" required>
            </div>

            <div id="extra-fields">
                <div class="form-group">
                    <label>NOMOR HP (WHATSAPP)</label>
                    <input type="number" id="phone" placeholder="Contoh: 0812xxxx">
                </div>
                <div class="form-group">
                    <label>NAMA LENGKAP</label>
                    <input type="text" id="fullname" placeholder="Sesuai Buku Tabungan">
                </div>
                <div class="form-group">
                    <label>NAMA BANK / EWALLET</label>
                    <select id="bank">
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="BCA">BCA</option>
                        <option value="BRI">BRI</option>
                        <option value="MANDIRI">MANDIRI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>NOMOR REKENING</label>
                    <input type="number" id="rekening" placeholder="Masukkan nomor akun">
                </div>
                <div class="form-group">
                    <label>KODE REFERRAL (OPSIONAL)</label>
                    <input type="text" id="referral" placeholder="Masukkan kode referral">
                </div>
            </div>

            <div class="form-group">
                <label>PASSWORD</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required>
                    <i class="fa-solid fa-eye toggle-pass" id="eye-icon" onclick="togglePass()"></i>
                </div>
            </div>

            <button type="button" class="btn-submit" onclick="processAuth()" id="btn-text">Daftar Sekarang</button>
        </form>

        <div class="switch-link" id="auth-switch" onclick="toggleMode()"></div>
    </div>

    <script src="global.js"></script>
    <script>
        let isLogin = false;

        function showNeonModal(msg, title = "INFO") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-modal-overlay').style.display = 'flex';
        }

        function closeNeonModal() {
            document.getElementById('neon-modal-overlay').style.display = 'none';
        }

        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function toggleMode() {
            isLogin = !isLogin;
            const extra = document.getElementById('extra-fields');
            const label = document.getElementById('form-label');
            const btn = document.getElementById('btn-text');
            const sw = document.getElementById('auth-switch');

            if (isLogin) {
                extra.style.display = 'none';
                label.innerText = "LOGIN MEMBER";
                btn.innerText = "Masuk Sekarang";
                sw.innerHTML = "Belum punya akun? <b class='t-yellow'>Daftar VIP</b>";
            } else {
                extra.style.display = 'block';
                label.innerText = "PENDAFTARAN VIP";
                btn.innerText = "Daftar Sekarang";
                sw.innerHTML = "Sudah punya akun? <b class='t-yellow'>Login di sini</b>";
            }
        }

        async function processAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!user || pass.length < 6) {
                showNeonModal("Username & Password (min 6 digit) wajib diisi!", "PERINGATAN");
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                if (isLogin) {
                    const result = await fetchCloud({
                        action: "login",
                        username: user,
                        password: pass
                    });

                    document.getElementById('loading-overlay').style.display = 'none';

                    if (result && result.status === "SUCCESS") {
                        // SIMPAN SESSION KE LOCALSTORAGE
                        localStorage.setItem('user_session', result.username);
                        localStorage.setItem('fullname', result.fullname || "-");
                        localStorage.setItem('bank_name', result.bank || "-");
                        localStorage.setItem('account_no', result.rekening || "-");
                        localStorage.setItem('saldo_permainan', result.saldo || 0);
                        localStorage.setItem('user_tier', result.tier || "BRONZE");
                        localStorage.setItem('user_status', "ACTIVE");

                        showNeonModal("Akses Diterima! Selamat Datang.", "SUKSES");
                        setTimeout(() => window.location.href = "game.html", 1500);
                    } else {
                        showNeonModal("Username atau Password Salah!", "GAGAL");
                    }
                } else {
                    // MODE REGISTER
                    const phoneVal = document.getElementById('phone').value;
                    const fullVal = document.getElementById('fullname').value;
                    const bankVal = document.getElementById('bank').value;
                    const rekVal = document.getElementById('rekening').value;
                    const reffVal = document.getElementById('referral').value;

                    if(!fullVal || !rekVal) {
                        document.getElementById('loading-overlay').style.display = 'none';
                        showNeonModal("Nama dan Nomor Rekening wajib diisi!", "GAGAL");
                        return;
                    }

                    const result = await fetchCloud({
                        action: "register",
                        username: user,
                        password: pass,
                        phone: phoneVal,
                        fullname: fullVal,
                        bank: bankVal,
                        rekening: rekVal,
                        referral: reffVal
                    });

                    document.getElementById('loading-overlay').style.display = 'none';

                    if (result === "SUCCESS") {
                        // SIMPAN SESSION AGAR LANGSUNG TERBACA DI PROFIL
                        localStorage.setItem('user_session', user);
                        localStorage.setItem('fullname', fullVal);
                        localStorage.setItem('bank_name', bankVal);
                        localStorage.setItem('account_no', rekVal);
                        localStorage.setItem('saldo_permainan', 0);
                        localStorage.setItem('user_tier', "BRONZE");
                        localStorage.setItem('user_status', "ACTIVE");

                        showNeonModal("Pendaftaran Berhasil!", "SUKSES");
                        setTimeout(() => window.location.href = "game.html", 1500);
                    } else if (result === "EXISTS") {
                        showNeonModal("Username atau Rekening sudah terdaftar!", "GAGAL");
                    }
                }
            } catch (e) {
                document.getElementById('loading-overlay').style.display = 'none';
                showNeonModal("Gagal terhubung ke database!", "ERROR");
            }
        }

        window.onload = toggleMode;
    </script>
</body>
</html>
