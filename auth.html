<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN NEON VIP</title>
    <style>
        body { background: #070816; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid #ff0077; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff0077; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="auth-header">MASUK AKUN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password (Min 6 Karakter)">
        <button onclick="handleAuth()">MASUK / DAFTAR</button>
    </div>
    <script>
        function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (pass.length < 6 || user === "") return alert("Data tidak valid!");
            localStorage.setItem('username_neon', user);
            window.location.href = 'game.html';
        }
    </script>
</body>
</html>
