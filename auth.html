<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON PLINKO VIP - AUTH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 0, 119, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 212, 255, 0.15) 0%, transparent 35%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }
        
        .auth-card { 
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--blue); border-radius: 30px; padding: 40px 25px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); text-align: center;
            backdrop-filter: blur(10px);
        }

        .title { font-size: 34px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 30px; }
        .t-pink { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
        .t-blue { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .t-yellow { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }

        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        label { font-size: 10px; font-weight: 900; color: var(--blue); letter-spacing: 1px; margin-left: 5px; }
        
        input, select { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: white; box-sizing: border-box; outline: none; 
            transition: 0.3s; font-size: 14px; margin-top: 5px;
        }
        input:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(255, 0, 119, 0.3); }

        .pass-wrapper { position: relative; }
        .toggle-pass { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
            color: #666; cursor: pointer; margin-top: 2px;
        }

        .btn-submit { 
            width: 100%; padding: 16px; background: linear-gradient(90deg, var(--pink), #aa0055); 
            border: none; border-radius: 12px; color: white; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 20px; font-size: 16px;
            box-shadow: 0 0 20px var(--pink);
        }

        .switch-link { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; }
        .switch-link b { color: var(--yellow); text-decoration: underline; }

        /* --- STYLES MODAL NEON TERBARU --- */
        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 99999;
        }
        .neon-modal {
            background: #050612; border: 2px solid var(--blue); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
            animation: zoomIn 0.3s ease-out;
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .neon-modal h2 { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); margin: 0 0 15px 0; font-size: 22px; text-transform: uppercase; }
        .neon-modal p { color: #fff; line-height: 1.5; margin-bottom: 25px; font-size: 15px; }
        .neon-modal-btn {
            background: transparent; border: 2px solid var(--pink); color: var(--pink);
            padding: 12px 0; width: 100%; border-radius: 50px; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 15px var(--pink); text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title">INFO</h2>
            <p id="modal-msg">Pesan sistem.</p>
            <button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>
        </div>
    </div>

    <div class="auth-card">
        <div class="title">
            <span class="t-pink">NEON</span> <span class="t-blue">PLINKO</span> <br> <span class="t-yellow">VIP</span>
        </div>

        <h3 id="form-label" style="color: var(--blue); margin-bottom: 25px; letter-spacing: 2px;">PENDAFTARAN</h3>

        <form id="main-form">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Buat username unik" required>
            </div>

            <div id="extra-fields">
                <div class="form-group">
                    <label>NOMOR HP</label>
                    <input type="number" id="phone" placeholder="Contoh: 08123456789">
                </div>
                <div class="form-group">
                    <label>NAMA LENGKAP</label>
                    <input type="text" id="fullname" placeholder="Sesuai rekening bank">
                </div>
                <div class="form-group">
                    <label>NAMA BANK / EWALLET</label>
                    <select id="bank">
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="BANK BCA">BANK BCA</option>
                        <option value="BANK BRI">BANK BRI</option>
                        <option value="BANK MANDIRI">BANK MANDIRI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>NO REK / EWALLET</label>
                    <input type="number" id="rekening" placeholder="Masukkan nomor rekening/e-wallet">
                </div>
            </div>

            <div class="form-group">
                <label>PASSWORD</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required>
                    <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="form-group" id="ref-group">
                <label>KODE REFERRAL (OPSIONAL)</label>
                <input type="text" id="referral_code" placeholder="Masukkan kode jika ada" style="border-color: #222;">
                <small class="note">* Kosongkan jika tidak ada</small>
            </div>

            <button type="button" class="btn-submit" onclick="processAuth()" id="btn-text">Daftar Sekarang</button>
        </form>

        <div class="switch-link" id="auth-switch" onclick="toggleMode()">
            Sudah punya akun? <b>Login di sini</b>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let isLogin = false;
        let redirectUrl = "";

        // Fungsi Modal Neon
        function showNeonModal(msg, title = "INFO", nextUrl = "") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-modal-overlay').style.display = 'flex';
            redirectUrl = nextUrl;
        }

        function closeNeonModal() {
            document.getElementById('neon-modal-overlay').style.display = 'none';
            if (redirectUrl) window.location.href = redirectUrl;
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-pass');
            passInput.type = passInput.type === "password" ? "text" : "password";
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        function toggleMode() {
            isLogin = !isLogin;
            const extra = document.getElementById('extra-fields');
            const ref = document.getElementById('ref-group'); 
            const label = document.getElementById('form-label');
            const btn = document.getElementById('btn-text');
            const sw = document.getElementById('auth-switch');
            const userInp = document.getElementById('username');

            if (isLogin) {
                extra.style.display = 'none';
                ref.style.display = 'none'; 
                label.innerText = "LOGIN MEMBER";
                btn.innerText = "Masuk Sekarang";
                sw.innerHTML = "Belum punya akun? <b>Daftar Akun VIP</b>";
                userInp.placeholder = "masukkan username anda";
            } else {
                extra.style.display = 'block';
                ref.style.display = 'block'; 
                label.innerText = "PENDAFTARAN";
                btn.innerText = "Daftar Sekarang";
                sw.innerHTML = "Sudah punya akun? <b>Login di sini</b>";
                userInp.placeholder = "Buat username unik";
            }
        }

        function processAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const db = JSON.parse(localStorage.getItem('database_users') || "[]");

            if (user === "" || pass.length < 6) {
                showNeonModal("Username wajib diisi & Password minimal 6 karakter!", "DATA TIDAK VALID");
                return;
            }

            if (isLogin) {
                const found = db.find(u => u.username === user && u.password === pass);
                if (found) {
                    localStorage.setItem('user_session', found.username); 
                    localStorage.setItem('user_vip', found.username);
                    showNeonModal("Login Berhasil! Selamat Datang Kembali.", "SUKSES", "game.html");
                } else {
                    showNeonModal("Username atau Password salah!", "LOGIN GAGAL");
                }
            } else {
                const phone = document.getElementById('phone').value.trim();
                const full = document.getElementById('fullname').value.trim();
                const rek = document.getElementById('rekening').value.trim();
                const bank = document.getElementById('bank').value;

                if (!phone || !full || !rek) {
                    showNeonModal("Harap lengkapi semua data pendaftaran!", "DATA KURANG");
                    return;
                }

                if (db.some(u => u.username === user)) {
                    showNeonModal("Username sudah digunakan!", "USER TERDAFTAR");
                    return;
                }

                const newUser = { username: user, password: pass, phone, fullname: full, bank, rekening: rek };
                db.push(newUser);
                localStorage.setItem('database_users', JSON.stringify(db));
                localStorage.setItem('user_session', user); 
                localStorage.setItem('user_vip', user);
                
                showNeonModal("Pendaftaran Berhasil! Nikmati permainan.", "SUKSES DAFTAR", "game.html");
            }
        }
    </script>
</body>
</html>
