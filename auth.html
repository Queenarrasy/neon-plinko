<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PLINKO VIP - AUTH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --pink: #ff0077; --blue: #00d4ff; --yellow: #fbff00; --bg: #070816; }
        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 0, 119, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 212, 255, 0.15) 0%, transparent 35%);
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }
        
        .auth-card { 
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.02); 
            border: 2px solid var(--blue); border-radius: 30px; padding: 40px 25px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); text-align: center;
            backdrop-filter: blur(10px);
        }

        .title { font-size: 34px; font-weight: 900; text-transform: uppercase; line-height: 1; margin-bottom: 30px; }
        .t-pink { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
        .t-blue { color: var(--blue); text-shadow: 0 0 10px var(--blue); }
        .t-yellow { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }

        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        label { font-size: 10px; font-weight: 900; color: var(--blue); letter-spacing: 1px; margin-left: 5px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: white; box-sizing: border-box; outline: none; 
            transition: 0.3s; font-size: 14px; margin-top: 5px;
        }
        input:focus { border-color: var(--pink); box-shadow: 0 0 10px rgba(255, 0, 119, 0.3); }

        .pass-wrapper { position: relative; }
        .toggle-pass { 
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
            color: var(--blue); cursor: pointer; margin-top: 2px;
        }

        .btn-submit { 
            width: 100%; padding: 16px; background: linear-gradient(90deg, var(--pink), #aa0055); 
            border: none; border-radius: 12px; color: white; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; margin-top: 20px; font-size: 16px;
            box-shadow: 0 0 20px var(--pink); transition: 0.3s;
        }
        .btn-submit:active { transform: scale(0.98); }

        .switch-link { margin-top: 20px; font-size: 13px; color: #888; cursor: pointer; }
        .switch-link b { color: var(--yellow); text-decoration: underline; }

        #neon-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000000;
        }
        .neon-modal {
            background: #050612; border: 2px solid var(--blue); border-radius: 25px;
            padding: 30px; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
        }
        .neon-modal h2 { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); margin: 0 0 15px 0; text-transform: uppercase; }
        .neon-modal-btn {
            background: transparent; border: 2px solid var(--pink); color: var(--pink);
            padding: 12px 0; width: 100%; border-radius: 50px; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 15px var(--pink); text-transform: uppercase;
        }
        
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000000;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(0, 212, 255, 0.1);
            border-top: 5px solid var(--blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--blue); font-weight: bold; letter-spacing: 2px;">MENGHUBUNGKAN KE SERVER...</p>
    </div>

    <div id="neon-modal-overlay">
        <div class="neon-modal">
            <h2 id="modal-title">INFO</h2>
            <p id="modal-msg">Pesan sistem.</p>
            <button class="neon-modal-btn" onclick="closeNeonModal()">MENGERTI</button>
        </div>
    </div>

    <div class="auth-card">
        <div class="title">
            <span class="t-pink">NEON</span> <span class="t-blue">PLINKO</span> <br> <span class="t-yellow">VIP</span>
        </div>

        <h3 id="form-label" style="color: var(--blue); margin-bottom: 25px; letter-spacing: 2px; font-weight: 900;">PENDAFTARAN</h3>

        <form id="main-form">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Buat username unik" required>
            </div>

            <div id="extra-fields">
                <div class="form-group">
                    <label>NOMOR HP (WHATSAPP)</label>
                    <input type="number" id="phone" placeholder="Contoh: 08123456789">
                </div>
                <div class="form-group">
                    <label>NAMA LENGKAP</label>
                    <input type="text" id="fullname" placeholder="Nama sesuai rekening/e-wallet">
                </div>
                <div class="form-group">
                    <label>NAMA BANK / EWALLET</label>
                    <select id="bank">
                        <option value="DANA">DANA</option>
                        <option value="OVO">OVO</option>
                        <option value="GOPAY">GOPAY</option>
                        <option value="BCA">BANK BCA</option>
                        <option value="BRI">BANK BRI</option>
                        <option value="MANDIRI">BANK MANDIRI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>NOMOR REKENING</label> <input type="number" id="rekening" placeholder="Masukkan nomor akun pembayaran">
                </div>
            </div>

            <div class="form-group">
                <label>PASSWORD</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required>
                    <i class="fa-solid fa-eye toggle-pass" onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="form-group" id="ref-group">
                <label>KODE REFERRAL (OPSIONAL)</label>
                <input type="text" id="referral_code" placeholder="Masukkan kode jika ada">
            </div>

            <button type="button" class="btn-submit" onclick="processAuth()" id="btn-text">Daftar Sekarang</button>
        </form>

        <div class="switch-link" id="auth-switch" onclick="toggleMode()"></div>
    </div>

    <script src="global.js"></script>
    <script>
        let isLogin = false;
        let redirectUrl = "";

        function showNeonModal(msg, title = "INFO", nextUrl = "") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('neon-modal-overlay').style.display = 'flex';
            redirectUrl = nextUrl;
        }

        function closeNeonModal() {
            document.getElementById('neon-modal-overlay').style.display = 'none';
            if (redirectUrl) window.location.href = redirectUrl;
        }

        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-pass');
            passInput.type = passInput.type === "password" ? "text" : "password";
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        function toggleMode() {
            isLogin = !isLogin;
            const extra = document.getElementById('extra-fields');
            const ref = document.getElementById('ref-group'); 
            const label = document.getElementById('form-label');
            const btn = document.getElementById('btn-text');
            const sw = document.getElementById('auth-switch');

            if (isLogin) {
                extra.style.display = 'none';
                ref.style.display = 'none'; 
                label.innerText = "LOGIN MEMBER";
                btn.innerText = "Masuk Sekarang";
                sw.innerHTML = "Belum punya akun? <b>Daftar Akun VIP</b>";
            } else {
                extra.style.display = 'block';
                ref.style.display = 'block'; 
                label.innerText = "PENDAFTARAN VIP";
                btn.innerText = "Daftar Sekarang";
                sw.innerHTML = "Sudah punya akun? <b>Login di sini</b>";
            }
        }

        async function processAuth() {
            // Penggunaan trim() sangat penting agar login di perangkat manapun tidak error karena spasi
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (user === "" || pass.length < 6) {
                showNeonModal("Username & Password (min 6 karakter) wajib diisi!", "ERROR");
                return;
            }

            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                if (isLogin) {
                    // LOGIN PROCESS
                    const result = await fetchCloud({
                        action: "login",
                        username: user,
                        password: pass
                    });
                    
                    document.getElementById('loading-overlay').style.display = 'none';
                    
                    if (result && result.status !== "FAILED") {
                        // Simpan semua kolom untuk Profil & Withdraw
                        localStorage.setItem('user_session', result.username);
                        localStorage.setItem('phone', result.phone || "");
                        localStorage.setItem('fullname', result.fullname || "");
                        localStorage.setItem('account_no', result.rekening || "");
                        localStorage.setItem('bank_name', result.bank || "");
                        localStorage.setItem('saldo_permainan', result.saldo || 0);
                        localStorage.setItem('user_tier', result.tier || "BRONZE");
                        localStorage.setItem('winrate', result.winrate || 0.5);
                        localStorage.setItem('user_status', "ONLINE");

                        showNeonModal("Akses VIP Diterima! Selamat datang kembali.", "SUKSES", "game.html");
                    } else {
                        showNeonModal("Username atau Password salah!", "GAGAL");
                    }
                } else {
                    // REGISTER PROCESS
                    const phoneVal = document.getElementById('phone').value.trim();
                    const fullVal = document.getElementById('fullname').value.trim();
                    const bankVal = document.getElementById('bank').value;
                    const rekVal = document.getElementById('rekening').value.trim();
                    const refVal = document.getElementById('referral_code').value.trim();

                    if (!phoneVal || !fullVal || !rekVal) {
                        document.getElementById('loading-overlay').style.display = 'none';
                        showNeonModal("Harap lengkapi semua data pendaftaran!", "ERROR");
                        return;
                    }

                    const result = await fetchCloud({
                        action: "register",
                        username: user,
                        phone: phoneVal,
                        fullname: fullVal,
                        bank: bankVal,
                        rekening: rekVal,
                        password: pass,
                        referral: refVal
                    });
                    
                    document.getElementById('loading-overlay').style.display = 'none';
                    
                    if (result === "SUCCESS") {
                        // Simpan data pendaftaran secara lokal agar Profil langsung sinkron
                        localStorage.setItem('user_session', user);
                        localStorage.setItem('phone', phoneVal);
                        localStorage.setItem('fullname', fullVal);
                        localStorage.setItem('bank_name', bankVal);
                        localStorage.setItem('account_no', rekVal);
                        localStorage.setItem('saldo_permainan', 0);
                        localStorage.setItem('user_tier', "BRONZE");
                        localStorage.setItem('user_status', "ONLINE");

                        showNeonModal("Pendaftaran Berhasil! Akun Anda sudah aktif.", "SUKSES", "game.html");
                    } else if (result === "EXISTS") {
                        showNeonModal("Username sudah digunakan oleh pemain lain!", "GAGAL");
                    } else {
                        showNeonModal("Gagal mendaftar. Coba lagi nanti.", "ERROR");
                    }
                }
            } catch (error) {
                document.getElementById('loading-overlay').style.display = 'none';
                showNeonModal("Kesalahan Jaringan! Pastikan URL Apps Script benar.", "ERROR");
            }
        }

        window.onload = () => {
            toggleMode(); 
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('ref')) {
                document.getElementById('referral_code').value = urlParams.get('ref');
            }
        };
    </script>
</body>
</html>
